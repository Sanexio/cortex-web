# Demo Hub-Page — rein fiktiv, für build-page-hub.mjs als Smoke-Test-Datensatz.
# Schema: trunk/schema/page.schema.json
id: leistungen
site: shared
slugs:
  practice: leistungen
  shop: leistungen
title:
  de: "Unsere Leistungen"
  en: "Our Services"

sections:
  - type: hero
    eyebrow:
      de: "Demo-Praxis"
      en: "Example Clinic"
    heading:
      de: "Was wir Ihnen anbieten"
      en: "What we offer"
    lead:
      de: "Diese Hub-Seite listet beispielhaft die Bereiche der fiktiven Demo-Praxis."
