        Die Demo-Praxis betreut Beispiel-Patienten in den fiktiven
        Schwerpunkten **Beratung**, **Diagnostik** und **Vorsorge**.

        Diese Page existiert ausschließlich, damit `build-page-hub.mjs`
        im Demo-Fallback grün läuft.
      en: |
        The demo clinic serves example patients in the fictional
        focus areas of **consultation**, **diagnostics**, and **prevention**.

  - type: cta-banner
    heading:
      de: "Termin vereinbaren"
      en: "Book an appointment"
    sub:
      de: "Demo-Praxis — kein realer Kontakt."
      en: "Demo clinic — not a real contact."
    cta_label:
      de: "Anfragen"
      en: "Enquire"
    cta_url: "/kontakt/"

meta:
  description:
    de: "Demo-Hub-Page: Leistungen der Beispiel-Praxis."
    en: "Demo hub page: services of the example clinic."
