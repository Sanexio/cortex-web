bio:
  de: |
    Geboren in Bonn, aufgewachsen zwischen Deutschland, Frankreich und Belgien. Nach dem Abitur an der Europäischen Schule Brüssel (deutsche Sektion) Studium der Medizin an der Université Catholique de Louvain (UCL) in Belgien, Abschluss cum laude. Anschließend Facharztausbildung für Allgemeinmedizin an der UCL (2001–2004).

    2004 Umzug nach Madrid. Über 15 Jahre als Fachärztin für Allgemeinmedizin in Spanien tätig, zuletzt bei MC Mutual (2004–2019) als leitende Oberärztin für die Kliniken in Extremadura und Kastilien-León. Schwerpunkte: Arbeitsunfallmedizin, Ultraschalldiagnostik (seit 2010 mehr als 1.200 Untersuchungen jährlich und firmeninterne Fortbildung) sowie die Betreuung deutsch-, französisch- und englischsprachiger Patientinnen und Patienten.

    Weiterbildungen in Ultraschalldiagnostik mit SEECO-Zertifikaten I und II (spanisches Pendant zur DEGUM) sowie Master in „Peritaje y valoración de daños corporales" (Sachverständigenwesen für Körperverletzungen, Universidad de Barcelona).

    Fließend viersprachig in Deutsch (Muttersprache), Französisch, Spanisch und Englisch — Anamnese und Befundbesprechung in allen vier Sprachen.
