bio:
  de: |
    George Shahin ist Facharzt für Neurologie mit mehr als 14 Jahren Berufserfahrung; 6 davon in leitender Position an der Stroke Unit des Universitätsklinikums Gießen (Standort Friedberg). In der Praxisgemeinschaft Sanexio im Frankfurter Westend betreut er das gesamte Spektrum ambulanter neurologischer und psychiatrischer Krankheitsbilder.

    Behandlungsschwerpunkte sind Kopfschmerz und Migräne, Schwindel, Rückenschmerzen, Polyneuropathien, Demenz, Parkinson und andere Bewegungsstörungen, Multiple Sklerose, Epilepsie, Schlaganfall-Vor- und -Nachsorge sowie periphere Nervenläsionen wie das Karpaltunnelsyndrom. In der psychiatrischen Sprechstunde behandelt er Depressionen, Angst-, Zwangs- und Schlafstörungen.

    Für die Diagnostik stehen Doppler- und Duplexsonographie der hirnversorgenden Gefäße, Nervenultraschall, Elektroneurographie (Nervenleitgeschwindigkeit), evozierte Potenziale, Schlafscreening sowie standardisierte Kognitions- und Demenztests zur Verfügung.

    Als zertifizierter Botulinumtoxin-Anwender und Mitglied des Arbeitskreises Botulinumtoxin in Deutschland bietet Herr Shahin eine BOTOX-Sprechstunde für medizinische Indikationen an: chronische Migräne und Spannungskopfschmerz, Hyperhidrose (übermäßiges Schwitzen), supportive Therapie bei Depression (Glabella- und Stirnfalten), zervikale Dystonie (Schiefhals), Blepharospasmus (Lidkrampf), Spastik nach Schlaganfall oder bei Multipler Sklerose, Hemispasmus facialis (unkontrollierte Gesichtszuckungen, etwa nach peripherer Fazialisparese) sowie Sialorrhoe (übermäßiger Speichelfluss) bei Parkinson-Syndrom oder ALS.

    Termine sind online über Doctolib oder telefonisch buchbar; Sprechstunden auf Deutsch und Englisch.
