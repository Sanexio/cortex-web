bio:
  de: |
    Dr. George Shahin ist Facharzt für Neurologie und Psychiatrie und betreut in der Praxisgemeinschaft Sanexio im Frankfurter Westend das gesamte Spektrum ambulanter neurologischer und psychiatrischer Krankheitsbilder.

    In der Praxis stehen ihm EEG, Doppler- und Duplex-Sonographie der hirnversorgenden Gefäße, Elektroneurographie (Nervenleitgeschwindigkeit), evozierte Potentiale (VEP, AEP, SEP) sowie standardisierte Kognitions- und Demenz-Tests zur Verfügung. Therapeutisch versorgt er Patientinnen und Patienten mit Kopfschmerzen und Migräne, Schwindel, Polyneuropathien, Parkinson und anderen Bewegungsstörungen, Multipler Sklerose und Epilepsie sowie die Schlaganfall-Vorsorge. In der psychiatrischen Sprechstunde behandelt er Depressionen, Angst-, Zwangs- und Schlafstörungen. Botulinumtoxintherapie wird vor Ort durchgeführt.

    Termine sind online über Doctolib oder telefonisch buchbar; Sprechstunden in Deutsch und Englisch.
