bio:
  de: |
    Dr. Issa Jawich ist Facharzt für Hals-Nasen-Ohren-Heilkunde und führt eine eigene HNO-Praxis in Eschborn. In der Praxisgemeinschaft Sanexio im Frankfurter Westend bietet er ergänzend HNO-fachärztliche Sprechstunden und Diagnostik im Verbund mit den hausärztlichen, internistischen und allgemeinmedizinischen Kolleginnen und Kollegen an.

    Sein Leistungsspektrum umfasst die umfassende HNO-Diagnostik mit Hörtests, Tympanometrie und otoakustischen Emissionen sowie endoskopische Untersuchungen von Nase, Rachen und Kehlkopf. Allergiediagnostik wird per Hauttest (Prick-Test) und Bluttests durchgeführt. Bei nächtlichen Atmungsstörungen führt er die ambulante Polygraphie zur Schlafapnoe-Diagnostik durch. Ergänzend bietet er Gleichgewichtsprüfungen bei Schwindel sowie Behandlungsoptionen für chronische Nebenhöhlen- und Halsentzündungen an.

    Termine in der Praxisgemeinschaft Sanexio sind online über Doctolib oder telefonisch buchbar; Sprechstunden in Deutsch und Englisch.
