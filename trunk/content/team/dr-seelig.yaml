bio:
  de: |
    Dr. Stefanie Seelig ist Fachärztin für Gynäkologie und Geburtshilfe mit über 20 Jahren klinischer Erfahrung in Facharzt-, Oberarzt- und Chefarzttätigkeit. In der Praxisgemeinschaft Sanexio im Frankfurter Westend betreut sie Patientinnen in allen Lebensphasen — von der gynäkologischen Vorsorge über die Schwangerschaft bis zur operativen Gynäkologie.

    Ihr Leistungsspektrum umfasst die gynäkologische Krebsvorsorge, die Schwangerenvorsorge mit hochauflösender 3D/4D-Sonographie, Elastographie und Videokolposkopie. Bei klinisch indizierten Befunden führt sie ambulante und stationäre Operationen belegärztlich durch. Konservative Therapieansätze werden bei Bedarf um ergänzende Naturheilverfahren erweitert.

    Fachliche Schwerpunkte sind die operative Gynäkologie und die Geburtshilfe. Termine sind online über Doctolib oder telefonisch buchbar; Sprechstunden in Deutsch und Englisch.
