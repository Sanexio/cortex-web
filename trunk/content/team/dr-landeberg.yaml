bio:
  de: |
    Linnea Landeberg ist approbierte Psychologische Psychotherapeutin und behandelt Erwachsene sowie Kinder und Jugendliche. Ihr Studium der Psychologie absolvierte sie an der Technischen Universität Darmstadt; klinische Erfahrung sammelte sie an mehreren Fachkliniken sowie in der Arbeits- und Verkehrspsychologie.

    Ihr therapeutisches Fundament ist die kognitive Verhaltenstherapie. Sie ergänzt diese um EMDR (Eye Movement Desensitization and Reprocessing) zur Traumaverarbeitung sowie um spieltherapeutische und kreative Verfahren für jüngere Patientinnen und Patienten. Behandelt werden Depressionen, Angst- und Zwangsstörungen, Trauma- und Belastungsfolgestörungen, Burn-out, Persönlichkeitsstörungen, Ess- und Schlafstörungen, ADHS, Störungen aus dem Autismus-Spektrum sowie schizophrene Erkrankungen.

    In der Praxisgemeinschaft Sanexio im Frankfurter Westend bietet sie psychotherapeutische Sprechstunden für Privatversicherte und Selbstzahler an; Telemedizin ist auf Anfrage möglich. Termine sind online über Doctolib oder telefonisch buchbar.
