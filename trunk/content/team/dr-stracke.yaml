bio:
  de: |
    Nach dem Studium der Humanmedizin beginnt Dr. Stracke 2005 seine klinische Weiterbildung am Universitätsklinikum Gießen. Nach Facharztbezeichnung Innere Medizin und Zusatzbezeichnung Notfallmedizin liegt sein Schwerpunkt in der kardiologischen Intensivmedizin. 2012 ergänzt er seine medizinische Expertise um einen MBA Health Care Management an der EBS. In der Überzeugung, dass das Gesundheitswesen neue Wege der Informationsorganisation braucht, gründet er die Sanexio GmbH.
