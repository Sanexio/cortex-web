  de: |
    Schwerpunkt Innere Medizin, Diabetologie und Ernährungsmedizin. Als Praxisinhaber verbindet er klinische Erfahrung mit modernen digitalen Prozessen – für Medizin, die nicht nur Symptome behandelt, sondern am Patienten denkt.
