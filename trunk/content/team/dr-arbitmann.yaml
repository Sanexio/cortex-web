bio:
  de: |
    Anna Arbitmann ist Diplom-Physiotherapeutin und Heilpraktikerin. In der Praxisgemeinschaft Sanexio im Frankfurter Westend bietet sie physiotherapeutische und naturheilkundliche Sprechstunden im Rahmen eines integrativen Behandlungskonzepts an, das moderne Physiotherapie mit fundierten manualtherapeutischen und naturheilkundlichen Verfahren verbindet.

    Im Mittelpunkt stehen eine präzise funktionelle Diagnostik, die individuelle Begleitung der Patientinnen und Patienten sowie die gezielte Unterstützung von Rehabilitation, Regeneration und Selbstregulation. Ihre Arbeit folgt evidenzbasierten, leitliniengerechten Therapiekonzepten und einer interdisziplinären Zusammenarbeit mit den behandelnden Ärztinnen und Ärzten — mit dem Ziel, funktionelle Zusammenhänge zu erkennen, Beschwerden nachhaltig zu lindern und die körperliche Balance langfristig zu stabilisieren.

    Das therapeutische Spektrum umfasst Craniosakrale Osteopathie (Ausbildung am Upledger Institute), Neuraltherapie (Universitätsklinikum Heidelberg), anthroposophische Medizin, Akupunktur, radiale und fokussierte Stoßwellentherapie sowie manuelle Lymphdrainage (Földi Klinik Hinterzarten — eine der führenden europäischen Fachkliniken für Lymphologie). Internationale Stationen in den USA und der Schweiz sowie ihre aktuelle Tätigkeit an einem Spital des Swiss Medical Network erweitern ihre klinische Kompetenz fortlaufend. Schwerpunkte liegen auf neuroorthopädischen Behandlungskonzepten, postoperativer Nachbehandlung sowie der differenzierten Rehabilitation komplexer Beschwerdebilder.

    Termine sind über die Praxisrezeption oder telefonisch buchbar. Behandlungssprachen: Deutsch, Englisch, Russisch, Französisch (Basis).
