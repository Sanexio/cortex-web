bio:
  de: |
    Anna Arbitmann ist Physiotherapeutin und Heilpraktikerin und führt eine eigene Naturheilpraxis in Frankfurt-Innenstadt sowie Bad Homburg. In der Praxisgemeinschaft Sanexio im Westend bietet sie zusätzlich physiotherapeutische und naturheilkundliche Sprechstunden an.

    Ihr Behandlungsspektrum verbindet klassische Physiotherapie mit craniosacraler Osteopathie, Neuraltherapie und manueller Lymphdrainage. Die Lymphdrainage erlernte sie an der Földi Klinik Hinterzarten — einer der führenden europäischen Fachkliniken für Lymphologie. Indikationsschwerpunkte sind Erkrankungen aus den Bereichen Neurologie und vegetatives Nervensystem, Herz-Kreislauf, Atemwege und HNO sowie Augenheilkunde; ergänzt um Muskel-, Weichteil- und Bandscheibenschmerzen einschließlich Fibromyalgie.

    Termine in der Praxisgemeinschaft Sanexio sind telefonisch buchbar.
