      de: |
        <!-- wp:paragraph -->
        <p>Das Praxiszentrum Dr. Stracke &amp; Kollegen ist an zwei Standorten im Frankfurter Westend für Sie da. Das vollständige medizinische Leistungsspektrum erhalten Sie an beiden Standorten.</p>
        <!-- /wp:paragraph -->

        <!-- wp:heading {"level":2} -->
        <h2>Hauptpraxis — Leerbachstraße</h2>
        <!-- /wp:heading -->

        <!-- wp:paragraph -->
        <p>Leerbachstraße 14<br>60322 Frankfurt am Main<br>Telefon: <a href="tel:+4969920205960">069 920205960</a></p>
        <!-- /wp:paragraph -->

        <!-- wp:paragraph -->
        <p>Unsere Hauptpraxis mit 17 Behandlungsräumen und dem kompletten internistischen, hausärztlichen und fachärztlichen Leistungsspektrum. Weitere Informationen finden Sie unter <a href="/kontakt/">Kontakt</a>.</p>
        <!-- /wp:paragraph -->

        <!-- wp:heading {"level":2} -->
        <h2>Zweigpraxis — Bockenheimer Landstraße (Eterno Windows)</h2>
        <!-- /wp:heading -->

        <!-- wp:paragraph -->
        <p>Bockenheimer Landstraße 33<br>60325 Frankfurt am Main (Windows Gebäude, 5. OG bei Eterno)<br>Telefon: <a href="tel:+4969363937600">069 363937600</a></p>
        <!-- /wp:paragraph -->

        <!-- wp:paragraph -->
        <p>An unserem zweiten Standort erhalten Sie das gleiche Leistungsspektrum in einer modernen Atmosphäre. <a href="/standorte/zweigpraxis-bockenheimer/">Mehr zur Zweigpraxis erfahren →</a></p>
        <!-- /wp:paragraph -->

        <!-- wp:heading {"level":2} -->
        <h2>Anfahrt</h2>
        <!-- /wp:heading -->

        <!-- wp:paragraph -->
        <p>Beide Standorte liegen im Frankfurter Westend und sind mit ÖPNV (U-Bahn Westend / Grüneburgweg) sowie mit dem Auto gut erreichbar.</p>
        <!-- /wp:paragraph -->

