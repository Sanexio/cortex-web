        <div class="wp-block-media-text is-stacked-on-mobile"><figure class="wp-block-media-text__media"><img src="/wp-content/uploads/2023/08/Raum-10-2000x1500-1-1024x768.jpeg" alt="Behandlungsraum der Zweigpraxis Bockenheimer Landstraße" class="wp-image-9431 size-full"/></figure><div class="wp-block-media-text__content"><!-- wp:paragraph -->
        <p>An unserem zweiten Standort erhalten Sie das gleiche medizinische Leistungsspektrum wie in der Leerbachstraße in einer modernen, ansprechenden Atmosphäre. Sie finden uns in der Bockenheimer Landstraße 33 im Windows-Gebäude im 5. Stock bei Eterno. Eterno stellt uns die Räumlichkeiten zur Verfügung — Sie bleiben weiterhin Patienten bei uns.</p>
