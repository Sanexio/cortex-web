  - type: body
    body_html:
      de: |-
        <p>Bei jungen Männern hat die Prostata etwa die Größe einer Walnuss und wiegt rund 20 Gramm. Mit zunehmendem Alter kann sich die Prostata vergrößern, was zu Beschwerden wie häufigem Harndrang, schwachem Harnstrahl oder unvollständiger Blasenentleerung führen kann. Prostatakrebs ist eine der häufigsten Krebsarten beim Mann.</p>

        <p>Bei der Untersuchung messen wir die Größe Ihrer Prostata, bestimmen das Restharnvolumen und beurteilen Harnblase und Prostata auf Auffälligkeiten.</p>

        <h2>Wie wird die Untersuchung durchgeführt?</h2>

        <p>Während Sie entspannt auf einer Liege ruhen, führen wir die Sonographie der Prostata und der Harnblase durch. Es ist günstig, mit gefüllter Blase zur Untersuchung zu kommen.</p>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
