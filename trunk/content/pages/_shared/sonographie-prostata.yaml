  - type: body
    body_html:
      de: |-
        <p>Bei jungen Männern hat die Prostata etwa die Größe einer Walnuss und wiegt rund 20 Gramm. Mit zunehmendem Alter kann sich die Prostata vergrößern, was zu Beschwerden wie häufigem Harndrang, schwachem Harnstrahl oder unvollständiger Blasenentleerung führen kann. Prostatakrebs ist eine der häufigsten Krebsarten beim Mann.</p>

        <p>Bei der Untersuchung messen wir die Größe Ihrer Prostata, bestimmen das Restharnvolumen und beurteilen Harnblase und Prostata auf Auffälligkeiten.</p>

        <h2>Wie wird die Untersuchung durchgeführt?</h2>

        <p>Während Sie entspannt auf einer Liege ruhen, führen wir die Sonographie der Prostata und der Harnblase durch. Es ist günstig, mit gefüllter Blase zur Untersuchung zu kommen.</p>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      en: |-
        <p>In young men the prostate is about the size of a walnut and weighs around 20 grams. With increasing age the prostate can enlarge, which may lead to complaints such as frequent urination, a weak stream or incomplete bladder emptying. Prostate cancer is one of the most common cancers in men.</p>

        <p>During the examination we measure the size of your prostate, determine the residual urine volume and check bladder and prostate for abnormalities.</p>

        <h2>How is the examination carried out?</h2>

        <p>While you rest comfortably on a couch, we perform the ultrasound of the prostate and bladder. It is helpful to come to the examination with a full bladder.</p>

        <p>At the end of the examination you receive your personal findings report.</p>
      fr: |-
        <p>Chez les jeunes hommes, la prostate a environ la taille d’une noix et pèse près de 20 grammes. Avec l’âge, la prostate peut s’hypertrophier, ce qui peut entraîner des troubles comme une pollakiurie, un jet urinaire faible ou une vidange vésicale incomplète. Le cancer de la prostate est l’un des cancers les plus fréquents chez l’homme.</p>

        <p>Lors de l’examen, nous mesurons le volume de votre prostate, déterminons le résidu post-mictionnel et examinons vessie et prostate à la recherche d’anomalies.</p>

        <h2>Comment se déroule l’examen ?</h2>

        <p>Pendant que vous êtes confortablement allongé sur la table, nous réalisons l’échographie de la prostate et de la vessie. Il est préférable de venir à l’examen avec la vessie pleine.</p>

        <p>À la fin de l’examen, vous recevez votre compte rendu personnel.</p>
      es: |-
        <p>En los hombres jóvenes la próstata tiene aproximadamente el tamaño de una nuez y pesa unos 20 gramos. Con la edad, la próstata puede aumentar de tamaño, lo que puede provocar molestias como urgencia urinaria frecuente, chorro miccional débil o vaciado incompleto de la vejiga. El cáncer de próstata es uno de los cánceres más frecuentes en el hombre.</p>

        <p>Durante la exploración medimos el volumen de su próstata, determinamos el residuo posmiccional y valoramos la vejiga y la próstata en busca de alteraciones.</p>

        <h2>¿Cómo se realiza la exploración?</h2>

        <p>Mientras descansa cómodamente en una camilla, realizamos la ecografía de próstata y vejiga. Es conveniente acudir con la vejiga llena.</p>

        <p>Al finalizar recibe su informe personal.</p>
      it: |-
        <p>Negli uomini giovani la prostata ha all'incirca le dimensioni di una noce e pesa circa 20 grammi. Con l'avanzare dell'età la prostata può ingrandirsi, causando disturbi come pollachiuria, getto urinario debole o svuotamento vescicale incompleto. Il carcinoma prostatico è uno dei tumori più frequenti nell'uomo.</p>

        <p>Durante l'esame misuriamo il volume della sua prostata, determiniamo il residuo post-minzionale e valutiamo vescica e prostata alla ricerca di alterazioni.</p>

        <h2>Come si svolge l'esame?</h2>

        <p>Mentre lei riposa rilassato sul lettino, eseguiamo l'ecografia di prostata e vescica. È preferibile presentarsi con la vescica piena.</p>

        <p>Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: |-
        <p>Em homens jovens a próstata tem aproximadamente o tamanho de uma noz e pesa cerca de 20 gramas. Com o avançar da idade a próstata pode aumentar, originando queixas como urgência miccional frequente, jacto urinário fraco ou esvaziamento vesical incompleto. O cancro da próstata é um dos cancros mais frequentes no homem.</p>

        <p>Durante o exame medimos o volume da sua próstata, determinamos o resíduo pós-miccional e avaliamos a bexiga e a próstata em busca de alterações.</p>

        <h2>Como é realizado o exame?</h2>

        <p>Enquanto descansa relaxado na maca, realizamos a ecografia da próstata e da bexiga. É preferível comparecer com a bexiga cheia.</p>

        <p>No final do exame recebe o seu relatório pessoal.</p>
