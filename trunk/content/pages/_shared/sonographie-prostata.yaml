      de: Ultraschall von Prostata und Harnblase — Größe, Restharn und Raumforderungen beurteilen.
      en: Ultrasound of prostate and bladder — assess size, residual urine and space-occupying lesions.
      fr: Échographie de la prostate et de la vessie — évaluer volume, résidu post-mictionnel et lésions occupant de l’espace.
      es: Ecografía de próstata y vejiga — valorar volumen, residuo posmiccional y lesiones ocupantes de espacio.
