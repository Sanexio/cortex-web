  - type: body
    body_html:
      de: |-
        <p>Bei jungen Männern hat die Prostata etwa die Größe einer Walnuss und wiegt rund 20 Gramm. Mit zunehmendem Alter kann sich die Prostata vergrößern, was zu Beschwerden wie häufigem Harndrang, schwachem Harnstrahl oder unvollständiger Blasenentleerung führen kann. Prostatakrebs ist eine der häufigsten Krebsarten beim Mann.</p>

        <p>Bei der Untersuchung messen wir die Größe Ihrer Prostata, bestimmen das Restharnvolumen und beurteilen Harnblase und Prostata auf Auffälligkeiten.</p>

        <h2>Wie wird die Untersuchung durchgeführt?</h2>

        <p>Während Sie entspannt auf einer Liege ruhen, führen wir die Sonographie der Prostata und der Harnblase durch. Es ist günstig, mit gefüllter Blase zur Untersuchung zu kommen.</p>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      it: |-
        <p>Negli uomini giovani la prostata ha all'incirca le dimensioni di una noce e pesa circa 20 grammi. Con l'avanzare dell'età la prostata può ingrandirsi, causando disturbi come pollachiuria, getto urinario debole o svuotamento vescicale incompleto. Il carcinoma prostatico è uno dei tumori più frequenti nell'uomo.</p>

        <p>Durante l'esame misuriamo il volume della sua prostata, determiniamo il residuo post-minzionale e valutiamo vescica e prostata alla ricerca di alterazioni.</p>

        <h2>Come si svolge l'esame?</h2>

        <p>Mentre lei riposa rilassato sul lettino, eseguiamo l'ecografia di prostata e vescica. È preferibile presentarsi con la vescica piena.</p>

        <p>Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: |-
        <p>Em homens jovens a próstata tem aproximadamente o tamanho de uma noz e pesa cerca de 20 gramas. Com o avançar da idade a próstata pode aumentar, originando queixas como urgência miccional frequente, jacto urinário fraco ou esvaziamento vesical incompleto. O cancro da próstata é um dos cancros mais frequentes no homem.</p>

        <p>Durante o exame medimos o volume da sua próstata, determinamos o resíduo pós-miccional e avaliamos a bexiga e a próstata em busca de alterações.</p>

        <h2>Como é realizado o exame?</h2>

        <p>Enquanto descansa relaxado na maca, realizamos a ecografia da próstata e da bexiga. É preferível comparecer com a bexiga cheia.</p>

        <p>No final do exame recebe o seu relatório pessoal.</p>
