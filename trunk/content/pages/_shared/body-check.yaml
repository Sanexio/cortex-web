  - type: body
    body_html:
      de: >-
        <p>Der Body-Check ist eine strukturierte ärztliche Bestandsaufnahme Ihres aktuellen
        Gesundheitszustandes. Geeignet sowohl für sportlich aktive Patientinnen und Patienten als
        auch zur Vorsorge.</p>


        <h2>Wie wird die Untersuchung durchgeführt?</h2>


        <p>Eine Ärztin oder ein Arzt führt eine ausführliche Anamnese (Gesundheitsgespräch) sowie
        eine vollständige klinische Untersuchung durch. Dazu gehört ein 12-Kanal-EKG sowie ein
        Urintest. Bringen Sie zu diesem Termin auch Ihren Impfpass mit — wir prüfen den Impfstatus
        gleich mit.</p>


        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      it: >-
        <p>Il Body-Check è un bilancio medico strutturato del suo stato di salute attuale. Adatto
        sia ai pazienti sportivamente attivi sia come strumento di prevenzione.</p>


        <h2>Come si svolge l'esame?</h2>


        <p>Una medica o un medico esegue un'anamnesi approfondita (colloquio sanitario) e un
        esame clinico completo. Il pacchetto comprende un ECG a 12 derivazioni e un'analisi delle
        urine. Porti con sé anche il libretto delle vaccinazioni — verifichiamo subito lo stato
        vaccinale.</p>


        <p>Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: >-
        <p>O Body-Check é um balanço médico estruturado do seu estado de saúde actual. Indicado
        tanto para pacientes desportivamente activos como para prevenção.</p>


        <h2>Como é realizado o exame?</h2>


        <p>Uma médica ou um médico realiza uma anamnese aprofundada (entrevista clínica) e um
        exame clínico completo. Inclui um ECG de 12 derivações e uma análise de urina. Traga
        também o seu boletim de vacinas — verificamos de imediato o estado vacinal.</p>


        <p>No final do exame recebe o seu relatório pessoal.</p>
