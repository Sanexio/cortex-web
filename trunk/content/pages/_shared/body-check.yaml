      de: |-
        <p>Der Body-Check ist eine strukturierte ärztliche Bestandsaufnahme Ihres aktuellen Gesundheitszustandes. Geeignet sowohl für sportlich aktive Patientinnen und Patienten als auch zur Vorsorge.</p>

        <h2>Wie wird die Untersuchung durchgeführt?</h2>

        <p>Eine Ärztin oder ein Arzt führt eine ausführliche Anamnese (Gesundheitsgespräch) sowie eine vollständige klinische Untersuchung durch. Dazu gehört ein 12-Kanal-EKG sowie ein Urintest. Bringen Sie zu diesem Termin auch Ihren Impfpass mit — wir prüfen den Impfstatus gleich mit.</p>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
