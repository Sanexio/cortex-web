  - type: body
    body_html:
      de: >-
        <p>Der Body-Check ist eine strukturierte ärztliche Bestandsaufnahme Ihres aktuellen
        Gesundheitszustandes. Geeignet sowohl für sportlich aktive Patientinnen und Patienten als
        auch zur Vorsorge.</p>


        <h2>Wie wird die Untersuchung durchgeführt?</h2>


        <p>Eine Ärztin oder ein Arzt führt eine ausführliche Anamnese (Gesundheitsgespräch) sowie
        eine vollständige klinische Untersuchung durch. Dazu gehört ein 12-Kanal-EKG sowie ein
        Urintest. Bringen Sie zu diesem Termin auch Ihren Impfpass mit — wir prüfen den Impfstatus
        gleich mit.</p>


        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      en: >-
        <p>The Body-Check is a structured medical inventory of your current state of health. Suitable
        both for sports-active patients and as a preventive check.</p>


        <h2>How is the examination carried out?</h2>


        <p>A doctor takes a thorough medical history (health interview) and performs a full clinical
        examination. This includes a 12-lead ECG and a urine test. Please also bring your vaccination
        card to this appointment — we check your vaccination status at the same time.</p>


        <p>At the end of the examination you receive your personal findings report.</p>
      fr: >-
        <p>Le Body-Check est un bilan médical structuré de votre état de santé actuel. Adapté aussi
        bien aux patient·e·s actifs sur le plan sportif qu’à un bilan de prévention.</p>


        <h2>Comment se déroule l’examen ?</h2>


        <p>Une médecin ou un médecin réalise une anamnèse approfondie (entretien médical) et un
        examen clinique complet. Cela comprend un ECG à 12 dérivations ainsi qu’une analyse
        d’urine. Apportez également votre carnet de vaccination — nous vérifions immédiatement
        votre statut vaccinal.</p>


        <p>À la fin de l’examen, vous recevez votre compte rendu personnel.</p>
      es: >-
        <p>El Body-Check es un balance médico estructurado de su estado de salud actual. Adecuado
        tanto para pacientes deportivamente activos como para un chequeo preventivo.</p>


        <h2>¿Cómo se realiza la exploración?</h2>


        <p>Una médica o un médico realiza una anamnesis detallada (entrevista clínica) y una
        exploración clínica completa. Incluye un ECG de 12 derivaciones y un análisis de orina.
        Traiga también su cartilla de vacunación — comprobamos su estado vacunal en el mismo
        momento.</p>


        <p>Al finalizar recibe su informe personal.</p>
      it: >-
        <p>Il Body-Check è un bilancio medico strutturato del suo stato di salute attuale. Adatto
        sia ai pazienti sportivamente attivi sia come strumento di prevenzione.</p>


        <h2>Come si svolge l'esame?</h2>


        <p>Una medica o un medico esegue un'anamnesi approfondita (colloquio sanitario) e un
        esame clinico completo. Il pacchetto comprende un ECG a 12 derivazioni e un'analisi delle
        urine. Porti con sé anche il libretto delle vaccinazioni — verifichiamo subito lo stato
        vaccinale.</p>


        <p>Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: >-
        <p>O Body-Check é um balanço médico estruturado do seu estado de saúde actual. Indicado
        tanto para pacientes desportivamente activos como para prevenção.</p>


        <h2>Como é realizado o exame?</h2>


        <p>Uma médica ou um médico realiza uma anamnese aprofundada (entrevista clínica) e um
        exame clínico completo. Inclui um ECG de 12 derivações e uma análise de urina. Traga
        também o seu boletim de vacinas — verificamos de imediato o estado vacinal.</p>


        <p>No final do exame recebe o seu relatório pessoal.</p>
