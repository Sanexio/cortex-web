  body_md:
    de: 'Der Body Check ist eine kompakte Standortbestimmung Ihres Gesundheitszustandes — geeignet sowohl für sportlich aktive Menschen als auch für eine allgemeine Vorsorge.


      Wie wir vorgehen: An diesem Termin führen wir eine ärztliche Beratung sowie eine vollständige klinische Untersuchung inklusive 12-Kanal-EKG und Urintest durch. Bitte bringen Sie Ihren Impfausweis
      mit — wir prüfen bei dieser Gelegenheit auch Ihren Impfstatus.


      Im Anschluss besprechen wir die Befunde persönlich mit Ihnen.'
