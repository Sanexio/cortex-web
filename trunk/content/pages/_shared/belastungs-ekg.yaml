  - type: body
    body_html:
      de: |-
        <p>Das Belastungs-EKG (Ergometrie) prüft die Belastungsfähigkeit Ihres Herzens. Während der Untersuchung kann das Herz bis zu dreimal pro Sekunde schlagen und das Blut durch das gesamte Gefäßsystem von rund 100.000 Kilometern Länge pumpen.</p>

        <h2>Wie wird die Untersuchung durchgeführt?</h2>

        <p>Sie fahren auf einem Ergometer (stationäres Fahrrad). Alle zwei Minuten erhöhen wir die Wattzahl. Während der gesamten Untersuchung schreiben wir ein EKG und überwachen Blutdruck und Sauerstoffsättigung. Über Telemonitoring wird das EKG durchgehend von einer Ärztin oder einem Arzt überwacht.</p>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
