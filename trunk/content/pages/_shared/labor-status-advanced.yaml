    lead:
      de: 'Erweiterter Check — erweiterter Bluttest mit detaillierter Beurteilung zentraler Körperfunktionen.'
      en: 'Status Advanced — extended blood test with a detailed assessment of central body functions.'
      fr: 'Status Advanced — bilan sanguin étendu avec une évaluation détaillée des fonctions corporelles principales.'
      es: 'Status Advanced — análisis de sangre ampliado con una valoración detallada de las funciones corporales centrales.'
      it: 'Status Advanced — esame del sangue esteso con valutazione dettagliata delle principali funzioni corporee.'
      pt-pt: 'Status Advanced — análise ao sangue alargada com avaliação detalhada das principais funções corporais.'
    image: shopify-mirror://detail/labor-status-advanced-hero.png
  - type: body
    body_html:
      de: |-
        <p>Das Laborprofil <strong>Erweiterter Check</strong> erweitert das Profil <em>Basis-Check</em> um eine detailliertere Beurteilung zentraler Körperfunktionen. Sie erhalten damit einen deutlich vertieften Überblick über zentrale Stoffwechsel-, Leber-, Nieren- und Immunparameter.</p>

        <h2>Wir analysieren folgende Parameter:</h2>

        <ul>
        <li>Gesamt-Cholesterin, LDL, HDL, Triglyzeride (kardiovaskuläres Risikoprofil)</li>
        <li>HbA1c (Langzeitblutzucker)</li>
        <li>Kreatinin und Harnstoff (Nierenfunktion)</li>
        <li>GOT, GPT, GGT, Bilirubin, CHE (Leberfunktion)</li>
        <li>Blutbild zur Erfassung von Veränderungen der Blutzellen</li>
        <li>Spezielles Differentialblutbild zur Aufschlüsselung der weißen Blutzellen</li>
        <li>Harnsäure (Hinweis auf beginnende Gicht)</li>
        </ul>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      en: |-
        <p>The lab profile <strong>Status Advanced</strong> extends the <em>Status Baseline</em> profile with a more detailed assessment of central body functions. You receive a much deeper overview of central metabolic, liver, kidney and immune parameters.</p>

        <h2>We analyse the following parameters:</h2>

        <ul>
        <li>Total cholesterol, LDL, HDL, triglycerides (cardiovascular risk profile)</li>
        <li>HbA1c (long-term glucose)</li>
        <li>Creatinine and urea (kidney function)</li>
        <li>AST (GOT), ALT (GPT), GGT, bilirubin, CHE (liver function)</li>
        <li>Blood count to detect changes in blood cells</li>
        <li>Special differential blood count for the breakdown of white blood cells</li>
        <li>Uric acid (indication of early gout)</li>
        </ul>

        <p>At the end of the examination you receive your personal findings report.</p>
      fr: |-
        <p>Le profil de laboratoire <strong>Status Advanced</strong> étend le profil <em>Status Baseline</em> avec une évaluation plus détaillée des fonctions corporelles principales. Vous obtenez ainsi une vision nettement plus approfondie des paramètres centraux du métabolisme, du foie, des reins et du système immunitaire.</p>

        <h2>Nous analysons les paramètres suivants :</h2>

        <ul>
        <li>Cholestérol total, LDL, HDL, triglycérides (profil de risque cardiovasculaire)</li>
        <li>HbA1c (glycémie à long terme)</li>
        <li>Créatinine et urée (fonction rénale)</li>
        <li>ASAT, ALAT, GGT, bilirubine, cholinestérase (fonction hépatique)</li>
        <li>Numération sanguine pour détecter des modifications cellulaires</li>
        <li>Formule leucocytaire détaillée</li>
        <li>Acide urique (indice de goutte débutante)</li>
        </ul>

        <p>À la fin de l’examen, vous recevez votre compte rendu personnel.</p>
      es: |-
        <p>El perfil de laboratorio <strong>Status Advanced</strong> amplía el <em>Status Baseline</em> con una valoración más detallada de las funciones corporales centrales. Obtiene una visión claramente más profunda de los parámetros centrales del metabolismo, hígado, riñones y sistema inmunitario.</p>

        <h2>Analizamos los siguientes parámetros:</h2>

        <ul>
        <li>Colesterol total, LDL, HDL, triglicéridos (perfil de riesgo cardiovascular)</li>
        <li>HbA1c (glucemia a largo plazo)</li>
        <li>Creatinina y urea (función renal)</li>
        <li>GOT, GPT, GGT, bilirrubina, CHE (función hepática)</li>
        <li>Hemograma para detectar alteraciones de las células sanguíneas</li>
        <li>Fórmula leucocitaria diferencial</li>
        <li>Ácido úrico (indicio de gota incipiente)</li>
        </ul>

        <p>Al finalizar recibe su informe personal.</p>
      it: |-
        <p>Il profilo di laboratorio <strong>Status Advanced</strong> amplia il profilo <em>Status Baseline</em> con una valutazione più dettagliata delle principali funzioni corporee. Riceve così una panoramica significativamente più approfondita su parametri centrali del metabolismo, di fegato, reni e sistema immunitario.</p>

        <h2>Analizziamo i seguenti parametri:</h2>

        <ul>
        <li>Colesterolo totale, LDL, HDL, trigliceridi (profilo di rischio cardiovascolare)</li>
        <li>HbA1c (glicemia a lungo termine)</li>
        <li>Creatinina e urea (funzione renale)</li>
        <li>GOT, GPT, GGT, bilirubina, colinesterasi (funzione epatica)</li>
        <li>Emocromo per la rilevazione di alterazioni delle cellule del sangue</li>
        <li>Formula leucocitaria differenziale per la distinzione dei globuli bianchi</li>
        <li>Acido urico (indicazione di gotta iniziale)</li>
        </ul>

        <p>Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: |-
        <p>O perfil laboratorial <strong>Status Advanced</strong> alarga o perfil <em>Status Baseline</em> com uma avaliação mais detalhada das principais funções corporais. Recebe assim uma visão significativamente mais aprofundada de parâmetros centrais do metabolismo, do fígado, dos rins e do sistema imunitário.</p>

        <h2>Analisamos os seguintes parâmetros:</h2>

        <ul>
        <li>Colesterol total, LDL, HDL, triglicéridos (perfil de risco cardiovascular)</li>
        <li>HbA1c (glicémia a longo prazo)</li>
        <li>Creatinina e ureia (função renal)</li>
        <li>GOT, GPT, GGT, bilirrubina, colinesterase (função hepática)</li>
        <li>Hemograma para detecção de alterações das células sanguíneas</li>
        <li>Fórmula leucocitária diferencial para distinção dos glóbulos brancos</li>
        <li>Ácido úrico (indicação de gota inicial)</li>
        </ul>

        <p>No final do exame recebe o seu relatório pessoal.</p>
