      de: 'Erweiterter Check — erweiterter Bluttest mit detaillierter Beurteilung zentraler Körperfunktionen.'
    image: shopify-mirror://detail/labor-status-advanced-hero.png
  - type: body
    body_html:
      de: |-
        <p>Das Laborprofil <strong>Erweiterter Check</strong> erweitert das Profil <em>Basis-Check</em> um eine detailliertere Beurteilung zentraler Körperfunktionen. Sie erhalten damit einen deutlich vertieften Überblick über zentrale Stoffwechsel-, Leber-, Nieren- und Immunparameter.</p>

        <h2>Wir analysieren folgende Parameter:</h2>

        <ul>
        <li>Gesamt-Cholesterin, LDL, HDL, Triglyzeride (kardiovaskuläres Risikoprofil)</li>
        <li>HbA1c (Langzeitblutzucker)</li>
        <li>Kreatinin und Harnstoff (Nierenfunktion)</li>
        <li>GOT, GPT, GGT, Bilirubin, CHE (Leberfunktion)</li>
        <li>Blutbild zur Erfassung von Veränderungen der Blutzellen</li>
        <li>Spezielles Differentialblutbild zur Aufschlüsselung der weißen Blutzellen</li>
        <li>Harnsäure (Hinweis auf beginnende Gicht)</li>
        </ul>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
