    de: Extended Health Readout — vertiefter Überblick über zentrale Körperfunktionen.
- type: body
  body_md:
    de: 'Status Advanced erweitert den Baseline-Check um eine detailliertere Beurteilung. Sie erhalten einen vertieften Überblick über Ihren aktuellen Gesundheitszustand.


      Analysierte Parameter: vollständiger Fettstoffwechsel (Gesamt-Cholesterin, LDL, HDL, Triglyzeride), HbA1c (Diabetes-Marker), Nierenfunktion (Kreatinin und Harnstoff), Leberfunktion (GOT, GPT, GGT,
      Bilirubin, CHE), Blutbild mit Differenzialblutbild sowie Harnsäure als Hinweis auf eine Gicht-Disposition.


      Im Anschluss besprechen wir die Werte persönlich mit Ihnen.'
