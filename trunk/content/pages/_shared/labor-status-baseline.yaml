  - type: body
    body_html:
      de: |-
        <p>Das Laborprofil <strong>Basis-Check</strong> ist ein schneller Bluttest zur orientierenden Einschätzung zentraler Organfunktionen sowie des Zucker- und Fettstoffwechsels. Bereits mit einem kleinen Piks erhalten Sie eine erste Einschätzung relevanter Laborwerte, die frühzeitig Hinweise auf Belastungen von Herz, Gefäßen, Leber und Nieren geben können.</p>

        <h2>Wir analysieren folgende Parameter:</h2>

        <ul>
        <li>LDL-Cholesterin (kardiovaskuläres Risikoprofil)</li>
        <li>HbA1c (Langzeitblutzucker)</li>
        <li>Kreatinin (Nierenfunktion)</li>
        <li>Gamma-GT (Leberfunktion)</li>
        <li>Blutbild zur Erfassung von Veränderungen der Blutzellen</li>
        </ul>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
