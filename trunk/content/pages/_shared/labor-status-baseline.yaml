    lead:
      de: 'Basis-Check — Bluttest zur orientierenden Einschätzung zentraler Organfunktionen.'
      en: 'Basis-Check — blood test for an orienting assessment of central organ functions.'
      fr: 'Basis-Check — bilan sanguin pour une évaluation d''orientation des principales fonctions d''organe.'
      es: 'Basis-Check — análisis de sangre para una valoración orientadora de las funciones de órgano centrales.'
      it: 'Basis-Check — esame del sangue per una valutazione orientativa delle principali funzioni d''organo.'
      pt-pt: 'Basis-Check — análise ao sangue para uma avaliação orientadora das principais funções de órgão.'
    image: shopify-mirror://detail/labor-status-baseline-hero.png
  - type: body
    body_html:
      de: |-
        <p>Das Laborprofil <strong>Basis-Check</strong> dient der orientierenden Einschätzung zentraler Organfunktionen sowie des Zucker- und Fettstoffwechsels. Bestimmt werden Laborwerte, die Hinweise auf Belastungen von Herz, Gefäßen, Leber und Nieren geben können.</p>

        <h2>Wir analysieren folgende Parameter:</h2>

        <ul>
        <li>LDL-Cholesterin (kardiovaskuläres Risikoprofil)</li>
        <li>HbA1c (Langzeitblutzucker)</li>
        <li>Kreatinin (Nierenfunktion)</li>
        <li>Gamma-GT (Leberfunktion)</li>
        <li>Blutbild zur Erfassung von Veränderungen der Blutzellen</li>
        </ul>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      en: |-
        <p>The lab profile <strong>Basis-Check</strong> serves as an orienting assessment of central organ functions and of glucose and lipid metabolism. The values determined can give early signs of strain on heart, vessels, liver and kidneys.</p>

        <h2>We analyse the following parameters:</h2>

        <ul>
        <li>LDL cholesterol (cardiovascular risk profile)</li>
        <li>HbA1c (long-term glucose)</li>
        <li>Creatinine (kidney function)</li>
        <li>Gamma-GT (liver function)</li>
        <li>Blood count to detect changes in blood cells</li>
        </ul>

        <p>At the end of the examination you receive your personal findings report.</p>
      fr: |-
        <p>Le profil de laboratoire <strong>Basis-Check</strong> sert d’évaluation d’orientation des principales fonctions d’organe ainsi que du métabolisme glucidique et lipidique. Les valeurs déterminées peuvent indiquer précocement une sollicitation du cœur, des vaisseaux, du foie et des reins.</p>

        <h2>Nous analysons les paramètres suivants :</h2>

        <ul>
        <li>Cholestérol LDL (profil de risque cardiovasculaire)</li>
        <li>HbA1c (glycémie à long terme)</li>
        <li>Créatinine (fonction rénale)</li>
        <li>Gamma-GT (fonction hépatique)</li>
        <li>Numération sanguine pour détecter les modifications des cellules</li>
        </ul>

        <p>À la fin de l’examen, vous recevez votre compte rendu personnel.</p>
      es: |-
        <p>El perfil de laboratorio <strong>Basis-Check</strong> sirve como valoración orientadora de las funciones de órgano centrales y del metabolismo glucídico y lipídico. Los valores determinados pueden indicar tempranamente sobrecarga del corazón, los vasos, el hígado y los riñones.</p>

        <h2>Analizamos los siguientes parámetros:</h2>

        <ul>
        <li>Colesterol LDL (perfil de riesgo cardiovascular)</li>
        <li>HbA1c (glucemia a largo plazo)</li>
        <li>Creatinina (función renal)</li>
        <li>Gamma-GT (función hepática)</li>
        <li>Hemograma para detectar alteraciones de las células sanguíneas</li>
        </ul>

        <p>Al finalizar recibe su informe personal.</p>
      it: |-
        <p>Il profilo di laboratorio <strong>Basis-Check</strong> serve come valutazione orientativa delle principali funzioni d'organo e del metabolismo glucidico e lipidico. I valori determinati possono segnalare precocemente sollecitazioni di cuore, vasi, fegato e reni.</p>

        <h2>Analizziamo i seguenti parametri:</h2>

        <ul>
        <li>Colesterolo LDL (profilo di rischio cardiovascolare)</li>
        <li>HbA1c (glicemia a lungo termine)</li>
        <li>Creatinina (funzione renale)</li>
        <li>Gamma-GT (funzione epatica)</li>
        <li>Emocromo per la rilevazione di alterazioni delle cellule del sangue</li>
        </ul>

        <p>Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: |-
        <p>O perfil laboratorial <strong>Basis-Check</strong> serve como avaliação orientadora das principais funções de órgão e do metabolismo do açúcar e das gorduras. Os valores determinados podem sinalizar precocemente sobrecargas do coração, dos vasos, do fígado e dos rins.</p>

        <h2>Analisamos os seguintes parâmetros:</h2>

        <ul>
        <li>Colesterol LDL (perfil de risco cardiovascular)</li>
        <li>HbA1c (glicémia a longo prazo)</li>
        <li>Creatinina (função renal)</li>
        <li>Gama-GT (função hepática)</li>
        <li>Hemograma para detecção de alterações das células sanguíneas</li>
        </ul>

        <p>No final do exame recebe o seu relatório pessoal.</p>
