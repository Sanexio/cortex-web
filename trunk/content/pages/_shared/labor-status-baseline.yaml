  - type: body
    body_html:
      de: |-
        <p>Das Laborprofil <strong>Basis-Check</strong> ist ein schneller Bluttest zur orientierenden Einschätzung zentraler Organfunktionen sowie des Zucker- und Fettstoffwechsels. Bereits mit einem kleinen Piks erhalten Sie eine erste Einschätzung relevanter Laborwerte, die frühzeitig Hinweise auf Belastungen von Herz, Gefäßen, Leber und Nieren geben können.</p>

        <h2>Wir analysieren folgende Parameter:</h2>

        <ul>
        <li>LDL-Cholesterin (kardiovaskuläres Risikoprofil)</li>
        <li>HbA1c (Langzeitblutzucker)</li>
        <li>Kreatinin (Nierenfunktion)</li>
        <li>Gamma-GT (Leberfunktion)</li>
        <li>Blutbild zur Erfassung von Veränderungen der Blutzellen</li>
        </ul>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      it: |-
        <p>Il profilo di laboratorio <strong>Status Baseline</strong> è un esame del sangue rapido per un orientamento iniziale su importanti funzioni d'organo e sul metabolismo glucidico e lipidico. Già con un piccolo prelievo riceve una prima valutazione di valori rilevanti, capaci di segnalare precocemente sollecitazioni di cuore, vasi, fegato e reni.</p>

        <h2>Analizziamo i seguenti parametri:</h2>

        <ul>
        <li>Colesterolo LDL (profilo di rischio cardiovascolare)</li>
        <li>HbA1c (glicemia a lungo termine)</li>
        <li>Creatinina (funzione renale)</li>
        <li>Gamma-GT (funzione epatica)</li>
        <li>Emocromo per la rilevazione di alterazioni delle cellule del sangue</li>
        </ul>

        <p>Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: |-
        <p>O perfil laboratorial <strong>Status Baseline</strong> é uma análise ao sangue rápida para uma avaliação orientadora de funções centrais de órgãos e do metabolismo do açúcar e das gorduras. Já com uma pequena picada recebe uma primeira leitura de valores relevantes, capazes de sinalizar precocemente sobrecargas do coração, dos vasos, do fígado e dos rins.</p>

        <h2>Analisamos os seguintes parâmetros:</h2>

        <ul>
        <li>Colesterol LDL (perfil de risco cardiovascular)</li>
        <li>HbA1c (glicémia a longo prazo)</li>
        <li>Creatinina (função renal)</li>
        <li>Gama-GT (função hepática)</li>
        <li>Hemograma para detecção de alterações das células sanguíneas</li>
        </ul>

        <p>No final do exame recebe o seu relatório pessoal.</p>
