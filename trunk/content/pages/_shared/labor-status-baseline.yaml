    lead:
      de: 'Basis-Check — Bluttest zur orientierenden Einschätzung zentraler Organfunktionen.'
      en: 'Status Baseline — quick blood test for an initial overview of key organ functions.'
      fr: 'Status Baseline — bilan sanguin rapide pour une orientation sur les principales fonctions d’organe.'
      es: 'Status Baseline — análisis de sangre rápido para una valoración orientadora de las principales funciones de órgano.'
      it: 'Status Baseline — esame del sangue rapido per un orientamento iniziale sulle principali funzioni d''organo.'
