    de: Initial Health Readout — kompakte Standardparameter zur Orientierung.
- type: body
  body_md:
    de: 'Status Baseline ist ein kompakter Bluttest zur Einschätzung zentraler Organfunktionen sowie des Zucker- und Fettstoffwechsels. Mit einer einzigen Blutentnahme erhalten Sie eine erste Orientierung
      — frühe Hinweise auf Belastungen von Herz, Gefäßen, Leber oder Niere.


      Analysierte Parameter: LDL-Cholesterin (kardiovaskuläres Risiko), HbA1c (Diabetes-Hinweis), Kreatinin (Nierenfunktion), GGT (Leberfunktion) sowie ein Blutbild zur Erfassung von Veränderungen der Blutzellen.


      Im Anschluss besprechen wir die Werte persönlich mit Ihnen — keine reinen PDF-Befunde ohne Erklärung.'
