  - type: body
    body_html:
      de: |-
        <p>Beim Eye-Check beurteilen wir Sehkraft, vorderen Augenabschnitt und Augeninnendruck. Auffälligkeiten besprechen wir gemeinsam und überweisen bei Bedarf gezielt zur Augenärztin oder zum Augenarzt.</p>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      en: |-
        <p>In the Eye-Check we assess visual acuity, the anterior segment of the eye and intraocular pressure. We discuss any findings together and refer you in a targeted manner to an ophthalmologist if needed.</p>

        <p>At the end of the examination you receive your personal findings report.</p>
      fr: |-
        <p>Lors de l’Eye-Check, nous évaluons l’acuité visuelle, le segment antérieur de l’œil et la pression intra-oculaire. Nous discutons ensemble des éventuelles anomalies et vous orientons, si nécessaire, vers un ophtalmologiste de manière ciblée.</p>

        <p>À la fin de l’examen, vous recevez votre compte rendu personnel.</p>
      es: |-
        <p>En el Eye-Check valoramos la agudeza visual, el segmento anterior del ojo y la presión intraocular. Comentamos cualquier hallazgo conjuntamente y, si procede, le derivamos de forma dirigida a oftalmología.</p>

        <p>Al finalizar recibe su informe personal.</p>
      it: |-
        <p>Nell'Eye-Check valutiamo l'acuità visiva, il segmento anteriore dell'occhio e la pressione intraoculare. Le eventuali anomalie vengono discusse insieme; se necessario indirizziamo in modo mirato a uno specialista oculista.</p>

        <p>Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: |-
        <p>No Eye-Check avaliamos a acuidade visual, o segmento anterior do olho e a pressão intra-ocular. Discutimos consigo eventuais alterações e, se necessário, encaminhamos de forma dirigida para a oftalmologista ou o oftalmologista.</p>

        <p>No final do exame recebe o seu relatório pessoal.</p>
