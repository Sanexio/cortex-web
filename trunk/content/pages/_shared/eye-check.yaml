      de: Eye-Check — Beurteilung von Sehkraft und vorderem Augenabschnitt.
      en: Eye-Check — assessment of visual acuity and the anterior segment of the eye.
      fr: Eye-Check — évaluation de l’acuité visuelle et du segment antérieur de l’œil.
