  lead:
    de: Ultraschall der Nieren und ableitenden Harnwege — Filtereinheiten Ihres Körpers im Blick.
- type: body
  body_md:
    de: 'Die Nieren reinigen das Blut von Abfallstoffen — pro Tag filtern sie etwa 360 Liter, sodass das gesamte Blutvolumen rund 30-mal täglich durch die Nieren strömt. Bis zu zwei Liter Urin werden pro
      Tag ausgeschieden.


      Bei der Ultraschalluntersuchung beurteilen wir Größe, Struktur und Beschaffenheit der Nieren sowie der ableitenden Harnwege und achten besonders auf verdächtige Raumforderungen, Steine, Stauungen
      oder Zysten.


      Wie wir vorgehen: Sie liegen entspannt auf der Liege, wir führen die Sonographie der Nieren und der ableitenden Harnwege durch. Eine gefüllte Blase erleichtert die Beurteilung. Im Anschluss besprechen
      wir den Befund persönlich mit Ihnen.'
