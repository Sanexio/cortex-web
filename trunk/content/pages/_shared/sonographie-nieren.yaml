  - type: body
    body_html:
      de: |-
        <p>Die Nieren sind die Filtereinheit des Körpers. Pro Tag filtern sie etwa 360 Liter Blut — das gesamte Blutvolumen passiert die Nieren rund 30 Mal täglich. Davon scheiden wir bis zu zwei Liter Urin pro Tag aus.</p>

        <p>Bei der Ultraschalluntersuchung schauen wir gezielt nach Veränderungen, Zysten und Raumforderungen in den Nieren sowie der ableitenden Harnwege bis hin zur Harnblase.</p>

        <h2>Wie wird die Untersuchung durchgeführt?</h2>

        <p>Während Sie entspannt auf einer Liege ruhen, führen wir die Sonographie der Nieren und der ableitenden Harnwege durch. Es ist günstig, mit gefüllter Blase zur Untersuchung zu kommen.</p>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
