    lead:
      de: Ultraschall der Nieren und ableitenden Harnwege — Raumforderungen früh erkennen.
      en: Ultrasound of the kidneys and lower urinary tract — detect space-occupying lesions early.
      fr: Échographie des reins et des voies urinaires — détecter précocement les lésions occupant de l’espace.
      es: Ecografía de los riñones y las vías urinarias — detectar precozmente lesiones ocupantes de espacio.
      it: Ecografia dei reni e delle vie urinarie — riconoscere precocemente le lesioni occupanti spazio.
      pt-pt: Ecografia dos rins e das vias urinárias — reconhecer precocemente lesões expansivas.
    image: shopify-mirror://detail/sonographie-nieren-hero.jpg
  - type: body
    body_html:
      de: |-
        <p>Die Nieren sind die Filtereinheit des Körpers. Pro Tag filtern sie etwa 360 Liter Blut — das gesamte Blutvolumen passiert die Nieren rund 30 Mal täglich. Davon scheiden wir bis zu zwei Liter Urin pro Tag aus.</p>

        <p>Bei der Ultraschalluntersuchung schauen wir gezielt nach Veränderungen, Zysten und Raumforderungen in den Nieren sowie der ableitenden Harnwege bis hin zur Harnblase.</p>

        <h2>Wie wird die Untersuchung durchgeführt?</h2>

        <p>Während Sie entspannt auf einer Liege ruhen, führen wir die Sonographie der Nieren und der ableitenden Harnwege durch. Es ist günstig, mit gefüllter Blase zur Untersuchung zu kommen.</p>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      en: |-
        <p>The kidneys are the body's filter unit. They filter about 360 litres of blood per day — the entire blood volume passes through the kidneys around 30 times daily. From this we excrete up to two litres of urine a day.</p>

        <p>In the ultrasound examination we look specifically for changes, cysts and space-occupying lesions in the kidneys and the lower urinary tract down to the bladder.</p>

        <h2>How is the examination carried out?</h2>

        <p>While you rest comfortably on a couch, we perform the ultrasound of the kidneys and the lower urinary tract. It is helpful to come to the examination with a full bladder.</p>

        <p>At the end of the examination you receive your personal findings report.</p>
      fr: |-
        <p>Les reins sont l’unité de filtration du corps. Ils filtrent chaque jour environ 360 litres de sang — l’ensemble du volume sanguin traverse les reins près de 30 fois par jour. Nous éliminons ainsi jusqu’à deux litres d’urine par jour.</p>

        <p>Lors de l’examen échographique, nous recherchons spécifiquement modifications, kystes et lésions occupant de l’espace au niveau des reins et des voies urinaires jusqu’à la vessie.</p>

        <h2>Comment se déroule l’examen ?</h2>

        <p>Pendant que vous êtes confortablement allongé·e sur la table, nous réalisons l’échographie des reins et des voies urinaires. Il est préférable de venir à l’examen avec la vessie pleine.</p>

        <p>À la fin de l’examen, vous recevez votre compte rendu personnel.</p>
      es: |-
        <p>Los riñones son la unidad de filtración del cuerpo. Al día filtran unos 360 litros de sangre — el volumen total de sangre pasa por los riñones unas 30 veces al día. De ahí eliminamos hasta dos litros de orina al día.</p>

        <p>En la exploración ecográfica buscamos de forma dirigida cambios, quistes y lesiones ocupantes de espacio en los riñones y en las vías urinarias hasta la vejiga.</p>

        <h2>¿Cómo se realiza la exploración?</h2>

        <p>Mientras descansa cómodamente en una camilla, realizamos la ecografía de los riñones y las vías urinarias. Es conveniente acudir con la vejiga llena.</p>

        <p>Al finalizar recibe su informe personal.</p>
      it: |-
        <p>I reni sono l'unità filtrante del corpo. Ogni giorno filtrano circa 360 litri di sangue — l'intero volume sanguigno attraversa i reni circa 30 volte al giorno. Da questo eliminiamo fino a due litri di urina al giorno.</p>

        <p>Con l'ecografia ricerchiamo in modo mirato alterazioni, cisti e lesioni occupanti spazio nei reni e nelle vie urinarie fino alla vescica.</p>

        <h2>Come si svolge l'esame?</h2>

        <p>Mentre lei riposa rilassato sul lettino, eseguiamo l'ecografia dei reni e delle vie urinarie. È preferibile presentarsi con la vescica piena.</p>

        <p>Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: |-
        <p>Os rins são a unidade de filtragem do corpo. Por dia filtram cerca de 360 litros de sangue — o volume total de sangue atravessa os rins cerca de 30 vezes por dia. Daí eliminamos até dois litros de urina por dia.</p>

        <p>No exame ecográfico procuramos de forma dirigida alterações, quistos e lesões expansivas nos rins e nas vias urinárias até à bexiga.</p>

        <h2>Como é realizado o exame?</h2>

        <p>Enquanto descansa relaxado na maca, realizamos a ecografia dos rins e das vias urinárias. É preferível comparecer com a bexiga cheia.</p>

        <p>No final do exame recebe o seu relatório pessoal.</p>
