    de: Ultraschall der Leber und Gallenwege — Funktion, Struktur und mögliche Schäden.
- type: body
  body_md:
    de: 'Die Leber wiegt etwa 1,5 Kilogramm und übernimmt zentrale Aufgaben im Körper: Verdauung, Entgiftung, Speicherung von Nährstoffen sowie Fett-, Zucker- und Eiweißstoffwechsel. Sie filtert das gesamte
      Blutvolumen mehrfach täglich und ist eng in die Immunabwehr eingebunden.


      Trotz hoher Regenerationsfähigkeit kann die Leber durch ungesunde Ernährung, bestimmte Medikamente oder übermäßigen Alkoholkonsum chronisch geschädigt werden. Im Ultraschall lassen sich Veränderungen
      wie Fettleber, Fibrose oder Tumore meist gut beurteilen.


      Wie wir vorgehen: Sie liegen entspannt auf der Liege, wir untersuchen Leber und Gallenwege per Ultraschall. Bitte kommen Sie etwa vier Stunden nüchtern. Im Anschluss besprechen wir den Befund persönlich
      mit Ihnen.'
