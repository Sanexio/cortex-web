  - type: body
    body_html:
      de: |-
        <p>Die Leber ist mit etwa 1,5 Kilogramm das größte innere Stoffwechselorgan. Selbst bei Verlust von bis zu 75 Prozent ihres Gewebes kann sie wieder zur normalen Größe heranwachsen. Sie ist zentral für Verdauung, Entgiftung, Speicherung von Nährstoffen sowie den Fett-, Zucker- und Eiweißstoffwechsel und filtert das gesamte Blutvolumen bis zu 30 Mal am Tag.</p>

        <p>Trotz ihrer hohen Regenerationsfähigkeit kann die Leber durch ungünstige Ernährung, bestimmte Medikamente oder übermäßigen Alkoholkonsum chronisch geschädigt werden. Den Grad der Veränderung lässt sich im Ultraschall gut beurteilen — von der Fettleber über fortgeschrittene Strukturveränderungen bis hin zu Raumforderungen.</p>

        <h2>Wie wird die Untersuchung durchgeführt?</h2>

        <p>Während Sie entspannt auf einer Liege ruhen, führen wir die Sonographie der Leber und der Gallenwege durch. Es ist günstig, etwa vier Stunden vor der Untersuchung nichts zu essen und nur Wasser zu trinken.</p>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      it: |-
        <p>Con i suoi circa 1,5 chilogrammi il fegato è il più grande organo metabolico interno. Anche dopo la perdita del 75 percento del tessuto può tornare alle dimensioni normali. È centrale per digestione, detossificazione, deposito di nutrienti e per il metabolismo di grassi, zuccheri e proteine, filtrando l'intero volume sanguigno fino a 30 volte al giorno.</p>

        <p>Nonostante la sua elevata capacità rigenerativa, il fegato può essere danneggiato cronicamente da un'alimentazione sfavorevole, da alcuni farmaci o da un consumo eccessivo di alcol. Il grado di alterazione è ben valutabile all'ecografia — dalla steatosi epatica alle alterazioni strutturali avanzate, fino a lesioni occupanti spazio.</p>

        <h2>Come si svolge l'esame?</h2>

        <p>Mentre lei riposa rilassato sul lettino, eseguiamo l'ecografia del fegato e delle vie biliari. È preferibile non assumere alimenti per circa quattro ore prima dell'esame, bevendo solo acqua.</p>

        <p>Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: |-
        <p>Com cerca de 1,5 quilogramas, o fígado é o maior órgão metabólico interno. Mesmo após a perda de até 75 por cento do seu tecido, pode regenerar-se até ao tamanho normal. É central para a digestão, a desintoxicação, o armazenamento de nutrientes e para o metabolismo de gorduras, açúcares e proteínas, filtrando o volume total de sangue até 30 vezes por dia.</p>

        <p>Apesar da sua elevada capacidade de regeneração, o fígado pode ser danificado de forma crónica por uma alimentação desfavorável, certos medicamentos ou consumo excessivo de álcool. O grau de alteração é bem avaliável por ecografia — desde a esteatose hepática até alterações estruturais avançadas e lesões expansivas.</p>

        <h2>Como é realizado o exame?</h2>

        <p>Enquanto descansa relaxado na maca, realizamos a ecografia do fígado e das vias biliares. É preferível não comer durante cerca de quatro horas antes do exame, bebendo apenas água.</p>

        <p>No final do exame recebe o seu relatório pessoal.</p>
