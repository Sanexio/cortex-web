  - type: body
    body_html:
      de: |-
        <p>Die Leber ist mit etwa 1,5 Kilogramm das größte innere Stoffwechselorgan. Selbst bei Verlust von bis zu 75 Prozent ihres Gewebes kann sie wieder zur normalen Größe heranwachsen. Sie ist zentral für Verdauung, Entgiftung, Speicherung von Nährstoffen sowie den Fett-, Zucker- und Eiweißstoffwechsel und filtert das gesamte Blutvolumen bis zu 30 Mal am Tag.</p>

        <p>Trotz ihrer hohen Regenerationsfähigkeit kann die Leber durch ungünstige Ernährung, bestimmte Medikamente oder übermäßigen Alkoholkonsum chronisch geschädigt werden. Den Grad der Veränderung lässt sich im Ultraschall gut beurteilen — von der Fettleber über fortgeschrittene Strukturveränderungen bis hin zu Raumforderungen.</p>

        <h2>Wie wird die Untersuchung durchgeführt?</h2>

        <p>Während Sie entspannt auf einer Liege ruhen, führen wir die Sonographie der Leber und der Gallenwege durch. Es ist günstig, etwa vier Stunden vor der Untersuchung nichts zu essen und nur Wasser zu trinken.</p>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      en: |-
        <p>Weighing about 1.5 kilograms, the liver is the largest internal metabolic organ. Even after losing up to 75 per cent of its tissue, it can grow back to its normal size. It is central to digestion, detoxification, the storage of nutrients and the metabolism of fats, sugars and proteins, and filters the entire blood volume up to 30 times a day.</p>

        <p>Despite its high regenerative capacity, the liver can be chronically damaged by unfavourable nutrition, certain medications or excessive alcohol consumption. The degree of change can be well assessed by ultrasound — from fatty liver through advanced structural changes to space-occupying lesions.</p>

        <h2>How is the examination carried out?</h2>

        <p>While you rest comfortably on a couch, we perform the ultrasound of the liver and bile ducts. It is helpful to avoid food for about four hours before the examination and to drink only water.</p>

        <p>At the end of the examination you receive your personal findings report.</p>
      fr: |-
        <p>Avec environ 1,5 kilogramme, le foie est le plus grand organe métabolique interne. Même après une perte allant jusqu’à 75 pour cent de son tissu, il peut retrouver sa taille normale. Il est central pour la digestion, la détoxification, le stockage des nutriments et le métabolisme des graisses, des sucres et des protéines, et filtre l’ensemble du volume sanguin jusqu’à 30 fois par jour.</p>

        <p>Malgré sa grande capacité de régénération, le foie peut être chroniquement endommagé par une alimentation défavorable, certains médicaments ou une consommation excessive d’alcool. Le degré d’atteinte peut être bien évalué à l’échographie — de la stéatose aux modifications structurelles avancées jusqu’aux lésions occupant de l’espace.</p>

        <h2>Comment se déroule l’examen ?</h2>

        <p>Pendant que vous êtes confortablement allongé·e sur la table, nous réalisons l’échographie du foie et des voies biliaires. Il est conseillé de ne pas manger pendant environ quatre heures avant l’examen et de ne boire que de l’eau.</p>

        <p>À la fin de l’examen, vous recevez votre compte rendu personnel.</p>
      es: |-
        <p>Con cerca de 1,5 kilogramos, el hígado es el mayor órgano metabólico interno. Incluso tras perder hasta el 75 por ciento de su tejido puede recuperar su tamaño normal. Es central para la digestión, la desintoxicación, el almacenamiento de nutrientes y el metabolismo de grasas, azúcares y proteínas, y filtra el volumen total de sangre hasta 30 veces al día.</p>

        <p>A pesar de su gran capacidad de regeneración, el hígado puede dañarse de forma crónica por una alimentación desfavorable, ciertos medicamentos o un consumo excesivo de alcohol. El grado de afectación se evalúa bien por ecografía — desde el hígado graso hasta alteraciones estructurales avanzadas y lesiones ocupantes de espacio.</p>

        <h2>¿Cómo se realiza la exploración?</h2>

        <p>Mientras descansa cómodamente en una camilla, realizamos la ecografía del hígado y las vías biliares. Es conveniente no comer durante unas cuatro horas antes de la exploración y beber solo agua.</p>

        <p>Al finalizar recibe su informe personal.</p>
      it: |-
        <p>Con i suoi circa 1,5 chilogrammi il fegato è il più grande organo metabolico interno. Anche dopo la perdita del 75 percento del tessuto può tornare alle dimensioni normali. È centrale per digestione, detossificazione, deposito di nutrienti e per il metabolismo di grassi, zuccheri e proteine, filtrando l'intero volume sanguigno fino a 30 volte al giorno.</p>

        <p>Nonostante la sua elevata capacità rigenerativa, il fegato può essere danneggiato cronicamente da un'alimentazione sfavorevole, da alcuni farmaci o da un consumo eccessivo di alcol. Il grado di alterazione è ben valutabile all'ecografia — dalla steatosi epatica alle alterazioni strutturali avanzate, fino a lesioni occupanti spazio.</p>

        <h2>Come si svolge l'esame?</h2>

        <p>Mentre lei riposa rilassato sul lettino, eseguiamo l'ecografia del fegato e delle vie biliari. È preferibile non assumere alimenti per circa quattro ore prima dell'esame, bevendo solo acqua.</p>

        <p>Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: |-
        <p>Com cerca de 1,5 quilogramas, o fígado é o maior órgão metabólico interno. Mesmo após a perda de até 75 por cento do seu tecido, pode regenerar-se até ao tamanho normal. É central para a digestão, a desintoxicação, o armazenamento de nutrientes e para o metabolismo de gorduras, açúcares e proteínas, filtrando o volume total de sangue até 30 vezes por dia.</p>

        <p>Apesar da sua elevada capacidade de regeneração, o fígado pode ser danificado de forma crónica por uma alimentação desfavorável, certos medicamentos ou consumo excessivo de álcool. O grau de alteração é bem avaliável por ecografia — desde a esteatose hepática até alterações estruturais avançadas e lesões expansivas.</p>

        <h2>Como é realizado o exame?</h2>

        <p>Enquanto descansa relaxado na maca, realizamos a ecografia do fígado e das vias biliares. É preferível não comer durante cerca de quatro horas antes do exame, bebendo apenas água.</p>

        <p>No final do exame recebe o seu relatório pessoal.</p>
