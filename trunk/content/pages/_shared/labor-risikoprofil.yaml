  - type: body
    body_html:
      de: |-
        <p>Das Laborprofil <strong>Risikoprofil</strong> umfasst eine Auswahl zentraler Stoffwechsel- und Organparameter, die Hinweise auf Veränderungen geben können, die im Alltag oft nicht spürbar sind.</p>

        <h2>Wir analysieren folgende Parameter:</h2>

        <ul>
        <li>Fettwerte: Triglyzeride, Gesamtcholesterin, LDL, HDL</li>
        <li>HbA1c (Langzeitblutzucker)</li>
        <li>Kreatinin (Nierenfunktion)</li>
        <li>Leberenzyme: GOT, GPT, Gamma-GT</li>
        <li>Harnsäure</li>
        <li>Blutbild mit Differenzierung der weißen Blutzellen</li>
        </ul>

        <h2>Wie wird die Untersuchung durchgeführt?</h2>

        <p>Wir nehmen Ihnen Blut ab und bestimmen die genannten Parameter im Labor. Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      en: |-
        <p>With the lab profile <strong>Risk profile</strong> you receive — with just a single pinprick — an orienting overview of central metabolic and organ parameters; signs of changes that are often not noticeable in everyday life.</p>

        <h2>We analyse the following parameters:</h2>

        <ul>
        <li>Lipid values: triglycerides, total cholesterol, LDL, HDL</li>
        <li>HbA1c (long-term glucose)</li>
        <li>Creatinine (kidney function)</li>
        <li>Liver enzymes: AST (GOT), ALT (GPT), gamma-GT</li>
        <li>Uric acid</li>
        <li>Blood count with differentiation of white blood cells</li>
        </ul>

        <h2>How is the examination carried out?</h2>

        <p>We take a blood sample and determine the listed parameters in the laboratory. At the end of the examination you receive your personal findings report.</p>
      fr: |-
        <p>Avec le profil de laboratoire <strong>Profil de risque</strong>, vous obtenez en une seule piqûre une vue d’orientation sur les paramètres métaboliques et d’organes centraux — indices de modifications qui, au quotidien, ne sont souvent pas perceptibles.</p>

        <h2>Nous analysons les paramètres suivants :</h2>

        <ul>
        <li>Bilan lipidique : triglycérides, cholestérol total, LDL, HDL</li>
        <li>HbA1c (glycémie à long terme)</li>
        <li>Créatinine (fonction rénale)</li>
        <li>Enzymes hépatiques : ASAT, ALAT, gamma-GT</li>
        <li>Acide urique</li>
        <li>Numération sanguine avec différenciation des leucocytes</li>
        </ul>

        <h2>Comment se déroule l’examen ?</h2>

        <p>Nous effectuons un prélèvement sanguin et déterminons les paramètres mentionnés au laboratoire. À la fin de l’examen, vous recevez votre compte rendu personnel.</p>
      es: |-
        <p>Con el perfil de laboratorio <strong>Perfil de riesgo</strong> obtiene con un solo pinchazo una visión orientadora de los parámetros metabólicos y de órganos centrales — indicios de cambios que en el día a día a menudo no son perceptibles.</p>

        <h2>Analizamos los siguientes parámetros:</h2>

        <ul>
        <li>Lípidos: triglicéridos, colesterol total, LDL, HDL</li>
        <li>HbA1c (glucemia a largo plazo)</li>
        <li>Creatinina (función renal)</li>
        <li>Enzimas hepáticas: GOT, GPT, gamma-GT</li>
        <li>Ácido úrico</li>
        <li>Hemograma con diferenciación de leucocitos</li>
        </ul>

        <h2>¿Cómo se realiza la exploración?</h2>

        <p>Le extraemos sangre y determinamos los parámetros indicados en el laboratorio. Al finalizar recibe su informe personal.</p>
      it: |-
        <p>Con il profilo di laboratorio <strong>Profilo di rischio</strong> riceve, con un solo prelievo, una panoramica orientativa dei principali parametri metabolici e d'organo — indicazioni su alterazioni che nella vita quotidiana spesso non sono percepibili.</p>

        <h2>Analizziamo i seguenti parametri:</h2>

        <ul>
        <li>Profilo lipidico: trigliceridi, colesterolo totale, LDL, HDL</li>
        <li>HbA1c (glicemia a lungo termine)</li>
        <li>Creatinina (funzione renale)</li>
        <li>Enzimi epatici: GOT, GPT, gamma-GT</li>
        <li>Acido urico</li>
        <li>Emocromo con formula leucocitaria differenziale</li>
        </ul>

        <h2>Come si svolge l'esame?</h2>

        <p>Le effettuiamo un prelievo di sangue e determiniamo in laboratorio i parametri elencati. Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: |-
        <p>Com o perfil laboratorial <strong>Perfil de risco</strong> recebe, com uma única picada, uma visão orientadora dos principais parâmetros metabólicos e de órgãos — indicações de alterações que no dia-a-dia muitas vezes não se sentem.</p>

        <h2>Analisamos os seguintes parâmetros:</h2>

        <ul>
        <li>Perfil lipídico: triglicéridos, colesterol total, LDL, HDL</li>
        <li>HbA1c (glicémia a longo prazo)</li>
        <li>Creatinina (função renal)</li>
        <li>Enzimas hepáticas: GOT, GPT, gama-GT</li>
        <li>Ácido úrico</li>
        <li>Hemograma com fórmula leucocitária diferencial</li>
        </ul>

        <h2>Como é realizado o exame?</h2>

        <p>Efectuamos uma colheita de sangue e determinamos em laboratório os parâmetros indicados. No final do exame recebe o seu relatório pessoal.</p>
