      de: Risikoprofil — orientierender Laborüberblick zu Stoffwechsel, Leber und Niere.
      en: Risk profile — orienting laboratory overview of metabolism, liver and kidney.
      fr: Profil de risque — vue laboratoire d’orientation sur métabolisme, foie et reins.
      es: Perfil de riesgo — visión laboratorial orientadora sobre metabolismo, hígado y riñón.
      it: Profilo di rischio — panoramica laboratoristica orientativa su metabolismo, fegato e reni.
