    lead:
      de: Tauchtauglichkeitsuntersuchung — Bescheinigung für Open Water und Advanced Open Water.
      en: Fitness-to-dive examination — certification for Open Water and Advanced Open Water.
      fr: Visite d’aptitude à la plongée — attestation pour Open Water et Advanced Open Water.
      es: Reconocimiento de aptitud para buceo — certificación para Open Water y Advanced Open Water.
      it: Visita di idoneità subacquea — certificazione per Open Water e Advanced Open Water.
      pt-pt: Avaliação de aptidão para mergulho — certificação para Open Water e Advanced Open Water.
    image: shopify-mirror://detail/fit-for-diving-hero.jpg
  - type: body
    body_html:
      de: >-
        <p>Die Tauchtauglichkeitsuntersuchung dokumentiert Ihre Eignung zum Sporttauchen. Wir
        untersuchen Sie wahlweise als Open Water Diver (Tauchtiefe bis 18 Meter) oder als Advanced
        Open Water Diver (Tauchtiefe bis 30 Meter, sowie alle Taucherinnen und Taucher über 40
        Jahren). Untersuchungen für Deep-Diver oder technisches Tauchen bieten wir auf Nachfrage
        an.</p>


        <h2>Wie wird die Untersuchung durchgeführt?</h2>


        <p>Für Open Water Diver führen wir eine Ganzkörperuntersuchung inklusive Otoskopie
        (Ohruntersuchung) sowie eine Lungenfunktion durch. Bei Advanced Open Water Diver wird die
        Untersuchung zusätzlich um ein Belastungs-EKG ergänzt.</p>


        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      en: >-
        <p>The fitness-to-dive examination documents your suitability for recreational diving. We
        offer the examination either as Open Water Diver (dive depth up to 18 metres) or as
        Advanced Open Water Diver (dive depth up to 30 metres, also for all divers above 40 years
        of age). Examinations for Deep-Divers or technical diving are available on request.</p>


        <h2>How is the examination carried out?</h2>


        <p>For Open Water Divers we perform a full clinical examination including otoscopy
        (examination of the ear) and a lung function test. For Advanced Open Water Divers the
        examination is supplemented with an exercise ECG.</p>


        <p>At the end of the examination you receive your personal findings report.</p>
      fr: >-
        <p>La visite d’aptitude à la plongée documente votre aptitude à la plongée sportive. Nous
        vous examinons au choix en tant qu’Open Water Diver (profondeur jusqu’à 18 mètres) ou
        Advanced Open Water Diver (profondeur jusqu’à 30 mètres, ainsi que pour tous les plongeurs
        et plongeuses de plus de 40 ans). Les examens pour Deep-Divers ou la plongée technique
        sont disponibles sur demande.</p>


        <h2>Comment se déroule l’examen ?</h2>


        <p>Pour les Open Water Divers, nous réalisons un examen clinique complet incluant
        otoscopie (examen de l’oreille) et une spirométrie. Pour les Advanced Open Water Divers,
        l’examen est complété par un ECG d’effort.</p>


        <p>À la fin de l’examen, vous recevez votre compte rendu personnel.</p>
      es: >-
        <p>El reconocimiento de aptitud para el buceo documenta su capacidad para el buceo
        deportivo. Le exploramos a su elección como Open Water Diver (profundidad hasta 18 metros)
        o como Advanced Open Water Diver (profundidad hasta 30 metros, así como todas las personas
        buceadoras mayores de 40 años). Los reconocimientos para Deep-Divers o buceo técnico están
        disponibles bajo petición.</p>


        <h2>¿Cómo se realiza la exploración?</h2>


        <p>Para Open Water Divers realizamos una exploración clínica completa incluyendo otoscopia
        (exploración del oído) y una espirometría. Para Advanced Open Water Divers el
        reconocimiento se complementa con un ECG de esfuerzo.</p>


        <p>Al finalizar recibe su informe personal.</p>
      it: >-
        <p>La visita di idoneità subacquea documenta la sua idoneità all'immersione sportiva.
        Eseguiamo l'esame a sua scelta come Open Water Diver (profondità fino a 18 metri) oppure
        come Advanced Open Water Diver (profondità fino a 30 metri, oltre a tutti i subacquei oltre
        i 40 anni). Visite per Deep-Diver o immersione tecnica sono disponibili su richiesta.</p>


        <h2>Come si svolge l'esame?</h2>


        <p>Per gli Open Water Diver eseguiamo un esame clinico completo, comprensivo di otoscopia
        (esame dell'orecchio) e di una spirometria. Per gli Advanced Open Water Diver l'esame è
        integrato da un ECG da sforzo.</p>


        <p>Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: >-
        <p>A avaliação de aptidão para mergulho documenta a sua aptidão para o mergulho desportivo.
        Realizamos o exame, à sua escolha, como Open Water Diver (profundidade até 18 metros) ou
        como Advanced Open Water Diver (profundidade até 30 metros, bem como todos os mergulhadores
        com mais de 40 anos). Exames para Deep-Diver ou mergulho técnico estão disponíveis a
        pedido.</p>


        <h2>Como é realizado o exame?</h2>


        <p>Para Open Water Diver realizamos um exame clínico completo, incluindo otoscopia (exame
        do ouvido) e uma espirometria. Para Advanced Open Water Diver acrescenta-se um ECG de
        esforço.</p>


        <p>No final do exame recebe o seu relatório pessoal.</p>
