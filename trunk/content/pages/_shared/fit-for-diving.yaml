  - type: body
    body_html:
      de: |-
        <p>Die Tauchtauglichkeitsuntersuchung dokumentiert Ihre Eignung zum Sporttauchen. Wir untersuchen Sie wahlweise als Open Water Diver (Tauchtiefe bis 18 Meter) oder als Advanced Open Water Diver (Tauchtiefe bis 30 Meter, sowie alle Taucherinnen und Taucher über 40 Jahren). Untersuchungen für Deep-Diver oder technisches Tauchen bieten wir auf Nachfrage an.</p>

        <h2>Wie wird die Untersuchung durchgeführt?</h2>

        <p>Für Open Water Diver führen wir eine Ganzkörperuntersuchung inklusive Otoskopie (Ohruntersuchung) sowie eine Lungenfunktion durch. Bei Advanced Open Water Diver wird die Untersuchung zusätzlich um ein Belastungs-EKG ergänzt.</p>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
