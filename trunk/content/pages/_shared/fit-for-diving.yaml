    de: Tauchtauglichkeitsuntersuchung — bevor Sie abtauchen.
- type: body
  body_md:
    de: 'Die Tauchtauglichkeitsuntersuchung gibt Ihnen Sicherheit vor dem nächsten Tauchgang. Wir bieten zwei Stufen an: Open Water Diver für Wassertiefen bis 18 Meter, Advanced Open Water Diver (oder Taucher
      über 40 Jahre) für Wassertiefen bis 30 Meter. Für Deep Diver oder technische Taucher bieten wir Untersuchungen auf Anfrage an.


      Wie wir vorgehen: Für Open Water Diver führen wir eine Ganzkörperuntersuchung inklusive Otoskopie sowie eine Lungenfunktion durch. Für Advanced Open Water Diver wird die Untersuchung um ein Belastungs-EKG
      erweitert. Im Anschluss besprechen wir den Befund persönlich mit Ihnen.'
