    body_html:
      de: |-
        <p>Veränderungen des Fett- und Zuckerstoffwechsels gehören zu den wichtigsten beeinflussbaren Risikofaktoren für Herz-Kreislauf-Erkrankungen. Mit dem Laborprofil <strong>Stoffwechsel</strong> beurteilen wir, ob bei Ihnen Hinweise auf eine Fett- oder Zuckerstoffwechselveränderung vorliegen, und bestimmen zusätzlich einen Marker für das Gicht-Risiko.</p>

        <h2>Wie wird die Untersuchung durchgeführt?</h2>

        <p>Wir nehmen Ihnen Blut ab und bestimmen folgende Werte: Fettwerte (Triglyzeride, Gesamt-Cholesterin, LDL, HDL), HbA1c (Langzeitblutzucker), Harnsäure.</p>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
