    de: Fett-, Zucker- und Harnsäurestoffwechsel im Überblick.
- type: body
  body_md:
    de: 'Verkalkungen der Gefäße sind eine Hauptursache für Herz-Kreislauf-Erkrankungen, die in den Industrienationen die häufigste Todesursache darstellen. Ein wesentlicher Faktor sind erhöhte Fett- und
      Zuckerwerte im Blut.


      Mit dem Stoffwechsel-Profil prüfen wir, ob bei Ihnen eine Fettstoffwechsel- oder Zuckerstoffwechselstörung vorliegt. Gleichzeitig bestimmen wir Marker für das Risiko einer Gicht. Analysierte Parameter:
      Fettwerte (Triglyzeride, Gesamt-Cholesterin, LDL, HDL), HbA1c (Langzeitblutzucker) und Harnsäure (Gicht-Disposition).


      Im Anschluss besprechen wir die Werte persönlich mit Ihnen.'
