  - type: body
    body_html:
      de: >-
        <p>Beim Sono-Check beurteilen wir in einer einzigen Untersuchung alle wichtigen inneren
        Organe. Wir prüfen unter anderem:</p>


        <ul>

        <li><strong>Schilddrüse</strong> — Knoten und Größenveränderungen</li>

        <li><strong>Halsgefäße</strong> — Hinweise auf Verkalkungen</li>

        <li><strong>Herz</strong> — Pumpfunktion und strukturelle Veränderungen</li>

        <li><strong>Milz</strong> — Größe und Raumforderungen</li>

        <li><strong>Nieren</strong> — Harnstau, Zysten oder Raumforderungen</li>

        <li><strong>Leber</strong> — Fett- und Strukturveränderungen</li>

        <li><strong>Gallenwege</strong> — Gallensteine, Rückstau</li>

        <li><strong>Bauchspeicheldrüse</strong> — Zysten oder Raumforderungen</li>

        <li><strong>Darm</strong> — Hinweise auf Entzündungsveränderungen</li>

        <li><strong>Harnblase</strong> — Hinweise auf Polypen</li>

        <li><strong>Prostata</strong> — Größe und Raumforderungen</li>

        <li><strong>Uterus</strong> — Myome und andere Veränderungen</li>

        <li><strong>Becken- und Beingefäße</strong> — Hinweise auf Verkalkungen</li>

        </ul>


        <h2>Wie wird die Untersuchung durchgeführt?</h2>


        <p>Während Sie entspannt auf einer Liege ruhen, führen wir die Sonographie der Organe durch.
        Es ist günstig, nüchtern zur Untersuchung zu kommen. Die Untersuchung dauert etwa 45
        Minuten.</p>


        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      en: >-
        <p>In the Sono-Check we assess all the important internal organs in a single examination.
        Among other things we check:</p>


        <ul>

        <li><strong>Thyroid</strong> — nodules and size changes</li>

        <li><strong>Neck vessels</strong> — signs of calcification</li>

        <li><strong>Heart</strong> — pump function and structural changes</li>

        <li><strong>Spleen</strong> — size and space-occupying lesions</li>

        <li><strong>Kidneys</strong> — urinary congestion, cysts or space-occupying lesions</li>

        <li><strong>Liver</strong> — fatty and structural changes</li>

        <li><strong>Bile ducts</strong> — gallstones, congestion</li>

        <li><strong>Pancreas</strong> — cysts or space-occupying lesions</li>

        <li><strong>Bowel</strong> — signs of inflammatory changes</li>

        <li><strong>Bladder</strong> — signs of polyps</li>

        <li><strong>Prostate</strong> — size and space-occupying lesions</li>

        <li><strong>Uterus</strong> — fibroids and other changes</li>

        <li><strong>Pelvic and leg vessels</strong> — signs of calcification</li>

        </ul>


        <h2>How is the examination carried out?</h2>


        <p>While you rest comfortably on the couch, we perform the ultrasound of the organs. It is
        advisable to come fasting. The examination takes about 45 minutes.</p>


        <p>At the end of the examination you receive your personal findings report.</p>
      fr: >-
        <p>Lors du Sono-Check, nous évaluons en un seul examen tous les organes internes importants.
        Nous contrôlons entre autres :</p>


        <ul>

        <li><strong>Thyroïde</strong> — nodules et variations de taille</li>

        <li><strong>Vaisseaux du cou</strong> — indices de calcifications</li>

        <li><strong>Cœur</strong> — fonction de pompe et modifications structurelles</li>

        <li><strong>Rate</strong> — taille et lésions occupant de l’espace</li>

        <li><strong>Reins</strong> — stase urinaire, kystes ou lésions occupant de l’espace</li>

        <li><strong>Foie</strong> — modifications graisseuses et structurelles</li>

        <li><strong>Voies biliaires</strong> — calculs, stase</li>

        <li><strong>Pancréas</strong> — kystes ou lésions occupant de l’espace</li>

        <li><strong>Intestin</strong> — indices de modifications inflammatoires</li>

        <li><strong>Vessie</strong> — indices de polypes</li>

        <li><strong>Prostate</strong> — taille et lésions occupant de l’espace</li>

        <li><strong>Utérus</strong> — myomes et autres modifications</li>

        <li><strong>Vaisseaux pelviens et des membres inférieurs</strong> — indices de calcifications</li>

        </ul>


        <h2>Comment se déroule l’examen ?</h2>


        <p>Pendant que vous êtes confortablement allongé·e sur la table, nous réalisons l’échographie
        des organes. Il est conseillé de venir à jeun. L’examen dure environ 45 minutes.</p>


        <p>À la fin de l’examen, vous recevez votre compte rendu personnel.</p>
      es: >-
        <p>En el Sono-Check evaluamos en una sola exploración todos los órganos internos
        importantes. Entre otras cosas comprobamos:</p>


        <ul>

        <li><strong>Tiroides</strong> — nódulos y cambios de tamaño</li>

        <li><strong>Vasos del cuello</strong> — signos de calcificación</li>

        <li><strong>Corazón</strong> — función de bomba y alteraciones estructurales</li>

        <li><strong>Bazo</strong> — tamaño y lesiones ocupantes de espacio</li>

        <li><strong>Riñones</strong> — estasis urinaria, quistes o lesiones ocupantes de espacio</li>

        <li><strong>Hígado</strong> — alteraciones grasas y estructurales</li>

        <li><strong>Vías biliares</strong> — cálculos, estasis</li>

        <li><strong>Páncreas</strong> — quistes o lesiones ocupantes de espacio</li>

        <li><strong>Intestino</strong> — signos de alteraciones inflamatorias</li>

        <li><strong>Vejiga</strong> — signos de pólipos</li>

        <li><strong>Próstata</strong> — tamaño y lesiones ocupantes de espacio</li>

        <li><strong>Útero</strong> — miomas y otras alteraciones</li>

        <li><strong>Vasos pélvicos y de las piernas</strong> — signos de calcificación</li>

        </ul>


        <h2>¿Cómo se realiza la exploración?</h2>


        <p>Mientras descansa cómodamente en una camilla, realizamos la ecografía de los órganos. Es
        conveniente acudir en ayunas. La exploración dura unos 45 minutos.</p>


        <p>Al finalizar recibe su informe personal.</p>
      it: >-
        <p>Nel Sono-Check valutiamo in un unico esame tutti gli organi interni principali.
        Verifichiamo, tra l'altro:</p>


        <ul>

        <li><strong>Tiroide</strong> — noduli e variazioni di volume</li>

        <li><strong>Vasi del collo</strong> — segni di calcificazione</li>

        <li><strong>Cuore</strong> — funzione di pompa e alterazioni strutturali</li>

        <li><strong>Milza</strong> — volume e lesioni occupanti spazio</li>

        <li><strong>Reni</strong> — idronefrosi, cisti o lesioni occupanti spazio</li>

        <li><strong>Fegato</strong> — alterazioni grasse e strutturali</li>

        <li><strong>Vie biliari</strong> — calcoli, ristagno</li>

        <li><strong>Pancreas</strong> — cisti o lesioni occupanti spazio</li>

        <li><strong>Intestino</strong> — segni di alterazioni infiammatorie</li>

        <li><strong>Vescica</strong> — segni di polipi</li>

        <li><strong>Prostata</strong> — volume e lesioni occupanti spazio</li>

        <li><strong>Utero</strong> — miomi e altre alterazioni</li>

        <li><strong>Vasi pelvici e degli arti inferiori</strong> — segni di calcificazione</li>

        </ul>


        <h2>Come si svolge l'esame?</h2>


        <p>Mentre lei riposa rilassato sul lettino, eseguiamo l'ecografia degli organi. È preferibile
        presentarsi a digiuno. L'esame dura circa 45 minuti.</p>


        <p>Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: >-
        <p>No Sono-Check avaliamos num único exame todos os órgãos internos principais. Verificamos,
        entre outros:</p>


        <ul>

        <li><strong>Tiroide</strong> — nódulos e alterações de volume</li>

        <li><strong>Vasos do pescoço</strong> — sinais de calcificação</li>

        <li><strong>Coração</strong> — função de bomba e alterações estruturais</li>

        <li><strong>Baço</strong> — volume e lesões expansivas</li>

        <li><strong>Rins</strong> — hidronefrose, quistos ou lesões expansivas</li>

        <li><strong>Fígado</strong> — alterações gordas e estruturais</li>

        <li><strong>Vias biliares</strong> — cálculos, retenção</li>

        <li><strong>Pâncreas</strong> — quistos ou lesões expansivas</li>

        <li><strong>Intestino</strong> — sinais de alterações inflamatórias</li>

        <li><strong>Bexiga</strong> — sinais de pólipos</li>

        <li><strong>Próstata</strong> — volume e lesões expansivas</li>

        <li><strong>Útero</strong> — miomas e outras alterações</li>

        <li><strong>Vasos pélvicos e dos membros inferiores</strong> — sinais de calcificação</li>

        </ul>


        <h2>Como é realizado o exame?</h2>


        <p>Enquanto descansa relaxado na maca, realizamos a ecografia dos órgãos. É preferível
        comparecer em jejum. O exame dura cerca de 45 minutos.</p>


        <p>No final do exame recebe o seu relatório pessoal.</p>
