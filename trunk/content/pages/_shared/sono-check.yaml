  lead:
    de: Umfassende Ultraschall-Vorsorge — Schilddrüse, Halsgefäße, Herz und alle Bauchorgane in einer Sitzung.
- type: body
  body_md:
    de: 'Der Sono Check ist ein umfassendes Sonographie-Programm. Wir untersuchen in einer Sitzung folgende Bereiche: Schilddrüse (verdächtige Knoten?), Halsgefäße (Verkalkung?), Herz (Pumpfunktion und
      Klappenstrukturen), Milz (Größe und Beschaffenheit), Nieren (Stau, Zysten, Tumore), Leber (Verfettung oder Fibrose?), Gallenwege (Steine oder Stau?), Bauchspeicheldrüse (Zysten oder Raumforderungen),
      Darm (Entzündungszeichen?), Harnblase und Prostata bzw. Uterus (Vergrößerungen oder Auffälligkeiten) sowie Becken- und Beingefäße (Verkalkungen?).


      Wie wir vorgehen: Sie liegen entspannt auf der Liege, die Untersuchung dauert etwa 45 Minuten. Bitte kommen Sie nüchtern. Im Anschluss besprechen wir die Befunde persönlich mit Ihnen.'
