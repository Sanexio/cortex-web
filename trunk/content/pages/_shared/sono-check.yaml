      de: Sono-Check — alle wichtigen Organe in einer Ultraschalluntersuchung.
      en: Sono-Check — all the important organs in a single ultrasound examination.
      fr: Sono-Check — tous les organes importants en une seule échographie.
      es: Sono-Check — todos los órganos importantes en una sola ecografía.
      it: Sono-Check — tutti gli organi principali in un'unica ecografia.
      pt-pt: Sono-Check — todos os órgãos principais numa única ecografia.
