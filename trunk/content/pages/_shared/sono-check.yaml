  - type: body
    body_html:
      de: >-
        <p>Beim Sono-Check beurteilen wir in einer einzigen Untersuchung alle wichtigen inneren
        Organe. Wir prüfen unter anderem:</p>


        <ul>

        <li><strong>Schilddrüse</strong> — Knoten und Größenveränderungen</li>

        <li><strong>Halsgefäße</strong> — Hinweise auf Verkalkungen</li>

        <li><strong>Herz</strong> — Pumpfunktion und strukturelle Veränderungen</li>

        <li><strong>Milz</strong> — Größe und Raumforderungen</li>

        <li><strong>Nieren</strong> — Harnstau, Zysten oder Raumforderungen</li>

        <li><strong>Leber</strong> — Fett- und Strukturveränderungen</li>

        <li><strong>Gallenwege</strong> — Gallensteine, Rückstau</li>

        <li><strong>Bauchspeicheldrüse</strong> — Zysten oder Raumforderungen</li>

        <li><strong>Darm</strong> — Hinweise auf Entzündungsveränderungen</li>

        <li><strong>Harnblase</strong> — Hinweise auf Polypen</li>

        <li><strong>Prostata</strong> — Größe und Raumforderungen</li>

        <li><strong>Uterus</strong> — Myome und andere Veränderungen</li>

        <li><strong>Becken- und Beingefäße</strong> — Hinweise auf Verkalkungen</li>

        </ul>


        <h2>Wie wird die Untersuchung durchgeführt?</h2>


        <p>Während Sie entspannt auf einer Liege ruhen, führen wir die Sonographie der Organe durch.
        Es ist günstig, nüchtern zur Untersuchung zu kommen. Die Untersuchung dauert etwa 45
        Minuten.</p>


        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      it: >-
        <p>Nel Sono-Check valutiamo in un unico esame tutti gli organi interni principali.
        Verifichiamo, tra l'altro:</p>


        <ul>

        <li><strong>Tiroide</strong> — noduli e variazioni di volume</li>

        <li><strong>Vasi del collo</strong> — segni di calcificazione</li>

        <li><strong>Cuore</strong> — funzione di pompa e alterazioni strutturali</li>

        <li><strong>Milza</strong> — volume e lesioni occupanti spazio</li>

        <li><strong>Reni</strong> — idronefrosi, cisti o lesioni occupanti spazio</li>

        <li><strong>Fegato</strong> — alterazioni grasse e strutturali</li>

        <li><strong>Vie biliari</strong> — calcoli, ristagno</li>

        <li><strong>Pancreas</strong> — cisti o lesioni occupanti spazio</li>

        <li><strong>Intestino</strong> — segni di alterazioni infiammatorie</li>

        <li><strong>Vescica</strong> — segni di polipi</li>

        <li><strong>Prostata</strong> — volume e lesioni occupanti spazio</li>

        <li><strong>Utero</strong> — miomi e altre alterazioni</li>

        <li><strong>Vasi pelvici e degli arti inferiori</strong> — segni di calcificazione</li>

        </ul>


        <h2>Come si svolge l'esame?</h2>


        <p>Mentre lei riposa rilassato sul lettino, eseguiamo l'ecografia degli organi. È preferibile
        presentarsi a digiuno. L'esame dura circa 45 minuti.</p>


        <p>Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: >-
        <p>No Sono-Check avaliamos num único exame todos os órgãos internos principais. Verificamos,
        entre outros:</p>


        <ul>

        <li><strong>Tiroide</strong> — nódulos e alterações de volume</li>

        <li><strong>Vasos do pescoço</strong> — sinais de calcificação</li>

        <li><strong>Coração</strong> — função de bomba e alterações estruturais</li>

        <li><strong>Baço</strong> — volume e lesões expansivas</li>

        <li><strong>Rins</strong> — hidronefrose, quistos ou lesões expansivas</li>

        <li><strong>Fígado</strong> — alterações gordas e estruturais</li>

        <li><strong>Vias biliares</strong> — cálculos, retenção</li>

        <li><strong>Pâncreas</strong> — quistos ou lesões expansivas</li>

        <li><strong>Intestino</strong> — sinais de alterações inflamatórias</li>

        <li><strong>Bexiga</strong> — sinais de pólipos</li>

        <li><strong>Próstata</strong> — volume e lesões expansivas</li>

        <li><strong>Útero</strong> — miomas e outras alterações</li>

        <li><strong>Vasos pélvicos e dos membros inferiores</strong> — sinais de calcificação</li>

        </ul>


        <h2>Como é realizado o exame?</h2>


        <p>Enquanto descansa relaxado na maca, realizamos a ecografia dos órgãos. É preferível
        comparecer em jejum. O exame dura cerca de 45 minutos.</p>


        <p>No final do exame recebe o seu relatório pessoal.</p>
