      de: Ultraschall der Halsschlagadern — Beurteilung von Engstellen und Wandveränderungen.
      en: Ultrasound of the carotid arteries — detect narrowings before they lead to a stroke.
      fr: Échographie des carotides — repérer les rétrécissements avant qu’ils ne provoquent un AVC.
      es: Ecografía de las arterias carótidas — detectar estenosis antes de que provoquen un ictus.
      it: Ecografia delle arterie carotidi — riconoscere le stenosi prima che diano luogo a un ictus.
      pt-pt: Ecografia das artérias carótidas — reconhecer estenoses antes que conduzam a um AVC.
