  - type: body
    body_html:
      de: |-
        <p>Das menschliche Gehirn macht etwa 2 Prozent des Körpergewichts aus, benötigt aber rund 20 Prozent des gesamten Energieverbrauchs. 100 Milliarden Neuronen und Billionen von Synapsen stellen pro Sekunde bis zu 200 Millionen Verbindungen her. Nach etwa 5 bis 10 Minuten Unterbrechung der Sauerstoffversorgung wird das Gehirn irreparabel geschädigt.</p>

        <p>Mit dem Ultraschall der Halsschlagadern (Carotis-Duplex) prüfen wir, ob die Blutzufuhr zum Gehirn durch Engstellen eingeschränkt ist oder ob an den Gefäßen bereits Veränderungen bestehen, die das Risiko für einen Schlaganfall erhöhen können.</p>

        <h2>Wie wird die Untersuchung durchgeführt?</h2>

        <p>Zunächst hören wir mit einem Stethoskop die Halsgefäße ab. Im Anschluss erfolgt die Ultraschalluntersuchung. Hierzu legen Sie sich auf eine Liege und überstrecken den Kopf leicht.</p>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      it: |-
        <p>Il cervello umano costituisce circa il 2 percento del peso corporeo ma consuma circa il 20 percento dell'energia totale. 100 miliardi di neuroni e migliaia di miliardi di sinapsi creano fino a 200 milioni di connessioni al secondo. Dopo circa 5-10 minuti di interruzione dell'apporto di ossigeno il cervello subisce un danno irreversibile.</p>

        <p>Con l'ecografia delle arterie carotidi (eco-Doppler) verifichiamo se l'afflusso di sangue al cervello è ridotto da stenosi o se a livello dei vasi sono già presenti alterazioni che possono aumentare il rischio di ictus.</p>

        <h2>Come si svolge l'esame?</h2>

        <p>Dapprima auscultiamo i vasi del collo con uno stetoscopio. Segue l'esame ecografico. A questo scopo si distende sul lettino ed estende leggermente il capo all'indietro.</p>

        <p>Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: |-
        <p>O cérebro humano representa cerca de 2 por cento do peso corporal, mas consome cerca de 20 por cento de toda a energia. 100 mil milhões de neurónios e biliões de sinapses estabelecem por segundo até 200 milhões de ligações. Após cerca de 5 a 10 minutos de interrupção do fornecimento de oxigénio o cérebro sofre lesões irreversíveis.</p>

        <p>Com a ecografia das artérias carótidas (eco-Doppler) verificamos se o fluxo de sangue para o cérebro está limitado por estenoses ou se nos vasos já existem alterações capazes de aumentar o risco de AVC.</p>

        <h2>Como é realizado o exame?</h2>

        <p>Primeiro auscultamos os vasos do pescoço com um estetoscópio. Segue-se o exame ecográfico. Para tal, deita-se na maca e inclina ligeiramente a cabeça para trás.</p>

        <p>No final do exame recebe o seu relatório pessoal.</p>
