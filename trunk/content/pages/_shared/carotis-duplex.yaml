    heading:
      de: Carotis-Duplex-Sonographie
    lead:
      de: Ultraschall der Halsschlagadern — frühe Hinweise auf Gefäßveränderungen.

  - type: body
    body_md:
      de: |
        Die Halsschlagadern versorgen das Gehirn mit Blut. Werden sie durch Plaques eingeengt, steigt das Risiko für Schlaganfälle. Mit der Duplex-Sonographie messen wir Strömungsgeschwindigkeit, Durchmesser und Wandbeschaffenheit der Halsschlagadern und können Veränderungen oft früh erkennen — bevor Symptome auftreten.

        Die Untersuchung ist schmerzfrei, dauert etwa 15–20 Minuten und erfordert keine Vorbereitung. Sie liegen mit leicht überstrecktem Kopf, wir führen mit einem hochfrequenten Schallkopf entlang des Halses.

        Wann sinnvoll: bei Bluthochdruck, erhöhten Blutfetten, familiärer Belastung mit Schlaganfällen, oder als Bestandteil eines strukturierten Vorsorge-Checks.

