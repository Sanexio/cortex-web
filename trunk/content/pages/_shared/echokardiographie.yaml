  - type: body
    body_html:
      de: |-
        <p>Das Herz — ein biomechanisches Wunder aus elektrischen Impulsen, Muskelkontraktionen und einer ausgefeilten Ventiltechnik. Bei jedem Herzschlag werden etwa 70 Milliliter Blut aus dem Herzen gepumpt. Mit rund 100.000 Schlägen pro Tag bewegt das Herz durchschnittlich etwa 7.000 Liter Blut täglich durch den Körper. Der dabei erzeugte Blutdruck liegt bei gesunden Erwachsenen zwischen 100 und 140 mmHg und sorgt dafür, dass das Blut die etwa 100.000 Kilometer langen Blutgefäße erreicht und durchströmt.</p>

        <p>Mit der Echokardiographie können wir das Herz in Echtzeit bei seiner Arbeit beobachten. Das Verfahren ermöglicht die Erkennung von Wandbewegungsstörungen, Klappenfehlern und anderen strukturellen Veränderungen, die im Alltag nicht zwingend mit Beschwerden einhergehen müssen.</p>

        <h2>Wie wird die Untersuchung durchgeführt?</h2>

        <p>Für diese Untersuchung legen Sie sich in Linksseitenlage. Wir führen die Untersuchung mit einem speziellen Ultraschallkopf durch. Eine Vorbereitung Ihrerseits ist nicht erforderlich.</p>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
