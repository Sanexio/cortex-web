  - type: body
    body_md:
      de: |
        Mit der Echokardiographie beobachten wir Ihr Herz in Echtzeit bei der Arbeit. Erfasst werden Pumpfunktion, Wandbewegungen, Herzklappen und mögliche strukturelle Veränderungen — vieles davon verursacht im Alltag keine Beschwerden, ist aber für die Risikoeinschätzung relevant.

        Die Untersuchung ist schmerzfrei und dauert etwa 20–30 Minuten. Sie liegen entspannt in Linksseitenlage, wir setzen einen Ultraschallkopf an mehreren Stellen am Brustkorb an. Eine besondere Vorbereitung ist nicht nötig.

        Im Anschluss besprechen wir die Ergebnisse persönlich mit Ihnen — auffällige Befunde ordnen wir gemeinsam ein und besprechen, ob weitere Schritte sinnvoll sind.

