    lead:
      de: Echokardiographie — das Herz in Echtzeit pumpen sehen.
      en: Echocardiography — watch the heart pumping in real time.
      fr: Échocardiographie — voir le cœur pomper en temps réel.
      es: Ecocardiografía — ver el corazón bombeando en tiempo real.
      it: Ecocardiografia — vedere il cuore pompare in tempo reale.
      pt-pt: Ecocardiografia — ver o coração a bombear em tempo real.
    image: shopify-mirror://detail/echokardiographie-hero.jpg
  - type: body
    body_html:
      de: |-
        <p>Das Herz koordiniert über elektrische Impulse, Muskelkontraktionen und vier Herzklappen den Blutkreislauf. Bei jedem Herzschlag werden etwa 70 Milliliter Blut aus dem Herzen gepumpt. Mit rund 100.000 Schlägen pro Tag bewegt das Herz durchschnittlich etwa 7.000 Liter Blut täglich durch den Körper. Der dabei erzeugte Blutdruck liegt bei gesunden Erwachsenen zwischen 100 und 140 mmHg und treibt das Blut durch die etwa 100.000 Kilometer langen Blutgefäße.</p>

        <p>Mit der Echokardiographie wird das Herz in Echtzeit dargestellt. Das Verfahren erlaubt die Beurteilung von Wandbewegungsstörungen, Klappenveränderungen und strukturellen Auffälligkeiten, die im Alltag nicht zwingend mit Beschwerden einhergehen müssen.</p>

        <h2>Wie wird die Untersuchung durchgeführt?</h2>

        <p>Für diese Untersuchung legen Sie sich in Linksseitenlage. Wir führen die Untersuchung mit einem speziellen Ultraschallkopf durch. Eine Vorbereitung Ihrerseits ist nicht erforderlich.</p>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      en: |-
        <p>The heart coordinates the bloodstream through electrical impulses, muscle contractions and four heart valves. With each beat about 70 millilitres of blood are pumped out of the heart. With around 100,000 beats per day the heart moves an average of 7,000 litres of blood through the body daily. In healthy adults the resulting blood pressure lies between 100 and 140 mmHg and drives the blood through the roughly 100,000 kilometres of blood vessels.</p>

        <p>With echocardiography the heart is visualised in real time. The technique allows assessment of wall-motion abnormalities, valve changes and structural findings that do not necessarily cause symptoms in everyday life.</p>

        <h2>How is the examination carried out?</h2>

        <p>For this examination you lie on your left side. We perform the examination with a special ultrasound probe. No preparation on your part is required.</p>

        <p>At the end of the examination you receive your personal findings report.</p>
      fr: |-
        <p>Le cœur coordonne la circulation sanguine par des impulsions électriques, des contractions musculaires et quatre valves cardiaques. À chaque battement, environ 70 millilitres de sang sont éjectés. Avec près de 100 000 battements par jour, le cœur déplace en moyenne 7 000 litres de sang par jour dans le corps. Chez l’adulte en bonne santé, la pression artérielle qui en résulte se situe entre 100 et 140 mmHg et propulse le sang à travers les quelque 100 000 kilomètres de vaisseaux.</p>

        <p>Avec l’échocardiographie, le cœur est visualisé en temps réel. La méthode permet d’évaluer les troubles de la motilité pariétale, les modifications valvulaires et d’autres altérations structurelles qui ne s’accompagnent pas nécessairement de symptômes au quotidien.</p>

        <h2>Comment se déroule l’examen ?</h2>

        <p>Pour cet examen, vous vous allongez sur le côté gauche. Nous réalisons l’examen avec une sonde échographique spécifique. Aucune préparation de votre part n’est nécessaire.</p>

        <p>À la fin de l’examen, vous recevez votre compte rendu personnel.</p>
      es: |-
        <p>El corazón coordina la circulación sanguínea mediante impulsos eléctricos, contracciones musculares y cuatro válvulas cardíacas. En cada latido se bombean unos 70 mililitros de sangre. Con cerca de 100.000 latidos al día, el corazón mueve en promedio 7.000 litros de sangre al día por el cuerpo. En adultos sanos la presión arterial resultante se sitúa entre 100 y 140 mmHg y impulsa la sangre a través de los aproximadamente 100.000 kilómetros de vasos sanguíneos.</p>

        <p>Con la ecocardiografía el corazón se visualiza en tiempo real. La técnica permite valorar trastornos de la motilidad parietal, alteraciones valvulares y otras alteraciones estructurales que no siempre se acompañan de síntomas en la vida diaria.</p>

        <h2>¿Cómo se realiza la exploración?</h2>

        <p>Para esta exploración usted se coloca en decúbito lateral izquierdo. Realizamos el estudio con una sonda ecográfica específica. No se requiere preparación por su parte.</p>

        <p>Al finalizar recibe su informe personal.</p>
      it: |-
        <p>Il cuore coordina la circolazione sanguigna attraverso impulsi elettrici, contrazioni muscolari e quattro valvole cardiache. Ad ogni battito vengono pompati dal cuore circa 70 millilitri di sangue. Con circa 100.000 battiti al giorno il cuore muove in media 7.000 litri di sangue al giorno attraverso il corpo. Nell'adulto sano la pressione arteriosa che ne deriva si attesta tra 100 e 140 mmHg e spinge il sangue lungo i vasi sanguigni, lunghi nel complesso circa 100.000 chilometri.</p>

        <p>Con l'ecocardiografia il cuore viene visualizzato in tempo reale. La metodica consente di valutare alterazioni della motilità parietale, alterazioni valvolari e altre modificazioni strutturali che nella vita quotidiana non sempre si manifestano con sintomi.</p>

        <h2>Come si svolge l'esame?</h2>

        <p>Per questo esame si distende sul fianco sinistro. Eseguiamo l'indagine con una sonda ecografica dedicata. Da parte sua non è necessaria alcuna preparazione.</p>

        <p>Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: |-
        <p>O coração coordena a circulação sanguínea através de impulsos eléctricos, contracções musculares e quatro válvulas cardíacas. Em cada batimento são bombeados pelo coração cerca de 70 mililitros de sangue. Com cerca de 100.000 batimentos por dia, o coração movimenta em média 7.000 litros de sangue por dia através do corpo. No adulto saudável a pressão arterial daí resultante situa-se entre 100 e 140 mmHg e impulsiona o sangue pelos vasos sanguíneos, com cerca de 100.000 quilómetros de comprimento total.</p>

        <p>Com a ecocardiografia o coração é visualizado em tempo real. O método permite avaliar alterações da motilidade parietal, alterações valvulares e outras modificações estruturais que nem sempre se acompanham de sintomas no dia-a-dia.</p>

        <h2>Como é realizado o exame?</h2>

        <p>Para este exame, deita-se em decúbito lateral esquerdo. Realizamos o estudo com uma sonda ecográfica específica. Não é necessária qualquer preparação da sua parte.</p>

        <p>No final do exame recebe o seu relatório pessoal.</p>
