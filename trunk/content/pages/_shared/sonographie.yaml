  - type: body
    heading:
      de: Sonographie der Bauchorgane
      en: Ultrasound of the abdominal organs
      fr: Échographie des organes abdominaux
      es: Ecografía de los órganos abdominales
      it: Ecografia degli organi addominali
      pt-pt: Ecografia dos órgãos abdominais
    body_html:
      de: |-
        <p>Bei der Sonographie des Bauchraums beurteilen wir alle wichtigen inneren Organe in einer einzigen Untersuchung — schmerzfrei, strahlenfrei, in etwa 20 Minuten.</p>

        <p>Was wir uns ansehen:</p>

        <ul>
        <li><strong>Leber</strong> — ein Organ, das selbst nach Verlust von 75 Prozent seiner Substanz innerhalb von Monaten regenerieren kann.</li>
        <li><strong>Nieren</strong> — filtern jährlich bis zu 55.000 Liter Blut.</li>
        <li><strong>Milz</strong> — funktioniert wie der Ölfilter des Körpers; Veränderungen weisen auf Erkrankungen des Blutes oder Lymphsystems hin.</li>
        <li><strong>Bauchspeicheldrüse</strong> — nur 100 Gramm schwer, aber zentral für Verdauung und Zuckerstoffwechsel.</li>
        <li><strong>Darm</strong> — etwa 7 Meter lang, mit Wänden von wenigen Millimetern Dicke und einem reichen Mikrobiom.</li>
        <li>Gallenblase und Gallenwege, Harnblase, Prostata bzw. Uterus, Becken- und Beingefäße.</li>
        </ul>

        <h2>Wie wird die Untersuchung durchgeführt?</h2>

        <p>Während Sie entspannt auf einer Liege ruhen, führen wir die Sonographie der Organe durch. Es ist günstig, nüchtern zur Untersuchung zu kommen. Die Untersuchung dauert etwa 20 Minuten.</p>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      en: |-
        <p>In the abdominal ultrasound we assess all the important internal organs in a single examination — pain-free, radiation-free, in about 20 minutes.</p>

        <p>What we look at:</p>

        <ul>
        <li><strong>Liver</strong> — an organ that can regenerate to its normal size within months even after losing 75 per cent of its substance.</li>
        <li><strong>Kidneys</strong> — filter up to 55,000 litres of blood each year.</li>
        <li><strong>Spleen</strong> — works like the body's oil filter; changes point to diseases of the blood or the lymphatic system.</li>
        <li><strong>Pancreas</strong> — only 100 grams in weight but central for digestion and glucose metabolism.</li>
        <li><strong>Intestines</strong> — about 7 metres long, with walls only a few millimetres thick and a rich microbiome.</li>
        <li>Gallbladder and bile ducts, bladder, prostate or uterus, pelvic vessels and leg vessels.</li>
        </ul>

        <h2>How is the examination carried out?</h2>

        <p>While you rest comfortably on the examination couch, we perform the ultrasound of the organs. It is helpful to come fasting. The examination takes about 20 minutes.</p>

        <p>At the end you receive your personal findings report.</p>
      fr: |-
        <p>Lors de l’échographie abdominale, nous évaluons tous les organes internes importants en un seul examen — indolore, sans rayonnement, en environ 20 minutes.</p>

        <p>Ce que nous examinons :</p>

        <ul>
        <li><strong>Foie</strong> — un organe capable de retrouver sa taille normale en quelques mois, même après avoir perdu 75 pour cent de sa substance.</li>
        <li><strong>Reins</strong> — filtrent jusqu’à 55 000 litres de sang par an.</li>
        <li><strong>Rate</strong> — fonctionne comme le filtre à huile de l’organisme ; ses altérations renvoient à des maladies du sang ou du système lymphatique.</li>
        <li><strong>Pancréas</strong> — ne pèse que 100 grammes mais reste central pour la digestion et le métabolisme du sucre.</li>
        <li><strong>Intestin</strong> — environ 7 mètres de long, des parois de quelques millimètres seulement et un microbiote très riche.</li>
        <li>Vésicule et voies biliaires, vessie, prostate ou utérus, vaisseaux pelviens et des membres inférieurs.</li>
        </ul>

        <h2>Comment se déroule l’examen ?</h2>

        <p>Pendant que vous êtes confortablement allongé·e sur la table, nous réalisons l’échographie des organes. Il est préférable de venir à jeun. L’examen dure environ 20 minutes.</p>

        <p>À la fin, vous recevez votre compte rendu personnel.</p>
      es: |-
        <p>En la ecografía abdominal evaluamos todos los órganos internos importantes en una sola exploración — indolora, sin radiación, en unos 20 minutos.</p>

        <p>Qué revisamos:</p>

        <ul>
        <li><strong>Hígado</strong> — un órgano capaz de recuperar su tamaño normal en meses, incluso tras perder el 75 por ciento de su sustancia.</li>
        <li><strong>Riñones</strong> — filtran hasta 55.000 litros de sangre al año.</li>
        <li><strong>Bazo</strong> — funciona como el filtro de aceite del cuerpo; sus alteraciones apuntan a enfermedades de la sangre o del sistema linfático.</li>
        <li><strong>Páncreas</strong> — pesa solo 100 gramos pero es central para la digestión y el metabolismo del azúcar.</li>
        <li><strong>Intestino</strong> — unos 7 metros de longitud, paredes de pocos milímetros y un microbioma muy rico.</li>
        <li>Vesícula biliar y vías biliares, vejiga, próstata o útero, vasos pélvicos y de las piernas.</li>
        </ul>

        <h2>¿Cómo se realiza la exploración?</h2>

        <p>Mientras descansa cómodamente en una camilla, realizamos la ecografía de los órganos. Es conveniente acudir en ayunas. La exploración dura unos 20 minutos.</p>

        <p>Al finalizar recibe su informe personal.</p>
      it: |-
        <p>Nell'ecografia dell'addome valutiamo tutti gli organi interni principali in un unico esame — indolore, senza radiazioni, in circa 20 minuti.</p>

        <p>Cosa osserviamo:</p>

        <ul>
        <li><strong>Fegato</strong> — un organo capace di rigenerarsi nel giro di mesi anche dopo aver perso il 75 percento della propria sostanza.</li>
        <li><strong>Reni</strong> — filtrano ogni anno fino a 55.000 litri di sangue.</li>
        <li><strong>Milza</strong> — funziona come il filtro dell'olio del corpo; le sue alterazioni rinviano a malattie del sangue o del sistema linfatico.</li>
        <li><strong>Pancreas</strong> — pesa solo 100 grammi ma è centrale per la digestione e il metabolismo glucidico.</li>
        <li><strong>Intestino</strong> — circa 7 metri di lunghezza, pareti di pochi millimetri e un microbioma ricchissimo.</li>
        <li>Cistifellea e vie biliari, vescica, prostata o utero, vasi pelvici e degli arti inferiori.</li>
        </ul>

        <h2>Come si svolge l'esame?</h2>

        <p>Mentre lei riposa rilassato sul lettino, eseguiamo l'ecografia degli organi. È preferibile presentarsi a digiuno. L'esame dura circa 20 minuti.</p>

        <p>Al termine le consegniamo il suo referto personale.</p>
      pt-pt: |-
        <p>Na ecografia abdominal avaliamos todos os principais órgãos internos num único exame — indolor, sem radiação, em cerca de 20 minutos.</p>

        <p>O que observamos:</p>

        <ul>
        <li><strong>Fígado</strong> — um órgão capaz de se regenerar em meses, mesmo após perder 75 por cento da sua substância.</li>
        <li><strong>Rins</strong> — filtram anualmente até 55.000 litros de sangue.</li>
        <li><strong>Baço</strong> — funciona como o filtro de óleo do organismo; as suas alterações apontam para doenças do sangue ou do sistema linfático.</li>
        <li><strong>Pâncreas</strong> — pesa apenas 100 gramas, mas é central para a digestão e para o metabolismo do açúcar.</li>
        <li><strong>Intestino</strong> — cerca de 7 metros de comprimento, com paredes de poucos milímetros e um microbioma riquíssimo.</li>
        <li>Vesícula e vias biliares, bexiga, próstata ou útero, vasos pélvicos e dos membros inferiores.</li>
        </ul>

        <h2>Como é realizado o exame?</h2>

        <p>Enquanto descansa relaxado na maca, realizamos a ecografia dos órgãos. É preferível comparecer em jejum. O exame dura aproximadamente 20 minutos.</p>

        <p>No final do exame recebe o seu relatório pessoal.</p>
