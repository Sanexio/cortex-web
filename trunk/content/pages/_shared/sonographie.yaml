      de: Diagnostik · Sonographie
    heading:
      de: Sonographie
    lead:
      de: Ultraschall ist unsere wichtigste strahlungsfreie Bildgebung — direkt in der Praxis, ohne Wartezeit auf ein Radiologie-Institut.

  - type: body
    heading:
      de: Sonographie der Bauchorgane
    body_md:
      de: |
        In der Sonographie der Bauchorgane untersuchen wir Leber, Gallenwege, Bauchspeicheldrüse, Milz, Nieren und Harnwege sowie ggf. Aortenstrukturen und Lymphknoten. Hochauflösende Ultraschallgeräte erlauben uns eine differenzierte Beurteilung von Organgröße, Struktur, Gefäßversorgung und auffälligen Raumforderungen.

        Die Untersuchung dauert etwa 30–45 Minuten und ist schmerzfrei. Bitte kommen Sie nüchtern (mindestens 4 Stunden ohne Essen, Wasser ist erlaubt) — die Bauchspeicheldrüse und Gallenblase sind dann besser beurteilbar.

        Im Anschluss besprechen wir die Befunde persönlich mit Ihnen.

