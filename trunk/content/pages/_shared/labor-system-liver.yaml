    lead:
      de: 'Leber — Laborprofil zur Beurteilung der Leberfunktion.'
      en: 'Liver — laboratory profile for assessing liver function.'
      fr: 'Foie — profil de laboratoire pour l’évaluation de la fonction hépatique.'
      es: 'Hígado — perfil de laboratorio para evaluar la función hepática.'
      it: 'Fegato — profilo di laboratorio per la valutazione della funzione epatica.'
      pt-pt: 'Fígado — perfil laboratorial para avaliação da função hepática.'
    image: shopify-mirror://detail/labor-system-liver-hero.jpg
  - type: body
    body_html:
      de: |-
        <p>Mit dem Laborprofil <strong>Leber</strong> erhalten Sie eine strukturierte Beurteilung der Leberfunktion. Zentrale Aufgaben der Leber sind Entgiftung — also der Abbau und die Umwandlung körpereigener und externer Substanzen wie Medikamente und Alkohol —, die Speicherung von Nährstoffen sowie die Regulation des Fett-, Zucker- und Eiweißstoffwechsels. Die Leber filtert das gesamte Blutvolumen bis zu 30-mal täglich und ist eng in die Immunabwehr eingebunden.</p>

        <p>Ungünstige Ernährung, bestimmte Medikamente oder übermäßiger Alkoholkonsum können zu chronischen Leberveränderungen führen — bis hin zur Leberzirrhose oder zu Lebertumoren.</p>

        <h2>Wir analysieren folgende Parameter:</h2>

        <ul>
        <li>GOT, GPT, Gamma-GT, Bilirubin, CHE als orientierende Marker der Leberfunktion</li>
        <li>Kreatinin und Harnstoff (Nierenfunktion)</li>
        <li>Natrium und Kalium als indirekte Marker</li>
        <li>Gesamtprotein</li>
        <li>Proteinelektrophorese</li>
        </ul>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      en: |-
        <p>With the lab profile <strong>Liver</strong> you receive a structured assessment of liver function. Key tasks of the liver are detoxification — the breakdown and conversion of endogenous and external substances such as medications and alcohol —, the storage of nutrients and the regulation of fat, sugar and protein metabolism. The liver filters the entire blood volume up to 30 times a day and is closely involved in immune defence.</p>

        <p>Unfavourable nutrition, certain medications or excessive alcohol consumption can lead to chronic changes in the liver — up to liver cirrhosis or liver tumours.</p>

        <h2>We analyse the following parameters:</h2>

        <ul>
        <li>AST (GOT), ALT (GPT), gamma-GT, bilirubin, CHE as orienting markers of liver function</li>
        <li>Creatinine and urea (kidney function)</li>
        <li>Sodium and potassium as indirect markers</li>
        <li>Total protein</li>
        <li>Protein electrophoresis</li>
        </ul>

        <p>At the end of the examination you receive your personal findings report.</p>
      fr: |-
        <p>Avec le profil de laboratoire <strong>Foie</strong>, vous obtenez une évaluation structurée de la fonction hépatique. Les missions centrales du foie sont la détoxication — c’est-à-dire la dégradation et la transformation de substances endogènes et exogènes telles que médicaments et alcool —, le stockage des nutriments et la régulation du métabolisme des graisses, des sucres et des protéines. Le foie filtre l’ensemble du volume sanguin jusqu’à 30 fois par jour et est étroitement impliqué dans la défense immunitaire.</p>

        <p>Une alimentation défavorable, certains médicaments ou une consommation excessive d’alcool peuvent entraîner des modifications chroniques du foie — jusqu’à la cirrhose ou des tumeurs hépatiques.</p>

        <h2>Nous analysons les paramètres suivants :</h2>

        <ul>
        <li>ASAT, ALAT, gamma-GT, bilirubine, cholinestérase comme marqueurs d’orientation de la fonction hépatique</li>
        <li>Créatinine et urée (fonction rénale)</li>
        <li>Sodium et potassium comme marqueurs indirects</li>
        <li>Protéines totales</li>
        <li>Électrophorèse des protéines</li>
        </ul>

        <p>À la fin de l’examen, vous recevez votre compte rendu personnel.</p>
      es: |-
        <p>Con el perfil de laboratorio <strong>Hígado</strong> obtiene una valoración estructurada de la función hepática. Las funciones centrales del hígado son la desintoxicación — es decir, la degradación y transformación de sustancias endógenas y externas como medicamentos y alcohol —, el almacenamiento de nutrientes y la regulación del metabolismo de grasas, azúcares y proteínas. El hígado filtra el volumen total de sangre hasta 30 veces al día y está estrechamente implicado en la defensa inmunitaria.</p>

        <p>Una alimentación desfavorable, ciertos medicamentos o un consumo excesivo de alcohol pueden provocar alteraciones crónicas del hígado — hasta cirrosis hepática o tumores hepáticos.</p>

        <h2>Analizamos los siguientes parámetros:</h2>

        <ul>
        <li>GOT, GPT, gamma-GT, bilirrubina, CHE como marcadores orientativos de la función hepática</li>
        <li>Creatinina y urea (función renal)</li>
        <li>Sodio y potasio como marcadores indirectos</li>
        <li>Proteínas totales</li>
        <li>Electroforesis de proteínas</li>
        </ul>

        <p>Al finalizar recibe su informe personal.</p>
      it: |-
        <p>Con il profilo di laboratorio <strong>Fegato</strong> riceve una valutazione strutturata della funzione epatica. Compiti centrali del fegato sono la detossificazione — ossia la degradazione e la trasformazione di sostanze endogene ed esterne come farmaci e alcol —, il deposito di nutrienti e la regolazione del metabolismo di grassi, zuccheri e proteine. Il fegato filtra l'intero volume ematico fino a 30 volte al giorno ed è strettamente coinvolto nella risposta immunitaria.</p>

        <p>Un'alimentazione sfavorevole, alcuni farmaci o un consumo eccessivo di alcol possono portare ad alterazioni croniche del fegato — fino alla cirrosi epatica o a tumori del fegato.</p>

        <h2>Analizziamo i seguenti parametri:</h2>

        <ul>
        <li>GOT, GPT, gamma-GT, bilirubina, colinesterasi come marcatori orientativi della funzione epatica</li>
        <li>Creatinina e urea (funzione renale)</li>
        <li>Sodio e potassio come marcatori indiretti</li>
        <li>Proteine totali</li>
        <li>Elettroforesi proteica</li>
        </ul>

        <p>Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: |-
        <p>Com o perfil laboratorial <strong>Fígado</strong> recebe uma avaliação estruturada da função hepática. Tarefas centrais do fígado são a desintoxicação — ou seja, a degradação e a transformação de substâncias endógenas e externas, como medicamentos e álcool —, o armazenamento de nutrientes e a regulação do metabolismo de gorduras, açúcares e proteínas. O fígado filtra o volume total de sangue até 30 vezes por dia e está estreitamente envolvido na defesa imunitária.</p>

        <p>Uma alimentação desfavorável, certos medicamentos ou consumo excessivo de álcool podem levar a alterações crónicas do fígado — até cirrose hepática ou tumores hepáticos.</p>

        <h2>Analisamos os seguintes parâmetros:</h2>

        <ul>
        <li>GOT, GPT, gama-GT, bilirrubina, colinesterase como marcadores orientativos da função hepática</li>
        <li>Creatinina e ureia (função renal)</li>
        <li>Sódio e potássio como marcadores indirectos</li>
        <li>Proteínas totais</li>
        <li>Electroforese proteica</li>
        </ul>

        <p>No final do exame recebe o seu relatório pessoal.</p>
