  lead:
    de: Clearance & Detox Capacity Readout — Funktion und Belastung der Leber.
- type: body
  body_md:
    de: 'Zu den zentralen Aufgaben der Leber gehören Entgiftung, Speicherung von Nährstoffen sowie die Regulation von Fett-, Zucker- und Eiweißstoffwechsel. Sie filtert das gesamte Blutvolumen mehrfach
      täglich und ist eng in die Immunabwehr eingebunden.


      Ungesunde Ernährung, bestimmte Medikamente oder übermäßiger Alkoholkonsum können die Leber chronisch schädigen — bis hin zur Leberzirrhose oder Leberkrebs. System Liver beurteilt Funktion und mögliche
      Belastung im Labor. Analysierte Parameter: Leberfunktion (GOT, GPT, GGT, Bilirubin), Cholinesterase und Lipase, Gesamtprotein und Proteinelektrophorese.


      Im Anschluss besprechen wir die Werte persönlich mit Ihnen.'
