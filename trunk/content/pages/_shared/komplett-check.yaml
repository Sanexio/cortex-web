      de: Komplett-Check — ausführliche Vorsorgeuntersuchung in etwa zwei Stunden.
      en: Complete Check — comprehensive preventive examination in about two hours.
      fr: Examen complet — bilan préventif approfondi en environ deux heures.
      es: Examen completo — chequeo preventivo exhaustivo en unas dos horas.
