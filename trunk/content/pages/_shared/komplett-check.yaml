  - type: body
    body_html:
      de: >-
        <p>Der Komplett-Check fasst eine ausführliche Vorsorgeuntersuchung zusammen. In etwa zwei
        Stunden führen wir eine strukturierte ärztliche Beurteilung durch.</p>


        <h2>Welche Untersuchungen umfasst der Komplett-Check?</h2>


        <ul>

        <li>Ultraschall der Schilddrüse</li>

        <li>Ultraschall der Halsgefäße (Carotis-Duplex)</li>

        <li>Echokardiographie (Herzultraschall)</li>

        <li>Ultraschall des Bauchraums</li>

        <li>Belastungs-EKG (Ergometrie)</li>

        <li>Lungenfunktion (Spirometrie)</li>

        </ul>


        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      en: >-
        <p>The Complete Check brings together a comprehensive preventive examination. In about two
        hours we carry out a structured medical assessment.</p>


        <h2>Which examinations does the Complete Check include?</h2>


        <ul>

        <li>Thyroid ultrasound</li>

        <li>Ultrasound of the neck vessels (carotid duplex)</li>

        <li>Echocardiography (cardiac ultrasound)</li>

        <li>Abdominal ultrasound</li>

        <li>Exercise ECG (ergometry)</li>

        <li>Lung function test (spirometry)</li>

        </ul>


        <p>At the end of the examination you receive your personal findings report.</p>
      fr: >-
        <p>L’Examen complet réunit un bilan préventif approfondi. En environ deux heures, nous
        effectuons une évaluation médicale structurée.</p>


        <h2>Quels examens comprend l’Examen complet ?</h2>


        <ul>

        <li>Échographie thyroïdienne</li>

        <li>Échographie des vaisseaux du cou (Doppler carotidien)</li>

        <li>Échocardiographie (échographie cardiaque)</li>

        <li>Échographie abdominale</li>

        <li>ECG d’effort (ergométrie)</li>

        <li>Spirométrie (fonction pulmonaire)</li>

        </ul>


        <p>À la fin de l’examen, vous recevez votre compte rendu personnel.</p>
      es: >-
        <p>El Examen completo reúne un chequeo preventivo exhaustivo. En unas dos horas realizamos
        una valoración médica estructurada.</p>


        <h2>¿Qué exploraciones incluye el Examen completo?</h2>


        <ul>

        <li>Ecografía tiroidea</li>

        <li>Ecografía de los vasos del cuello (dúplex carotídeo)</li>

        <li>Ecocardiografía (ecografía cardíaca)</li>

        <li>Ecografía abdominal</li>

        <li>ECG de esfuerzo (ergometría)</li>

        <li>Espirometría (función pulmonar)</li>

        </ul>


        <p>Al finalizar recibe su informe personal.</p>
      it: >-
        <p>Il Check completo riassume una visita preventiva approfondita. In circa due ore eseguiamo
        una valutazione medica strutturata.</p>


        <h2>Quali esami comprende il Check completo?</h2>


        <ul>

        <li>Ecografia della tiroide</li>

        <li>Ecografia dei vasi del collo (eco-Doppler delle carotidi)</li>

        <li>Ecocardiografia (ecografia cardiaca)</li>

        <li>Ecografia dell'addome</li>

        <li>ECG da sforzo (ergometria)</li>

        <li>Spirometria (funzione respiratoria)</li>

        </ul>


        <p>Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: >-
        <p>O Check completo reúne um exame preventivo aprofundado. Em cerca de duas horas
        realizamos uma avaliação médica estruturada.</p>


        <h2>Que exames inclui o Check completo?</h2>


        <ul>

        <li>Ecografia da tiroide</li>

        <li>Ecografia dos vasos do pescoço (eco-Doppler das carótidas)</li>

        <li>Ecocardiografia (ecografia cardíaca)</li>

        <li>Ecografia abdominal</li>

        <li>ECG de esforço (ergometria)</li>

        <li>Espirometria (função pulmonar)</li>

        </ul>


        <p>No final do exame recebe o seu relatório pessoal.</p>
