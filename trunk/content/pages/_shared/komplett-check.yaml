  body_md:
    de: 'Der Komplett-Check fasst unsere apparativen Vorsorge-Untersuchungen in einem Termin zusammen. Geeignet für eine strukturierte Standortbestimmung in etwa zwei Stunden.


      Enthaltene Untersuchungen: Ultraschall der Schilddrüse, Ultraschall der Halsgefäße (Carotis-Duplex), Echokardiographie (Herzultraschall), Ultraschall aller Bauchorgane, Ergometrie (Belastungs-EKG)
      sowie Spirometrie (Lungenfunktion).


      Im Anschluss besprechen wir die Befunde persönlich mit Ihnen.'
