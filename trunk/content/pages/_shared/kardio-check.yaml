  - type: body
    body_html:
      de: >-
        <p>Das Herz schlägt im Durchschnitt etwa 70-mal pro Minute — über 100.000-mal am Tag und
        mehr als 36 Millionen-mal im Jahr. Es pumpt rund fünf Liter Blut pro Minute, was über 7.000
        Liter am Tag entspricht. Unter Belastung kann ein gesundes Herz bis zu 30 Liter pro Minute
        pumpen.</p>


        <p>Beim Kardio-Check beurteilen wir Herz und Lunge in einer strukturierten Untersuchung —
        sowohl in Ruhe als auch unter kontrollierter Belastung.</p>


        <h2>Wie wird die Untersuchung durchgeführt?</h2>


        <p>Wir beginnen mit einer klinischen Untersuchung — Herz und Lunge werden abgehört.
        Anschließend führen wir einen Herzultraschall (Echokardiographie) durch. Es folgen ein
        Belastungs-EKG (Ergometrie) sowie eine Lungenfunktion (Spirometrie).</p>


        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      it: >-
        <p>Il cuore batte in media circa 70 volte al minuto — oltre 100.000 volte al giorno e più
        di 36 milioni di volte all'anno. Pompa circa cinque litri di sangue al minuto, vale a dire
        oltre 7.000 litri al giorno. Sotto sforzo un cuore sano può pompare fino a 30 litri al
        minuto.</p>


        <p>Nel Kardio-Check valutiamo cuore e polmoni in un esame strutturato — sia a riposo sia
        sotto sforzo controllato.</p>


        <h2>Come si svolge l'esame?</h2>


        <p>Iniziamo con un esame clinico — auscultazione di cuore e polmoni. Segue un'ecografia
        cardiaca (ecocardiografia). Poi un ECG da sforzo (ergometria) e una spirometria (funzione
        respiratoria).</p>


        <p>Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: >-
        <p>O coração bate em média cerca de 70 vezes por minuto — mais de 100.000 vezes por dia e
        mais de 36 milhões de vezes por ano. Bombeia cerca de cinco litros de sangue por minuto,
        ou seja, mais de 7.000 litros por dia. Sob esforço, um coração saudável pode bombear até
        30 litros por minuto.</p>


        <p>No Kardio-Check avaliamos coração e pulmões num exame estruturado — tanto em repouso
        como sob esforço controlado.</p>


        <h2>Como é realizado o exame?</h2>


        <p>Começamos com um exame clínico — auscultação de coração e pulmões. Em seguida realizamos
        uma ecografia cardíaca (ecocardiografia). Seguem-se um ECG de esforço (ergometria) e uma
        espirometria (função pulmonar).</p>


        <p>No final do exame recebe o seu relatório pessoal.</p>
