    lead:
      de: Kardio-Check — strukturierte Beurteilung von Herz und Lunge in einer Untersuchung.
      en: Cardio Check — structured assessment of heart and lungs in a single examination.
      fr: Cardio Check — évaluation structurée du cœur et des poumons en un seul examen.
      es: Cardio Check — valoración estructurada del corazón y los pulmones en una sola exploración.
      it: Kardio-Check — valutazione strutturata di cuore e polmoni in un unico esame.
      pt-pt: Kardio-Check — avaliação estruturada de coração e pulmões num único exame.
    image: shopify-mirror://detail/kardio-check-hero.jpg
  - type: body
    body_html:
      de: >-
        <p>Das Herz schlägt im Durchschnitt etwa 70-mal pro Minute — über 100.000-mal am Tag und
        mehr als 36 Millionen-mal im Jahr. Es pumpt rund fünf Liter Blut pro Minute, was über 7.000
        Liter am Tag entspricht. Unter Belastung kann ein gesundes Herz bis zu 30 Liter pro Minute
        pumpen.</p>


        <p>Beim Kardio-Check beurteilen wir Herz und Lunge in einer strukturierten Untersuchung —
        sowohl in Ruhe als auch unter kontrollierter Belastung.</p>


        <h2>Wie wird die Untersuchung durchgeführt?</h2>


        <p>Wir beginnen mit einer klinischen Untersuchung — Herz und Lunge werden abgehört.
        Anschließend führen wir einen Herzultraschall (Echokardiographie) durch. Es folgen ein
        Belastungs-EKG (Ergometrie) sowie eine Lungenfunktion (Spirometrie).</p>


        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      en: >-
        <p>The heart beats on average about 70 times per minute — over 100,000 times per day and
        more than 36 million times per year. It pumps about five litres of blood per minute, which
        amounts to more than 7,000 litres per day. Under load a healthy heart can pump up to 30
        litres per minute.</p>


        <p>In the Cardio Check we assess heart and lungs in a structured examination — both at rest
        and under controlled load.</p>


        <h2>How is the examination carried out?</h2>


        <p>We start with a clinical examination — auscultation of heart and lungs. We then perform
        a cardiac ultrasound (echocardiography). This is followed by an exercise ECG (ergometry)
        and a lung function test (spirometry).</p>


        <p>At the end of the examination you receive your personal findings report.</p>
      fr: >-
        <p>Le cœur bat en moyenne environ 70 fois par minute — soit plus de 100 000 fois par jour
        et plus de 36 millions de fois par an. Il pompe environ cinq litres de sang par minute,
        soit plus de 7 000 litres par jour. À l’effort, un cœur sain peut pomper jusqu’à 30 litres
        par minute.</p>


        <p>Lors du Cardio Check, nous évaluons le cœur et les poumons lors d’un examen structuré —
        au repos comme sous effort contrôlé.</p>


        <h2>Comment se déroule l’examen ?</h2>


        <p>Nous commençons par un examen clinique — auscultation du cœur et des poumons. Nous
        réalisons ensuite une échocardiographie. Suivent un ECG d’effort (ergométrie) et une
        spirométrie (fonction pulmonaire).</p>


        <p>À la fin de l’examen, vous recevez votre compte rendu personnel.</p>
      es: >-
        <p>El corazón late en promedio unas 70 veces por minuto — más de 100.000 veces al día y
        más de 36 millones de veces al año. Bombea unos cinco litros de sangre por minuto, lo que
        supone más de 7.000 litros al día. Bajo esfuerzo, un corazón sano puede bombear hasta 30
        litros por minuto.</p>


        <p>En el Cardio Check valoramos el corazón y los pulmones en una exploración estructurada
        — tanto en reposo como bajo esfuerzo controlado.</p>


        <h2>¿Cómo se realiza la exploración?</h2>


        <p>Comenzamos con una exploración clínica — auscultación de corazón y pulmones. A
        continuación realizamos una ecografía cardíaca (ecocardiografía). Le siguen un ECG de
        esfuerzo (ergometría) y una espirometría (función pulmonar).</p>


        <p>Al finalizar recibe su informe personal.</p>
      it: >-
        <p>Il cuore batte in media circa 70 volte al minuto — oltre 100.000 volte al giorno e più
        di 36 milioni di volte all'anno. Pompa circa cinque litri di sangue al minuto, vale a dire
        oltre 7.000 litri al giorno. Sotto sforzo un cuore sano può pompare fino a 30 litri al
        minuto.</p>


        <p>Nel Kardio-Check valutiamo cuore e polmoni in un esame strutturato — sia a riposo sia
        sotto sforzo controllato.</p>


        <h2>Come si svolge l'esame?</h2>


        <p>Iniziamo con un esame clinico — auscultazione di cuore e polmoni. Segue un'ecografia
        cardiaca (ecocardiografia). Poi un ECG da sforzo (ergometria) e una spirometria (funzione
        respiratoria).</p>


        <p>Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: >-
        <p>O coração bate em média cerca de 70 vezes por minuto — mais de 100.000 vezes por dia e
        mais de 36 milhões de vezes por ano. Bombeia cerca de cinco litros de sangue por minuto,
        ou seja, mais de 7.000 litros por dia. Sob esforço, um coração saudável pode bombear até
        30 litros por minuto.</p>


        <p>No Kardio-Check avaliamos coração e pulmões num exame estruturado — tanto em repouso
        como sob esforço controlado.</p>


        <h2>Como é realizado o exame?</h2>


        <p>Começamos com um exame clínico — auscultação de coração e pulmões. Em seguida realizamos
        uma ecografia cardíaca (ecocardiografia). Seguem-se um ECG de esforço (ergometria) e uma
        espirometria (função pulmonar).</p>


        <p>No final do exame recebe o seu relatório pessoal.</p>
