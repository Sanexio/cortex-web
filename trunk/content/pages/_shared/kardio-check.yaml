  - type: body
    body_html:
      de: |-
        <p>Das Herz schlägt im Durchschnitt etwa 70-mal pro Minute — über 100.000-mal am Tag und mehr als 36 Millionen-mal im Jahr. Es pumpt rund fünf Liter Blut pro Minute, was über 7.000 Liter am Tag entspricht. Unter Belastung kann ein gesundes Herz bis zu 30 Liter pro Minute pumpen.</p>

        <p>Beim Kardio-Check beurteilen wir Herz und Lunge in einer strukturierten Untersuchung — sowohl in Ruhe als auch unter kontrollierter Belastung.</p>

        <h2>Wie wird die Untersuchung durchgeführt?</h2>

        <p>Wir beginnen mit einer klinischen Untersuchung — Herz und Lunge werden abgehört. Anschließend führen wir einen Herzultraschall (Echokardiographie) durch. Es folgen ein Belastungs-EKG (Ergometrie) sowie eine Lungenfunktion (Spirometrie).</p>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
