  - type: body
    body_html:
      de: |-
        <p>Bei der genetischen Beratung sprechen wir mit Ihnen über die Möglichkeiten und Grenzen genetischer Tests, ordnen vorhandene Befunde ein und unterstützen Sie bei der Entscheidung, ob weiterführende Untersuchungen sinnvoll sind.</p>

        <p>Zum Abschluss der Beratung erhalten Sie eine schriftliche Zusammenfassung.</p>
      en: |-
        <p>In the genetic consultation we talk with you about the possibilities and limits of genetic tests, put existing findings into context and support you in deciding whether further investigations make sense.</p>

        <p>At the end of the consultation you receive a written summary.</p>
      fr: |-
        <p>Lors de la consultation génétique, nous discutons avec vous des possibilités et des limites des tests génétiques, contextualisons les résultats existants et vous soutenons dans la décision de réaliser ou non des examens complémentaires.</p>

        <p>À la fin de la consultation, vous recevez un résumé écrit.</p>
      es: |-
        <p>En la consulta genética hablamos con usted sobre las posibilidades y los límites de las pruebas genéticas, contextualizamos los hallazgos existentes y le apoyamos en la decisión de si tienen sentido estudios adicionales.</p>

        <p>Al finalizar la consulta recibe un resumen por escrito.</p>
      it: |-
        <p>Nella consulenza genetica parliamo con lei delle possibilità e dei limiti dei test genetici, contestualizziamo i referti esistenti e la sosteniamo nella decisione se siano utili approfondimenti.</p>

        <p>Al termine del colloquio riceve un riassunto scritto.</p>
      pt-pt: |-
        <p>No aconselhamento genético conversamos consigo sobre as possibilidades e os limites dos testes genéticos, contextualizamos os resultados existentes e apoiamo-lo na decisão sobre se vale a pena aprofundar a investigação.</p>

        <p>No final da conversa recebe um resumo escrito.</p>
