  - type: body
    body_html:
      de: |-
        <p>Mit dem Laborprofil <strong>Immunsystem</strong> erhalten Sie eine strukturierte Beurteilung Ihres Immunsystems. Bei einer geschätzten Anzahl von etwa 10.000 Leukozyten pro Mikroliter Blut und einem Blutvolumen von rund 7 Litern verfügt der Mensch allein im Blut über knapp 70 Milliarden weiße Blutkörperchen. Bezieht man das gesamte Immunsystem ein, kommt man auf rund 1,8 Billionen Zellen — in Haut, Darm, Leber, Milz, Knochenmark.</p>

        <h2>Wir analysieren folgende Parameter:</h2>

        <ul>
        <li>Eisen und Transferrin</li>
        <li>Immunglobuline (IgA, IgG, IgM, IgE)</li>
        <li>Proteinelektrophorese im Serum</li>
        <li>Natrium, Magnesium, Kalium, Calcium</li>
        <li>Retikulozytenzahl</li>
        <li>Blutbild mit Differenzierung der weißen Blutkörperchen</li>
        <li>Spezielles Differentialblutbild</li>
        <li>Harnsäure</li>
        </ul>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
