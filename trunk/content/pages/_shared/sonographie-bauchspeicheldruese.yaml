  lead:
    de: Ultraschall der Bauchspeicheldrüse — gezielte Beurteilung eines kleinen, aber zentralen Organs.
- type: body
  body_md:
    de: 'Obwohl sie nur 70–100 Gramm wiegt, ist die Bauchspeicheldrüse für Verdauung und Zuckerstoffwechsel zentral. Sie liegt in der Mitte des Körpers, eng verbunden mit Magen, Leber, Darm und Milz. Eine
      Funktionsstörung kann zu Diabetes oder Verdauungsbeschwerden führen.


      Tumore der Bauchspeicheldrüse sind im Frühstadium oft schwer zu erkennen, weil das Organ versteckt liegt und sich Veränderungen schnell auf benachbarte Strukturen ausbreiten können. Eine gezielte
      Sonographie kann frühe Hinweise liefern.


      Wie wir vorgehen: Sie liegen entspannt auf der Liege, wir untersuchen die Bauchspeicheldrüse und die angrenzenden Organe per Ultraschall. Bitte kommen Sie nüchtern. Im Anschluss besprechen wir den
      Befund persönlich mit Ihnen.'
