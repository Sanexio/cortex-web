  - type: body
    body_html:
      de: |-
        <p>Obwohl sie nur 70 bis 100 Gramm wiegt, ist die Bauchspeicheldrüse (Pankreas) wichtig für Verdauung und Zuckerstoffwechsel. Sie liegt in der Mitte des Oberbauchs und steht in engem Kontakt zu Magen, Leber, Darm und Milz.</p>

        <p>Funktionsstörungen können zu Diabetes oder einer gestörten Verdauung mit anhaltendem Durchfall führen. Tumore der Bauchspeicheldrüse sind im Frühstadium oft schwer zu erkennen — der Ultraschall ist eine wichtige Untersuchung zur Beurteilung.</p>

        <h2>Wie wird die Untersuchung durchgeführt?</h2>

        <p>Während Sie entspannt auf einer Liege ruhen, führen wir die Sonographie der Bauchspeicheldrüse und der angrenzenden Organe durch. Es ist günstig, nüchtern zur Untersuchung zu kommen.</p>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      en: |-
        <p>Although it weighs only 70 to 100 grams, the pancreas is important for digestion and glucose metabolism. It lies in the middle of the upper abdomen and is in close contact with stomach, liver, intestines and spleen.</p>

        <p>Functional disorders can lead to diabetes or impaired digestion with persistent diarrhoea. Tumours of the pancreas are often difficult to detect at an early stage — ultrasound is an important examination for assessment.</p>

        <h2>How is the examination carried out?</h2>

        <p>While you rest comfortably on a couch, we perform the ultrasound of the pancreas and neighbouring organs. It is helpful to come fasting.</p>

        <p>At the end of the examination you receive your personal findings report.</p>
      fr: |-
        <p>Bien qu’il ne pèse que 70 à 100 grammes, le pancréas est important pour la digestion et le métabolisme du sucre. Il se situe au milieu du haut de l’abdomen et est en contact étroit avec l’estomac, le foie, l’intestin et la rate.</p>

        <p>Les troubles fonctionnels peuvent conduire au diabète ou à une digestion perturbée avec diarrhée persistante. Les tumeurs du pancréas sont souvent difficiles à détecter au stade précoce — l’échographie est un examen important pour leur évaluation.</p>

        <h2>Comment se déroule l’examen ?</h2>

        <p>Pendant que vous êtes confortablement allongé·e sur la table, nous réalisons l’échographie du pancréas et des organes voisins. Il est préférable de venir à jeun.</p>

        <p>À la fin de l’examen, vous recevez votre compte rendu personnel.</p>
      es: |-
        <p>Aunque pesa solo entre 70 y 100 gramos, el páncreas es importante para la digestión y el metabolismo del azúcar. Se sitúa en el centro del abdomen superior y se relaciona estrechamente con el estómago, el hígado, el intestino y el bazo.</p>

        <p>Las alteraciones funcionales pueden provocar diabetes o trastornos digestivos con diarrea persistente. Los tumores de páncreas a menudo son difíciles de detectar en estadio precoz — la ecografía es una exploración importante para su valoración.</p>

        <h2>¿Cómo se realiza la exploración?</h2>

        <p>Mientras descansa cómodamente en una camilla, realizamos la ecografía del páncreas y los órganos vecinos. Es conveniente acudir en ayunas.</p>

        <p>Al finalizar recibe su informe personal.</p>
      it: |-
        <p>Pur pesando solo dai 70 ai 100 grammi, il pancreas è fondamentale per la digestione e il metabolismo glucidico. Si trova al centro dell'addome superiore ed è a stretto contatto con stomaco, fegato, intestino e milza.</p>

        <p>Disfunzioni del pancreas possono causare diabete o disturbi digestivi con diarrea persistente. I tumori del pancreas in fase precoce sono spesso difficili da individuare — l'ecografia è un esame importante per la valutazione.</p>

        <h2>Come si svolge l'esame?</h2>

        <p>Mentre lei riposa rilassato sul lettino, eseguiamo l'ecografia del pancreas e degli organi limitrofi. È preferibile presentarsi a digiuno.</p>

        <p>Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: |-
        <p>Embora pese apenas 70 a 100 gramas, o pâncreas é fundamental para a digestão e o metabolismo do açúcar. Localiza-se no centro do andar superior do abdómen e está em estreito contacto com o estômago, o fígado, o intestino e o baço.</p>

        <p>Disfunções do pâncreas podem originar diabetes ou perturbações digestivas com diarreia persistente. Os tumores do pâncreas em fase inicial são frequentemente difíceis de detectar — a ecografia é um exame importante para a avaliação.</p>

        <h2>Como é realizado o exame?</h2>

        <p>Enquanto descansa relaxado na maca, realizamos a ecografia do pâncreas e dos órgãos vizinhos. É preferível comparecer em jejum.</p>

        <p>No final do exame recebe o seu relatório pessoal.</p>
