    body_html:
      de: |-
        <p>Obwohl sie nur 70 bis 100 Gramm wiegt, ist die Bauchspeicheldrüse (Pankreas) wichtig für Verdauung und Zuckerstoffwechsel. Sie liegt in der Mitte des Oberbauchs und steht in engem Kontakt zu Magen, Leber, Darm und Milz.</p>

        <p>Funktionsstörungen können zu Diabetes oder einer gestörten Verdauung mit anhaltendem Durchfall führen. Tumore der Bauchspeicheldrüse sind im Frühstadium oft schwer zu erkennen — der Ultraschall ist eine wichtige Untersuchung zur Beurteilung.</p>

        <h2>Wie wird die Untersuchung durchgeführt?</h2>

        <p>Während Sie entspannt auf einer Liege ruhen, führen wir die Sonographie der Bauchspeicheldrüse und der angrenzenden Organe durch. Es ist günstig, nüchtern zur Untersuchung zu kommen.</p>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
