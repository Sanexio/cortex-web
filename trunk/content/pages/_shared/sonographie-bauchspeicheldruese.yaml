  - type: body
    body_html:
      de: |-
        <p>Obwohl sie nur 70 bis 100 Gramm wiegt, ist die Bauchspeicheldrüse (Pankreas) wichtig für Verdauung und Zuckerstoffwechsel. Sie liegt in der Mitte des Oberbauchs und steht in engem Kontakt zu Magen, Leber, Darm und Milz.</p>

        <p>Funktionsstörungen können zu Diabetes oder einer gestörten Verdauung mit anhaltendem Durchfall führen. Tumore der Bauchspeicheldrüse sind im Frühstadium oft schwer zu erkennen — der Ultraschall ist eine wichtige Untersuchung zur Beurteilung.</p>

        <h2>Wie wird die Untersuchung durchgeführt?</h2>

        <p>Während Sie entspannt auf einer Liege ruhen, führen wir die Sonographie der Bauchspeicheldrüse und der angrenzenden Organe durch. Es ist günstig, nüchtern zur Untersuchung zu kommen.</p>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      it: |-
        <p>Pur pesando solo dai 70 ai 100 grammi, il pancreas è fondamentale per la digestione e il metabolismo glucidico. Si trova al centro dell'addome superiore ed è a stretto contatto con stomaco, fegato, intestino e milza.</p>

        <p>Disfunzioni del pancreas possono causare diabete o disturbi digestivi con diarrea persistente. I tumori del pancreas in fase precoce sono spesso difficili da individuare — l'ecografia è un esame importante per la valutazione.</p>

        <h2>Come si svolge l'esame?</h2>

        <p>Mentre lei riposa rilassato sul lettino, eseguiamo l'ecografia del pancreas e degli organi limitrofi. È preferibile presentarsi a digiuno.</p>

        <p>Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: |-
        <p>Embora pese apenas 70 a 100 gramas, o pâncreas é fundamental para a digestão e o metabolismo do açúcar. Localiza-se no centro do andar superior do abdómen e está em estreito contacto com o estômago, o fígado, o intestino e o baço.</p>

        <p>Disfunções do pâncreas podem originar diabetes ou perturbações digestivas com diarreia persistente. Os tumores do pâncreas em fase inicial são frequentemente difíceis de detectar — a ecografia é um exame importante para a avaliação.</p>

        <h2>Como é realizado o exame?</h2>

        <p>Enquanto descansa relaxado na maca, realizamos a ecografia do pâncreas e dos órgãos vizinhos. É preferível comparecer em jejum.</p>

        <p>No final do exame recebe o seu relatório pessoal.</p>
