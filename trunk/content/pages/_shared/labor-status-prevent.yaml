    lead:
      de: 'Vorsorge-Check — strukturiertes Laborprofil zu Stoffwechsel-, Organ- und Entzündungsparametern.'
      en: 'Status Prevent — structured laboratory overview for early orientation.'
      fr: 'Status Prevent — vue d’ensemble laboratoire structurée pour une orientation précoce.'
      es: 'Status Prevent — visión laboratorial estructurada para una orientación temprana.'
      it: 'Status Prevent — panoramica laboratoristica strutturata per un orientamento precoce.'
      pt-pt: 'Status Prevent — panorama laboratorial estruturado para uma orientação precoce.'
    image: shopify-mirror://detail/labor-status-prevent-hero.png
  - type: body
    body_html:
      de: |-
        <p>Das Laborprofil <strong>Vorsorge-Check</strong> umfasst eine strukturierte Auswahl an Stoffwechsel-, Organ- und Entzündungsparametern. Auf dieser Grundlage lassen sich Abweichungen ärztlich einordnen.</p>

        <h2>Wir analysieren folgende Parameter:</h2>

        <ul>
        <li>Fettwerte sowie Langzeitblutzucker und Harnsäure</li>
        <li>Nierenwerte mit Natrium und Kalium</li>
        <li>Leberwerte mit Lipase und LDH</li>
        <li>Gesamteiweiß mit Elektrophorese inklusive Immunglobulinen</li>
        <li>Blutbild mit Differenzierung der weißen Blutzellen</li>
        <li>Herzinsuffizienzmarker und Muskelenzyme</li>
        <li>Schilddrüsenwert TSH</li>
        <li>CRP als Entzündungsmarker</li>
        </ul>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      en: |-
        <p>With the lab profile <strong>Status Prevent</strong> you receive a structured view of central metabolic and organ parameters. The overview can help to make changes visible early — before clinical complaints appear.</p>

        <h2>We analyse the following parameters:</h2>

        <ul>
        <li>Lipid values, long-term glucose and uric acid</li>
        <li>Kidney values with sodium and potassium</li>
        <li>Liver values with lipase and LDH</li>
        <li>Total protein with electrophoresis including immunoglobulins</li>
        <li>Blood count with differentiation of white blood cells</li>
        <li>Heart failure markers and muscle enzymes</li>
        <li>TSH as thyroid value</li>
        <li>CRP as inflammation marker</li>
        </ul>

        <p>At the end of the examination you receive your personal findings report.</p>
      fr: |-
        <p>Avec le profil de laboratoire <strong>Status Prevent</strong>, vous obtenez une vue structurée des paramètres métaboliques et d’organes centraux. Cette vue d’ensemble peut aider à rendre des modifications visibles précocement — avant l’apparition de plaintes cliniques.</p>

        <h2>Nous analysons les paramètres suivants :</h2>

        <ul>
        <li>Bilan lipidique, glycémie à long terme et acide urique</li>
        <li>Paramètres rénaux avec sodium et potassium</li>
        <li>Paramètres hépatiques avec lipase et LDH</li>
        <li>Protéines totales avec électrophorèse, y compris immunoglobulines</li>
        <li>Numération sanguine avec différenciation des leucocytes</li>
        <li>Marqueurs d’insuffisance cardiaque et enzymes musculaires</li>
        <li>TSH (paramètre thyroïdien)</li>
        <li>CRP comme marqueur inflammatoire</li>
        </ul>

        <p>À la fin de l’examen, vous recevez votre compte rendu personnel.</p>
      es: |-
        <p>Con el perfil de laboratorio <strong>Status Prevent</strong> obtiene una visión estructurada de los parámetros metabólicos y de órganos centrales. Esta visión puede ayudar a hacer visibles cambios de forma temprana — antes de que aparezcan síntomas clínicos.</p>

        <h2>Analizamos los siguientes parámetros:</h2>

        <ul>
        <li>Lípidos, glucemia a largo plazo y ácido úrico</li>
        <li>Parámetros renales con sodio y potasio</li>
        <li>Parámetros hepáticos con lipasa y LDH</li>
        <li>Proteínas totales con electroforesis, incluyendo inmunoglobulinas</li>
        <li>Hemograma con diferenciación de leucocitos</li>
        <li>Marcadores de insuficiencia cardíaca y enzimas musculares</li>
        <li>TSH (parámetro tiroideo)</li>
        <li>PCR como marcador de inflamación</li>
        </ul>

        <p>Al finalizar recibe su informe personal.</p>
      it: |-
        <p>Con il profilo di laboratorio <strong>Status Prevent</strong> riceve uno sguardo strutturato sui principali parametri metabolici e d'organo. Una panoramica utile per rendere precocemente visibili alterazioni — prima che si manifestino sintomi clinici.</p>

        <h2>Analizziamo i seguenti parametri:</h2>

        <ul>
        <li>Profilo lipidico, glicemia a lungo termine e acido urico</li>
        <li>Parametri renali con sodio e potassio</li>
        <li>Parametri epatici con lipasi e LDH</li>
        <li>Proteine totali con elettroforesi e immunoglobuline</li>
        <li>Emocromo con formula differenziale dei globuli bianchi</li>
        <li>Marcatori di scompenso cardiaco ed enzimi muscolari</li>
        <li>TSH come parametro tiroideo</li>
        <li>PCR come marcatore di flogosi</li>
        </ul>

        <p>Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: |-
        <p>Com o perfil laboratorial <strong>Status Prevent</strong> recebe uma visão estruturada dos principais parâmetros metabólicos e de órgãos. Uma panorâmica útil para tornar precocemente visíveis alterações — antes de surgirem sintomas clínicos.</p>

        <h2>Analisamos os seguintes parâmetros:</h2>

        <ul>
        <li>Perfil lipídico, glicémia a longo prazo e ácido úrico</li>
        <li>Parâmetros renais com sódio e potássio</li>
        <li>Parâmetros hepáticos com lipase e LDH</li>
        <li>Proteínas totais com electroforese e imunoglobulinas</li>
        <li>Hemograma com fórmula leucocitária diferencial</li>
        <li>Marcadores de insuficiência cardíaca e enzimas musculares</li>
        <li>TSH como parâmetro tiroideu</li>
        <li>PCR como marcador inflamatório</li>
        </ul>

        <p>No final do exame recebe o seu relatório pessoal.</p>
