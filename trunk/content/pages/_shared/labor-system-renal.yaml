  lead:
    de: Filtration Performance Readout — die Filterleistung Ihrer Nieren im Blut messbar machen.
- type: body
  body_md:
    de: 'Eine Niere besteht aus etwa einer Million Filtereinheiten. Beide Nieren filtern täglich rund 360 Liter Blut. Die Filtrationsleistung liegt bei einem gesunden Erwachsenen bei etwa 90–120 Millilitern
      pro Minute. Im Labor lässt sich diese Leistung indirekt erfassen.


      Mit System Renal prüfen wir, ob Hinweise auf eine Einschränkung der Nierenfunktion vorliegen. Analysierte Parameter: Kreatinin und Harnstoff (Nierenfunktion), Natrium und Kalium (indirekte Marker),
      Gesamtprotein und Proteinelektrophorese.


      Im Anschluss besprechen wir die Werte persönlich mit Ihnen.'
