      de: 'Nieren — Laborprofil zur Beurteilung der Nierenfunktion.'
      en: 'Kidneys — laboratory profile for assessing kidney function.'
      fr: 'Reins — profil de laboratoire pour l’évaluation de la fonction rénale.'
      es: 'Riñones — perfil de laboratorio para evaluar la función renal.'
      it: 'Reni — profilo di laboratorio per la valutazione della funzione renale.'
      pt-pt: 'Rins — perfil laboratorial para avaliação da função renal.'
    image: shopify-mirror://detail/labor-system-renal-hero.jpg
  - type: body
    body_html:
      de: |-
        <p>Mit dem Laborprofil <strong>Nieren</strong> erhalten Sie eine strukturierte Beurteilung der Nierenfunktion. Eine Niere besteht aus etwa einer Million Filtereinheiten, die das Blut kontinuierlich von Abfallstoffen reinigen. Beide Nieren zusammen filtern täglich rund 360 Liter Blut — das gesamte Blutvolumen des Körpers passiert die Nieren etwa 30-mal pro Tag. Davon werden bis zu zwei Liter Urin pro Tag ausgeschieden.</p>

        <p>Die Filtrationsleistung liegt bei einer gesunden erwachsenen Person bei etwa 90–120 Millilitern pro Minute. Im Labor lässt sich die Nierenfunktion indirekt erfassen — Hinweise auf eine Einschränkung können so frühzeitig sichtbar werden.</p>

        <h2>Wir analysieren folgende Parameter:</h2>

        <ul>
        <li>Kreatinin und Harnstoff (Nierenfunktion)</li>
        <li>Natrium und Kalium als indirekte Marker</li>
        <li>Gesamtprotein</li>
        <li>Proteinelektrophorese</li>
        </ul>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      en: |-
        <p>With the lab profile <strong>Kidneys</strong> you receive a structured assessment of kidney function. Each kidney consists of about one million filter units that continuously clean the blood of waste products. Together both kidneys filter around 360 litres of blood per day — the body's entire blood volume passes through the kidneys about 30 times a day. From this we excrete up to two litres of urine a day.</p>

        <p>In a healthy adult the filtration rate is about 90–120 millilitres per minute. In the laboratory kidney function can be assessed indirectly — early signs of impairment can become visible.</p>

        <h2>We analyse the following parameters:</h2>

        <ul>
        <li>Creatinine and urea (kidney function)</li>
        <li>Sodium and potassium as indirect markers</li>
        <li>Total protein</li>
        <li>Protein electrophoresis</li>
        </ul>

        <p>At the end of the examination you receive your personal findings report.</p>
      fr: |-
        <p>Avec le profil de laboratoire <strong>Reins</strong>, vous obtenez une évaluation structurée de la fonction rénale. Chaque rein est constitué d’environ un million d’unités de filtration qui débarrassent le sang de ses déchets en continu. Ensemble, les deux reins filtrent environ 360 litres de sang par jour — l’ensemble du volume sanguin traverse les reins environ 30 fois par jour. Nous éliminons ainsi jusqu’à deux litres d’urine par jour.</p>

        <p>Chez un adulte en bonne santé, le débit de filtration est d’environ 90 à 120 millilitres par minute. Au laboratoire, la fonction rénale peut être appréciée indirectement — les signes d’une altération peuvent ainsi devenir visibles précocement.</p>

        <h2>Nous analysons les paramètres suivants :</h2>

        <ul>
        <li>Créatinine et urée (fonction rénale)</li>
        <li>Sodium et potassium comme marqueurs indirects</li>
        <li>Protéines totales</li>
        <li>Électrophorèse des protéines</li>
        </ul>

        <p>À la fin de l’examen, vous recevez votre compte rendu personnel.</p>
      es: |-
        <p>Con el perfil de laboratorio <strong>Riñones</strong> obtiene una valoración estructurada de la función renal. Un riñón consta de aproximadamente un millón de unidades de filtración que limpian continuamente la sangre de productos de desecho. Ambos riñones juntos filtran al día unos 360 litros de sangre — el volumen total de sangre del cuerpo atraviesa los riñones unas 30 veces al día. De ello eliminamos hasta dos litros de orina al día.</p>

        <p>En un adulto sano la tasa de filtración es de unos 90 a 120 mililitros por minuto. En el laboratorio la función renal se valora de forma indirecta — así pueden hacerse visibles signos tempranos de deterioro.</p>

        <h2>Analizamos los siguientes parámetros:</h2>

        <ul>
        <li>Creatinina y urea (función renal)</li>
        <li>Sodio y potasio como marcadores indirectos</li>
        <li>Proteínas totales</li>
        <li>Electroforesis de proteínas</li>
        </ul>

        <p>Al finalizar recibe su informe personal.</p>
      it: |-
        <p>Con il profilo di laboratorio <strong>Reni</strong> riceve una valutazione strutturata della funzione renale. Un rene è composto da circa un milione di unità filtranti che ripuliscono continuamente il sangue dalle sostanze di scarto. I due reni insieme filtrano ogni giorno circa 360 litri di sangue — l'intero volume ematico del corpo attraversa i reni circa 30 volte al giorno. Da qui vengono eliminati fino a due litri di urina al giorno.</p>

        <p>La velocità di filtrazione di un adulto sano si attesta tra circa 90 e 120 millilitri al minuto. In laboratorio la funzione renale può essere stimata indirettamente — eventuali riduzioni possono così essere rese visibili precocemente.</p>

        <h2>Analizziamo i seguenti parametri:</h2>

        <ul>
        <li>Creatinina e urea (funzione renale)</li>
        <li>Sodio e potassio come marcatori indiretti</li>
        <li>Proteine totali</li>
        <li>Elettroforesi proteica</li>
        </ul>

        <p>Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: |-
        <p>Com o perfil laboratorial <strong>Rins</strong> recebe uma avaliação estruturada da função renal. Um rim é composto por cerca de um milhão de unidades de filtragem que limpam continuamente o sangue dos resíduos. Os dois rins, em conjunto, filtram diariamente cerca de 360 litros de sangue — o volume total de sangue do corpo atravessa os rins cerca de 30 vezes por dia. Daí são eliminados até dois litros de urina por dia.</p>

        <p>A velocidade de filtração num adulto saudável situa-se entre cerca de 90 e 120 mililitros por minuto. Em laboratório a função renal pode ser avaliada indirectamente — reduções podem assim tornar-se precocemente visíveis.</p>

        <h2>Analisamos os seguintes parâmetros:</h2>

        <ul>
        <li>Creatinina e ureia (função renal)</li>
        <li>Sódio e potássio como marcadores indirectos</li>
        <li>Proteínas totais</li>
        <li>Electroforese proteica</li>
        </ul>

        <p>No final do exame recebe o seu relatório pessoal.</p>
