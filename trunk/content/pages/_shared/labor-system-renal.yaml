  - type: body
    body_html:
      de: |-
        <p>Mit dem Laborprofil <strong>Nieren</strong> erhalten Sie eine strukturierte Beurteilung der Nierenfunktion. Eine Niere besteht aus etwa einer Million Filtereinheiten, die das Blut kontinuierlich von Abfallstoffen reinigen. Beide Nieren zusammen filtern täglich rund 360 Liter Blut — das gesamte Blutvolumen des Körpers passiert die Nieren etwa 30-mal pro Tag. Davon werden bis zu zwei Liter Urin pro Tag ausgeschieden.</p>

        <p>Die Filtrationsleistung liegt bei einer gesunden erwachsenen Person bei etwa 90–120 Millilitern pro Minute. Im Labor lässt sich die Nierenfunktion indirekt erfassen — Hinweise auf eine Einschränkung können so frühzeitig sichtbar werden.</p>

        <h2>Wir analysieren folgende Parameter:</h2>

        <ul>
        <li>Kreatinin und Harnstoff (Nierenfunktion)</li>
        <li>Natrium und Kalium als indirekte Marker</li>
        <li>Gesamtprotein</li>
        <li>Proteinelektrophorese</li>
        </ul>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      it: |-
        <p>Con il profilo di laboratorio <strong>Reni</strong> riceve una valutazione strutturata della funzione renale. Un rene è composto da circa un milione di unità filtranti che ripuliscono continuamente il sangue dalle sostanze di scarto. I due reni insieme filtrano ogni giorno circa 360 litri di sangue — l'intero volume ematico del corpo attraversa i reni circa 30 volte al giorno. Da qui vengono eliminati fino a due litri di urina al giorno.</p>

        <p>La velocità di filtrazione di un adulto sano si attesta tra circa 90 e 120 millilitri al minuto. In laboratorio la funzione renale può essere stimata indirettamente — eventuali riduzioni possono così essere rese visibili precocemente.</p>

        <h2>Analizziamo i seguenti parametri:</h2>

        <ul>
        <li>Creatinina e urea (funzione renale)</li>
        <li>Sodio e potassio come marcatori indiretti</li>
        <li>Proteine totali</li>
        <li>Elettroforesi proteica</li>
        </ul>

        <p>Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: |-
        <p>Com o perfil laboratorial <strong>Rins</strong> recebe uma avaliação estruturada da função renal. Um rim é composto por cerca de um milhão de unidades de filtragem que limpam continuamente o sangue dos resíduos. Os dois rins, em conjunto, filtram diariamente cerca de 360 litros de sangue — o volume total de sangue do corpo atravessa os rins cerca de 30 vezes por dia. Daí são eliminados até dois litros de urina por dia.</p>

        <p>A velocidade de filtração num adulto saudável situa-se entre cerca de 90 e 120 mililitros por minuto. Em laboratório a função renal pode ser avaliada indirectamente — reduções podem assim tornar-se precocemente visíveis.</p>

        <h2>Analisamos os seguintes parâmetros:</h2>

        <ul>
        <li>Creatinina e ureia (função renal)</li>
        <li>Sódio e potássio como marcadores indirectos</li>
        <li>Proteínas totais</li>
        <li>Electroforese proteica</li>
        </ul>

        <p>No final do exame recebe o seu relatório pessoal.</p>
