sections:
  - type: hero
    eyebrow:
      de: Apparative Untersuchungen
      en: Instrument-based examinations
      fr: Examens instrumentaux
      es: Exploraciones instrumentales
      it: Esami strumentali
      pt-pt: Exames instrumentais
    heading:
      de: Apparative Diagnostik in unserer Praxis.
      en: Instrument-based diagnostics at our practice.
      fr: Diagnostic instrumental à notre cabinet.
      es: Diagnóstico instrumental en nuestra consulta.
      it: Diagnostica strumentale nella nostra pratica.
      pt-pt: Diagnóstico instrumental no nosso consultório.
    lead:
      de: >-
        Übersicht der apparativen Untersuchungen, die in der Praxis verfügbar sind. Das Team
        koordiniert Diagnostik und gegebenenfalls erforderliche weitere Schritte gemeinsam.
      en: >-
        Overview of the instrument-based examinations available at the practice. The team
        coordinates diagnostics and any further steps that may be required.
      fr: >-
        Vue d'ensemble des examens instrumentaux disponibles au cabinet. L'équipe coordonne
        le diagnostic et les éventuelles étapes ultérieures nécessaires.
      es: >-
        Visión general de las exploraciones instrumentales disponibles en la consulta. El equipo
        coordina el diagnóstico y, si procede, los pasos siguientes necesarios.
      it: >-
        Panoramica degli esami strumentali disponibili in studio. Il team coordina la
        diagnostica e le eventuali fasi successive necessarie.
      pt-pt: >-
        Visão geral dos exames instrumentais disponíveis no consultório. A equipa coordena o
        diagnóstico e os passos subsequentes que sejam necessários.
  - type: bento-grid
    heading:
      de: Ultraschall
      en: Ultrasound
      fr: Échographie
      es: Ecografía
      it: Ecografia
      pt-pt: Ecografia
    items:
      - id: echokardiographie
        title: { de: Echokardiographie, en: Echocardiography, fr: Échocardiographie, es: Ecocardiografía, it: Ecocardiografia, pt-pt: Ecocardiografia }
        teaser:
          de: Ultraschall des Herzens — Pumpfunktion, Klappen, Wandbewegungen.
          en: Ultrasound of the heart — pump function, valves, wall motion.
          fr: Échographie du cœur — fonction de pompe, valves, motilité pariétale.
          es: Ecografía del corazón — función de bomba, válvulas, motilidad parietal.
          it: Ecografia del cuore — funzione di pompa, valvole, motilità parietale.
          pt-pt: Ecografia do coração — função de bomba, válvulas, motilidade das paredes.
        image: shopify-mirror://diagnostik/diag-echokardiographie.jpg
        href: /echokardiographie/
      - id: carotis
        title: { de: Carotis-Duplex, en: Carotid Duplex, fr: Doppler carotidien, es: Dúplex carotídeo, it: Eco-Doppler delle carotidi, pt-pt: Eco-Doppler das carótidas }
        teaser:
          de: Ultraschall der Halsschlagadern — frühe Hinweise auf Gefäßveränderungen.
          en: Ultrasound of the carotid arteries — early signs of vascular changes.
          fr: Échographie des carotides — signaux précoces d’altérations vasculaires.
          es: Ecografía de las arterias carótidas — signos tempranos de alteraciones vasculares.
          it: Ecografia delle arterie carotidi — segnali precoci di alterazioni vascolari.
          pt-pt: Ecografia das artérias carótidas — sinais precoces de alterações vasculares.
        image: shopify-mirror://diagnostik/diag-carotis.jpg
        href: /carotis-duplex/
      - id: schilddruese
        title: { de: Schilddrüse, en: Thyroid ultrasound, fr: Échographie thyroïdienne, es: Ecografía tiroidea, it: Ecografia della tiroide, pt-pt: Ecografia da tiroide }
        teaser:
          de: Knoten, Zysten und Größenveränderungen sichtbar machen.
          en: Make nodules, cysts and changes in size visible.
          fr: Rendre visibles nodules, kystes et variations de volume.
          es: Hacer visibles nódulos, quistes y variaciones de tamaño.
          it: Rendere visibili noduli, cisti e variazioni di volume.
          pt-pt: Tornar visíveis nódulos, quistos e alterações de volume.
        image: shopify-mirror://diagnostik/diag-schilddruese.jpg
        href: /sonographie/schilddruese/
      - id: bauchorgane
        title: { de: Sonographie der Bauchorgane, en: Abdominal ultrasound, fr: Échographie abdominale, es: Ecografía abdominal, it: Ecografia degli organi addominali, pt-pt: Ecografia dos órgãos abdominais }
        teaser:
          de: Leber, Galle, Pankreas, Milz, Nieren — strahlungsfreie Bildgebung.
          en: Liver, gallbladder, pancreas, spleen, kidneys — radiation-free imaging.
          fr: Foie, vésicule, pancréas, rate, reins — imagerie sans rayonnement.
          es: Hígado, vesícula, páncreas, bazo, riñones — imagen sin radiación.
          it: Fegato, vie biliari, pancreas, milza, reni — diagnostica per immagini senza radiazioni.
          pt-pt: Fígado, vesícula, pâncreas, baço, rins — imagiologia sem radiação.
        image: shopify-mirror://diagnostik/diag-sonographie.jpg
        href: /sonographie/
      - id: pankreas
        title: { de: Bauchspeicheldrüse, en: Pancreas, fr: Pancréas, es: Páncreas, it: Pancreas, pt-pt: Pâncreas }
        teaser:
          de: Gezielter Ultraschall eines kleinen, aber zentralen Organs.
          en: Targeted ultrasound of a small but central organ.
          fr: Échographie ciblée d’un organe petit mais central.
          es: Ecografía dirigida de un órgano pequeño pero central.
          it: Ecografia mirata di un organo piccolo ma centrale.
          pt-pt: Ecografia dirigida a um órgão pequeno mas central.
        image: shopify-mirror://diagnostik/diag-pankreas.jpg
        href: /sonographie/bauchspeicheldruese/
      - id: nieren
        title: { de: Nieren und Harnwege, en: Kidneys and urinary tract, fr: Reins et voies urinaires, es: Riñones y vías urinarias, it: Reni e vie urinarie, pt-pt: Rins e vias urinárias }
        teaser:
          de: Beurteilung von Nieren und ableitenden Harnwegen.
          en: Assessment of kidneys and lower urinary tract.
          fr: Évaluation des reins et des voies urinaires.
          es: Valoración de riñones y vías urinarias.
          it: Valutazione di reni e vie urinarie.
          pt-pt: Avaliação dos rins e das vias urinárias.
        image: shopify-mirror://diagnostik/diag-niere.jpg
        href: /sonographie/nieren/
      - id: prostata
        title: { de: Prostata und Harnblase, en: Prostate and bladder, fr: Prostate et vessie, es: Próstata y vejiga, it: Prostata e vescica, pt-pt: Próstata e bexiga }
        teaser:
          de: Größe, Restharn, Auffälligkeiten.
          en: Size, residual urine, abnormalities.
          fr: Volume, résidu post-mictionnel, anomalies.
          es: Volumen, residuo posmiccional, anomalías.
          it: Volume, residuo post-minzionale, eventuali anomalie.
          pt-pt: Volume, resíduo pós-miccional, eventuais alterações.
        image: shopify-mirror://diagnostik/diag-prostata.jpg
        href: /sonographie/prostata/
      - id: leber
        title: { de: Leber und Gallenblase, en: Liver and gallbladder, fr: Foie et vésicule, es: Hígado y vesícula, it: Fegato e cistifellea, pt-pt: Fígado e vesícula }
        teaser:
          de: Funktion, Struktur und mögliche Schäden.
          en: Function, structure and possible damage.
          fr: Fonction, structure et lésions éventuelles.
          es: Función, estructura y posibles daños.
          it: Funzione, struttura ed eventuali alterazioni.
          pt-pt: Função, estrutura e eventuais lesões.
        image: shopify-mirror://diagnostik/diag-leber.jpg
        href: /sonographie/leber/
  - type: bento-grid
    heading:
      de: Funktion
      en: Function
      fr: Fonction
      es: Función
      it: Funzione
      pt-pt: Função
    items:
      - id: belastungs-ekg
        title: { de: Belastungs-EKG, en: Exercise ECG, fr: ECG d’effort, es: ECG de esfuerzo, it: ECG da sforzo, pt-pt: ECG de esforço }
        teaser:
          de: Ergometrie auf dem Fahrrad — Herzkreislauf unter Belastung.
          en: Cycle ergometry — cardiovascular system under stress.
          fr: Ergométrie sur vélo — système cardiovasculaire sous effort.
          es: Ergometría en bicicleta — sistema cardiovascular bajo esfuerzo.
          it: Ergometria al cicloergometro — sistema cardiocircolatorio sotto sforzo.
          pt-pt: Ergometria em bicicleta — sistema cardiovascular sob esforço.
        image: shopify-mirror://diagnostik/diag-belastungs-ekg.jpg
        href: /belastungs-ekg/
      - id: lungenfunktion
        title: { de: Lungenfunktion, en: Lung function, fr: Fonction pulmonaire, es: Función pulmonar, it: Funzione respiratoria, pt-pt: Função pulmonar }
        teaser:
          de: Spirometrie — Vitalkapazität, FEV1, Atemwegswiderstand.
          en: Spirometry — vital capacity, FEV1, airway resistance.
          fr: Spirométrie — capacité vitale, VEMS, résistance des voies aériennes.
          es: Espirometría — capacidad vital, FEV1, resistencia de las vías aéreas.
          it: Spirometria — capacità vitale, FEV1, resistenze delle vie aeree.
          pt-pt: Espirometria — capacidade vital, FEV1, resistência das vias aéreas.
        image: shopify-mirror://diagnostik/diag-lungenfunktion.jpg
        href: /lungenfunktion/
      - id: eye-check
        title: { de: Eye Check, en: Eye Check, fr: Eye Check, es: Eye Check, it: Eye Check, pt-pt: Eye Check }
        teaser:
          de: KI-gestütztes Netzhaut-Screening — Früherkennung diabetischer und vaskulärer Veränderungen.
          en: AI-supported retinal screening — early detection of diabetic and vascular changes.
          fr: Dépistage rétinien assisté par IA — détection précoce d’altérations diabétiques et vasculaires.
          es: Cribado retiniano asistido por IA — detección precoz de alteraciones diabéticas y vasculares.
          it: Screening retinico assistito da IA — rilevamento precoce di alterazioni diabetiche e vascolari.
          pt-pt: Rastreio retiniano assistido por IA — deteção precoce de alterações diabéticas e vasculares.
        image: shopify-mirror://diagnostik/diag-eye-check.jpg
        href: /eye-check/
  - type: bento-grid
    heading:
      de: Check-Ups
      en: Check-Ups
      fr: Bilans
      es: Chequeos
      it: Check-Up
      pt-pt: Check-Up
    items:
      - id: body-check
        title: { de: Body Check, en: Body Check, fr: Body Check, es: Body Check, it: Body Check, pt-pt: Body Check }
        teaser:
          de: Klinische Untersuchung mit EKG und Urintest.
          en: Clinical examination with ECG and urine test.
          fr: Examen clinique avec ECG et analyse d’urine.
          es: Exploración clínica con ECG y análisis de orina.
          it: Esame clinico con ECG e analisi delle urine.
          pt-pt: Exame clínico com ECG e análise de urina.
        image: shopify-mirror://leistungen/leistung-body-check.jpg
        href: /body-check/
      - id: sono-check
        title: { de: Sono Check, en: Sono Check, fr: Sono Check, es: Sono Check, it: Sono-Check, pt-pt: Sono-Check }
        teaser:
          de: Sonographische Untersuchung mehrerer Organsysteme in einer Sitzung.
          en: Ultrasound examination of multiple organ systems in a single session.
          fr: Examen échographique de plusieurs systèmes d'organes en une seule séance.
          es: Exploración ecográfica de varios sistemas orgánicos en una sola sesión.
          it: Esame ecografico di più sistemi d'organo in un'unica seduta.
          pt-pt: Exame ecográfico de vários sistemas de órgãos numa só sessão.
        image: shopify-mirror://diagnostik/diag-sono-check.jpg
        href: /sono-check/
      - id: komplett-check
        title: { de: Komplett-Check, en: Complete Check, fr: Examen complet, es: Examen completo, it: Check completo, pt-pt: Check completo }
        teaser:
          de: Alle apparativen Untersuchungen in einem Termin.
          en: All instrument-based examinations in a single appointment.
          fr: Tous les examens instrumentaux en un seul rendez-vous.
          es: Todas las exploraciones instrumentales en una sola cita.
          it: Tutti gli esami strumentali in un'unica seduta.
          pt-pt: Todos os exames instrumentais numa única consulta.
        image: shopify-mirror://leistungen/leistung-komplett-check.jpg
        href: /komplett-check/
      - id: kardio-check
        title: { de: Kardio Check, en: Cardio Check, fr: Cardio Check, es: Cardio Check, it: Kardio-Check, pt-pt: Kardio-Check }
        teaser:
          de: Strukturierte Beurteilung von Herz und Lunge.
          en: Structured assessment of heart and lungs.
          fr: Évaluation structurée du cœur et des poumons.
          es: Valoración estructurada de corazón y pulmones.
          it: Valutazione strutturata di cuore e polmoni.
          pt-pt: Avaliação estruturada de coração e pulmões.
        image: shopify-mirror://leistungen/leistung-kardio-check.jpg
        href: /kardio-check/
      - id: fit-for-diving
        title: { de: Fit for Diving, en: Fit for Diving, fr: Fit for Diving, es: Fit for Diving, it: Fit for Diving, pt-pt: Fit for Diving }
        teaser:
          de: Tauchtauglichkeitsuntersuchung für Open Water und Advanced.
          en: Fitness-to-dive examination for Open Water and Advanced.
          fr: Visite d’aptitude à la plongée pour Open Water et Advanced.
          es: Reconocimiento de aptitud para buceo Open Water y Advanced.
          it: Visita di idoneità subacquea per Open Water e Advanced.
          pt-pt: Avaliação de aptidão para mergulho — Open Water e Advanced.
        image: shopify-mirror://diagnostik/diag-fit-for-diving.jpg
        href: /fit-for-diving/
  - type: process-steps
    heading:
      de: So läuft Ihre Untersuchung ab
      en: How your examination works
      fr: Comment se déroule votre examen
      es: Cómo se desarrolla su exploración
      it: Come si svolge il suo esame
      pt-pt: Como decorre o seu exame
    steps:
      - num: '1'
        title: { de: Termin, en: Appointment, fr: Rendez-vous, es: Cita, it: Appuntamento, pt-pt: Marcação }
        text:
          de: Telefonisch oder online — wir klären vorab, was sinnvoll ist.
          en: By phone or online — we clarify in advance what makes sense.
          fr: Par téléphone ou en ligne — nous précisons à l’avance ce qui est utile.
          es: Por teléfono o en línea — aclaramos por adelantado qué tiene sentido.
          it: Per telefono o online — chiariamo in anticipo ciò che è opportuno.
          pt-pt: Por telefone ou online — esclarecemos antecipadamente o que faz sentido.
      - num: '2'
        title: { de: Untersuchung, en: Examination, fr: Examen, es: Exploración, it: Esame, pt-pt: Exame }
        text:
          de: In ruhiger Atmosphäre, individuell auf Sie abgestimmt.
          en: In a calm atmosphere, tailored individually to you.
          fr: Dans une atmosphère calme, adaptée individuellement à vous.
          es: En un ambiente tranquilo, ajustado individualmente a usted.
          it: In un'atmosfera tranquilla, personalizzata in base alle sue esigenze.
          pt-pt: Num ambiente tranquilo, ajustado individualmente a si.
      - num: '3'
        title: { de: Befund, en: Findings, fr: Résultats, es: Resultado, it: Referto, pt-pt: Resultado }
        text:
          de: Ärztliche Einordnung im persönlichen Gespräch — keine PDFs ohne Erklärung.
          en: Medical interpretation in a personal conversation — no PDFs without explanation.
          fr: Interprétation médicale lors d’un entretien personnel — pas de PDF sans explication.
          es: Valoración médica en conversación personal — sin PDFs sin explicación.
          it: Inquadramento medico nel colloquio personale — nessun PDF senza spiegazione.
          pt-pt: Avaliação médica em conversa pessoal — sem PDFs sem explicação.
      - num: '4'
        title: { de: Weiteres Vorgehen, en: Next steps, fr: Étapes suivantes, es: Siguientes pasos, it: Passi successivi, pt-pt: Próximos passos }
        text:
          de: Falls nötig, koordinieren wir die nächsten Schritte mit unseren Fachkollegen im Haus.
          en: If needed, we coordinate the next steps with our specialist colleagues in the building.
          fr: Si nécessaire, nous coordonnons les étapes suivantes avec nos collègues spécialistes de la maison.
          es: Si es necesario, coordinamos los siguientes pasos con nuestros colegas especialistas de la casa.
          it: Se necessario, coordiniamo i passi successivi con i nostri specialisti nella stessa struttura.
          pt-pt: Se necessário, coordenamos os próximos passos com os nossos colegas especialistas da casa.
  - type: cta-banner
    heading:
      de: Termin für eine Untersuchung?
      en: Booking an examination?
      fr: Un rendez-vous pour un examen ?
      es: ¿Cita para una exploración?
      it: Vuole prenotare un esame?
      pt-pt: Quer marcar um exame?
    sub:
      de: Im Erstgespräch klären wir gemeinsam, welche Untersuchung in Ihrer Situation angezeigt ist.
      en: In the first consultation we clarify together which examination is indicated in your situation.
      fr: Lors du premier entretien, nous clarifions ensemble quel examen est indiqué dans votre situation.
      es: En la primera consulta aclaramos juntos qué exploración es la indicada en su caso.
      it: Nel colloquio iniziale chiariamo insieme quale esame è indicato nella sua situazione.
      pt-pt: Na primeira conversa esclarecemos em conjunto qual o exame indicado na sua situação.
    cta_label:
      de: Termin vereinbaren
      en: Book an appointment
      fr: Prendre rendez-vous
      es: Concertar una cita
      it: Fissa un appuntamento
      pt-pt: Marcar consulta
    cta_url: /service/terminanfrage/
