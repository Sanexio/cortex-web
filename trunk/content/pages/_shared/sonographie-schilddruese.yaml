  - type: body
    body_html:
      de: |
        <p>Die Schilddrüse produziert Hormone, die Energieverbrauch und Stoffwechsel regulieren. Eine Unterfunktion kann zu Müdigkeit, Gewichtszunahme und Stimmungsschwankungen führen, während eine Überfunktion Nervosität, Herzrasen und Gewichtsverlust verursacht. Die Schilddrüse liegt schmetterlingsförmig dem Kehlkopf an. Als stoffwechselaktives Organ können sich Knoten bilden, die im Labor nicht nachweisbar, aber im Ultraschall gut zu beurteilen sind. Bei Verdacht auf bösartige Veränderungen sollten die betreffenden Knoten weiter abgeklärt werden.</p>

        <h2>Wie wird die Untersuchung durchgeführt?</h2>

        <p>Zunächst tasten wir Ihre Schilddrüse ab und im Anschluss wird die Ultraschalluntersuchung durchgeführt. Hierzu legen Sie sich auf eine Liege und überstrecken den Kopf leicht.</p>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht. Bei auffälligen Knoten besprechen wir mit Ihnen das weitere Vorgehen — meist durch Verlaufskontrolle, in seltenen Fällen durch eine Feinnadelpunktion.</p>
      en: |
        <p>The thyroid produces hormones that regulate energy consumption and metabolism. An underactive thyroid can lead to fatigue, weight gain and mood swings, while an overactive thyroid causes nervousness, palpitations and weight loss. The thyroid lies in a butterfly shape adjacent to the larynx. As a metabolically active organ, nodules can form that are not detectable in the lab but can be well assessed by ultrasound. If malignancy is suspected, the nodules concerned should be investigated further.</p>

        <h2>How is the examination carried out?</h2>

        <p>First we palpate your thyroid and then the ultrasound examination follows. For this you lie on a couch and gently extend your head backwards.</p>

        <p>At the end of the examination you receive your personal findings report. For suspicious nodules we discuss the next steps with you — usually a follow-up control, in rare cases a fine-needle aspiration.</p>
      fr: |
        <p>La thyroïde produit des hormones qui régulent la dépense énergétique et le métabolisme. Une hypofonction peut entraîner fatigue, prise de poids et fluctuations de l’humeur, alors qu’une hyperfonction provoque nervosité, palpitations et perte de poids. La thyroïde est disposée en forme de papillon contre le larynx. Organe métaboliquement actif, elle peut développer des nodules indétectables au laboratoire mais bien évaluables à l’échographie. En cas de suspicion de malignité, les nodules concernés doivent être explorés plus avant.</p>

        <h2>Comment se déroule l’examen ?</h2>

        <p>Nous palpons d’abord votre thyroïde, puis l’examen échographique est réalisé. Pour cela, vous vous allongez sur la table et étendez légèrement la tête vers l’arrière.</p>

        <p>À la fin de l’examen, vous recevez votre compte rendu personnel. En cas de nodules suspects, nous discutons avec vous des étapes suivantes — habituellement par contrôle évolutif, rarement par cytoponction.</p>
      es: |
        <p>La tiroides produce hormonas que regulan el gasto energético y el metabolismo. Un hipotiroidismo puede provocar fatiga, aumento de peso y oscilaciones del estado de ánimo, mientras que un hipertiroidismo causa nerviosismo, palpitaciones y pérdida de peso. La tiroides se dispone en forma de mariposa adosada a la laringe. Como órgano metabólicamente activo, pueden aparecer nódulos no detectables en el laboratorio pero bien valorables por ecografía. Si se sospecha malignidad, los nódulos en cuestión deben estudiarse con mayor detalle.</p>

        <h2>¿Cómo se realiza la exploración?</h2>

        <p>Primero palpamos su tiroides y, a continuación, se realiza la ecografía. Para ello se tumba en una camilla y extiende ligeramente la cabeza hacia atrás.</p>

        <p>Al finalizar recibe su informe personal. En caso de nódulos sospechosos hablamos con usted sobre los siguientes pasos — generalmente un control evolutivo, en raras ocasiones una punción aspirativa con aguja fina.</p>
      it: |
        <p>La tiroide produce ormoni che regolano il consumo energetico e il metabolismo. Un'iperfunzione può provocare nervosismo, tachicardia e perdita di peso, mentre un'ipofunzione causa stanchezza, aumento di peso e oscillazioni dell'umore. La tiroide è disposta a forma di farfalla addossata alla laringe. Trattandosi di un organo metabolicamente attivo, possono formarsi noduli non rilevabili in laboratorio ma ben valutabili all'ecografia. Se si sospettano alterazioni maligne i noduli interessati devono essere ulteriormente approfonditi.</p>

        <h2>Come si svolge l'esame?</h2>

        <p>Inizialmente palpiamo la sua tiroide e quindi eseguiamo l'esame ecografico. A questo scopo si distende sul lettino ed estende leggermente il capo all'indietro.</p>

        <p>Al termine dell'esame riceve il suo referto personale. In presenza di noduli sospetti discutiamo con lei i passi successivi — di norma con controlli evolutivi e, raramente, con un agoaspirato.</p>
      pt-pt: |
        <p>A tiroide produz hormonas que regulam o consumo energético e o metabolismo. Um hipofunção pode causar fadiga, aumento de peso e oscilações de humor, enquanto um hiperfunção provoca nervosismo, taquicardia e perda de peso. A tiroide tem a forma de uma borboleta adossada à laringe. Como órgão metabolicamente activo, podem formar-se nódulos não detectáveis em laboratório, mas bem avaliáveis por ecografia. Em caso de suspeita de alterações malignas os nódulos em causa devem ser esclarecidos.</p>

        <h2>Como é realizado o exame?</h2>

        <p>Primeiro palpamos a sua tiroide e em seguida realizamos o exame ecográfico. Para tal, deita-se na maca e inclina ligeiramente a cabeça para trás.</p>

        <p>No final do exame recebe o seu relatório pessoal. Em caso de nódulos suspeitos discutimos consigo os próximos passos — habitualmente com controlos evolutivos e, raramente, com punção aspirativa por agulha fina.</p>

