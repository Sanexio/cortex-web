    heading:
      de: Tumor-Screening
    lead:
      de: Strukturierte Krebsvorsorge — Sonographie, Labor und ärztliche Befundbesprechung.

  - type: body
    body_md:
      de: |
        Tumor-Screening bedeutet, gezielt nach Hinweisen auf bösartige Veränderungen zu suchen, bevor sie Beschwerden machen. Wichtig ist dabei: Screening soll genau dort erfolgen, wo es sinnvoll ist — nicht überall, weil es Möglichkeiten gibt. Welche Untersuchungen für Sie passend sind, hängt von Alter, Familiengeschichte und individuellen Risikofaktoren ab.

        In unserer Praxis kombinieren wir bei Bedarf hochauflösende Sonographie der Bauchorgane, Schilddrüsen-Ultraschall, Halsschlagadern-Duplex und gezielte Laborparameter zu einem strukturierten Vorsorge-Programm. Im Erstgespräch klären wir, was in Ihrer Situation sinnvoll ist.

