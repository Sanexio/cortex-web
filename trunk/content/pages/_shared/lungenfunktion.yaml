  - type: body
    body_html:
      de: |-
        <p>Mit jedem Atemzug nehmen wir etwa 0,5 Liter Luft in die Lungen auf — rund 10 Liter pro Minute, 14.400 Liter am Tag und über fünf Millionen Liter im Jahr. Damit ist die Lunge das Organ, das am direktesten mit der Außenwelt in Kontakt steht. Die Lungen enthalten bis zu 500 Millionen Lungenbläschen mit einer Gesamtoberfläche von etwa 70 Quadratmetern.</p>

        <p>Die Lunge kann durch Schadstoffe, angeborene Veränderungen oder Infektionen geschädigt werden. Mit der Spirometrie lässt sich die Lungenfunktion einfach und schmerzfrei beurteilen.</p>

        <h2>Wie wird die Untersuchung durchgeführt?</h2>

        <p>Wir setzen Ihnen zunächst eine Nasenklammer auf, da die Messung der Luftströme ausschließlich über den Mund erfolgt. Sie atmen anschließend nach Anleitung über ein Mundstück und führen vorgegebene Atemmanöver durch.</p>

        <p>Zum Abschluss der Untersuchung erhalten Sie Ihren persönlichen Befundbericht.</p>
      en: |-
        <p>With each breath we take about 0.5 litres of air into the lungs — around 10 litres per minute, 14,400 litres a day and over five million litres per year. The lungs are therefore the organ most directly in contact with the outside world. The lungs contain up to 500 million alveoli with a total surface area of around 70 square metres.</p>

        <p>The lungs can be damaged by pollutants, congenital changes or infections. Spirometry allows lung function to be assessed easily and without pain.</p>

        <h2>How is the examination carried out?</h2>

        <p>First we put a nose clip on you, as the airflow measurement is taken only through the mouth. You then breathe through a mouthpiece following our instructions and carry out the specified breathing manoeuvres.</p>

        <p>At the end of the examination you receive your personal findings report.</p>
      fr: |-
        <p>À chaque respiration, nous absorbons environ 0,5 litre d’air dans les poumons — soit près de 10 litres par minute, 14 400 litres par jour et plus de cinq millions de litres par an. Les poumons sont ainsi l’organe le plus directement en contact avec le monde extérieur. Les poumons contiennent jusqu’à 500 millions d’alvéoles avec une surface totale d’environ 70 mètres carrés.</p>

        <p>Les poumons peuvent être endommagés par des polluants, des anomalies congénitales ou des infections. La spirométrie permet d’évaluer la fonction pulmonaire simplement et sans douleur.</p>

        <h2>Comment se déroule l’examen ?</h2>

        <p>Nous vous mettons d’abord un pince-nez, car la mesure des flux d’air s’effectue uniquement par la bouche. Vous respirez ensuite, selon nos instructions, à travers un embout buccal et réalisez les manœuvres respiratoires demandées.</p>

        <p>À la fin de l’examen, vous recevez votre compte rendu personnel.</p>
      es: |-
        <p>Con cada respiración inhalamos unos 0,5 litros de aire — unos 10 litros por minuto, 14.400 litros al día y más de cinco millones de litros al año. Por ello el pulmón es el órgano que está en contacto más directo con el mundo exterior. Los pulmones contienen hasta 500 millones de alvéolos, con una superficie total de unos 70 metros cuadrados.</p>

        <p>El pulmón puede dañarse por sustancias nocivas, alteraciones congénitas o infecciones. La espirometría permite valorar la función pulmonar de forma sencilla e indolora.</p>

        <h2>¿Cómo se realiza la exploración?</h2>

        <p>Primero le colocamos una pinza nasal, ya que la medición de los flujos de aire se realiza exclusivamente por la boca. A continuación respira siguiendo nuestras indicaciones a través de una boquilla y realiza las maniobras respiratorias indicadas.</p>

        <p>Al finalizar recibe su informe personal.</p>
      it: |-
        <p>Con ogni respiro introduciamo nei polmoni circa 0,5 litri d'aria — circa 10 litri al minuto, 14.400 litri al giorno e oltre cinque milioni di litri all'anno. Il polmone è quindi l'organo che entra più direttamente in contatto con il mondo esterno. I polmoni contengono fino a 500 milioni di alveoli con una superficie complessiva di circa 70 metri quadrati.</p>

        <p>I polmoni possono essere danneggiati da sostanze nocive, alterazioni congenite o infezioni. La spirometria consente di valutarne la funzione in modo semplice e indolore.</p>

        <h2>Come si svolge l'esame?</h2>

        <p>Le applichiamo dapprima uno stringinaso, perché la misurazione del flusso aereo avviene esclusivamente attraverso la bocca. Poi respira secondo le nostre indicazioni attraverso un boccaglio ed esegue le manovre respiratorie richieste.</p>

        <p>Al termine dell'esame riceve il suo referto personale.</p>
      pt-pt: |-
        <p>A cada inspiração introduzimos nos pulmões cerca de 0,5 litros de ar — aproximadamente 10 litros por minuto, 14.400 litros por dia e mais de cinco milhões de litros por ano. O pulmão é, assim, o órgão em contacto mais directo com o mundo exterior. Os pulmões contêm até 500 milhões de alvéolos, com uma superfície total de cerca de 70 metros quadrados.</p>

        <p>O pulmão pode ser danificado por substâncias nocivas, alterações congénitas ou infecções. A espirometria permite avaliar a sua função de forma simples e indolor.</p>

        <h2>Como é realizado o exame?</h2>

        <p>Colocamos-lhe primeiro uma pinça nasal, pois a medição dos fluxos de ar é feita exclusivamente pela boca. Depois respira, conforme as nossas instruções, através de um bocal e realiza as manobras respiratórias indicadas.</p>

        <p>No final do exame recebe o seu relatório pessoal.</p>
