      de: Lungenfunktion (Spirometrie) — schnelle Beurteilung Ihrer Atemwege und des Lungenvolumens.
      en: Lung function (spirometry) — quick assessment of your airways and lung volume.
      fr: Fonction pulmonaire (spirométrie) — évaluation rapide de vos voies respiratoires et de votre volume pulmonaire.
      es: Función pulmonar (espirometría) — valoración rápida de sus vías respiratorias y del volumen pulmonar.
      it: Funzione respiratoria (spirometria) — valutazione rapida delle vie aeree e del volume polmonare.
