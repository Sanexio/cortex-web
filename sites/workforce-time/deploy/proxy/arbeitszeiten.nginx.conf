# task-3100b6ea5164 — nginx-Alternative zum Caddy-Setup.
# SPA-statisch + /api/* an Node-Process 127.0.0.1:5175.
# TLS via certbot (Lets Encrypt). Voraussetzung:
#   1. DNS A-Record arbeitszeiten.example.com -> Server-IP
#   2. certbot --nginx -d arbeitszeiten.example.com vor erster
#      Aktivierung (oder server_name auf HTTP-only zurueckdrehen, bis Cert da ist)
#   3. Statische Build-Files unter /var/www/arbeitszeiten/dist
#   4. Node-Process auf 127.0.0.1:5175 (siehe deploy/systemd/workforce-time.service)

server {
    listen 80;
    listen [::]:80;
    server_name arbeitszeiten.example.com;

    # ACME-HTTP-01 Challenge zulassen, alles andere auf HTTPS umleiten.
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name arbeitszeiten.example.com;

    ssl_certificate     /etc/letsencrypt/live/arbeitszeiten.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arbeitszeiten.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=()" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml+rss image/svg+xml;
    gzip_min_length 1024;

    root /var/www/arbeitszeiten/dist;

    location /api/ {
        proxy_pass http://127.0.0.1:5175;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/arbeitszeiten.access.log;
    error_log  /var/log/nginx/arbeitszeiten.error.log;
}
