# task-3100b6ea5164 — Caddy v2 Reverse-Proxy fuer arbeitszeiten.example.com.
#
# SPA-statisch + /api/* an Node-Process auf 127.0.0.1:5175.
# Caddy uebernimmt TLS automatisch via ACME (HTTP-01 / Lets Encrypt).
# Voraussetzung: DNS A-Record arbeitszeiten.example.com -> Server-IP.
#
# Variablen ueber Environment ueberschreibbar:
#   ARBEITSZEITEN_HOST   Default arbeitszeiten.example.com
#   ARBEITSZEITEN_ROOT   Default /var/www/arbeitszeiten/dist
#   ARBEITSZEITEN_API    Default 127.0.0.1:5175

{$ARBEITSZEITEN_HOST:arbeitszeiten.example.com} {
	encode zstd gzip

	root * {$ARBEITSZEITEN_ROOT:/var/www/arbeitszeiten/dist}

	# Security-Header (HSTS + content-type sniffing + clickjacking).
	header {
		Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
		X-Content-Type-Options "nosniff"
		Referrer-Policy "strict-origin-when-cross-origin"
		Permissions-Policy "interest-cohort=()"
		-Server
	}

	# /api/* an Node-Process (server/api.js auf 127.0.0.1:5175).
	@api path /api/*
	handle @api {
		reverse_proxy {$ARBEITSZEITEN_API:127.0.0.1:5175} {
			header_up Host {host}
			header_up X-Real-IP {remote_host}
			header_up X-Forwarded-For {remote_host}
			header_up X-Forwarded-Proto https
		}
	}

	# Statische SPA-Routen — Fallback auf index.html (SPA-History-Mode).
	handle {
		try_files {path} /index.html
		file_server
	}

	log {
		output file /var/log/caddy/arbeitszeiten.log {
			roll_size 10mb
			roll_keep 5
		}
		format json
	}
}
