<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Praxis Dr. Stracke — Wartungsmodus</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f4f6f9;
    color: #1f2937;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.55;
  }
  .card {
    max-width: 520px;
    margin: 2rem;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.06);
    padding: 3rem 2.5rem;
    text-align: center;
  }
  h1 {
    font-size: 1.75rem;
    margin: 0 0 0.75rem;
    color: #134e4a;
  }
  .lede {
    color: #4b5563;
    font-size: 1.05rem;
    margin-bottom: 1.5rem;
  }
  .meta {
    border-top: 1px solid #e5e7eb;
    padding-top: 1.25rem;
    margin-top: 1.5rem;
    font-size: 0.92rem;
    color: #6b7280;
  }
  .meta a { color: #134e4a; text-decoration: none; }
  .meta a:hover { text-decoration: underline; }
  .badge {
    display: inline-block;
    padding: 0.3rem 0.7rem;
    background: #ecfdf5;
    color: #047857;
    border-radius: 999px;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 1rem;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="badge">Wartungsmodus</div>
    <h1>Wir aktualisieren gerade unsere Webseite</h1>
    <p class="lede">
      Unsere Seite ist für ein kurzes Update offline. In wenigen Minuten
      sind wir wieder erreichbar.
    </p>
    <div class="meta">
      <strong>Praxis Dr. med. Stracke &amp; Kollegen</strong><br>
      Westend, Frankfurt am Main<br>
      In dringenden Fällen erreichen Sie uns telefonisch.
    </div>
  </div>
</body>
</html>
