# Sanexio Cyber — User-Theme fuer cortex-harness Dashboard.
# Portal-Aesthetik (sanexio-portal/cyber.css) als reines Token-Theme.
# REGEL: nur theme-systemkonforme Felder — palette, typography, layout,
# colorOverrides, componentStyles. KEIN customCSS, weil generic
# selectors die Dashboard-UI gebrochen haben (Stracke-Erfahrung 2026-06-28).
# Aufbau und Funktion des Dashboards bleiben unangetastet.

name: sanexio-cyber
label: Sanexio Cyber
description: "Portal-Look — Barlow Condensed + Neon Yellow/Cyan/Magenta auf tactical Black (#0c0c0c)"

palette:
  background:
    hex: "#0c0c0c"
    alpha: 1.0
  midground:
    hex: "#f5c300"   # neon-yellow — primary accent (Portal-Yellow)
    alpha: 1.0
  foreground:
    hex: "#00ddf5"   # neon-cyan — secondary accent (Portal-Cyan)
    alpha: 0.0
  warmGlow: "rgba(245, 195, 0, 0.35)"
  noiseOpacity: 0.5

typography:
  fontSans: '"Rajdhani", system-ui, -apple-system, "Segoe UI", sans-serif'
  fontDisplay: '"Barlow Condensed", "Arial Narrow", sans-serif'
  fontMono: '"JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace'
  fontUrl: "https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
  baseSize: "15px"
  lineHeight: "1.5"
  letterSpacing: "0"

layout:
  radius: "6px"
  density: "comfortable"

layoutVariant: standard

colorOverrides:
  primary: "#f5c300"
  primaryForeground: "#000000"
  secondary: "#00ddf5"
  secondaryForeground: "#000000"
  accent: "#ff2878"        # neon-magenta
  accentForeground: "#ffffff"
  border: "rgba(255, 255, 255, 0.08)"
  input: "#141414"
  ring: "rgba(245, 195, 0, 0.55)"
  destructive: "#ff2878"
  success: "#5dff9c"
  warning: "#f5c300"

componentStyles:
  badge:
    background: "#f5c300"
    color: "#000000"
  sidebar:
    borderColor: "rgba(245, 195, 0, 0.18)"
  header:
    borderColor: "rgba(245, 195, 0, 0.18)"
