<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="color-scheme" content="dark" />
    <title>Sanexio Portal · Cortex</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap"
    />
    <meta name="robots" content="noindex,nofollow" />
    <script>
      /* CyberWhite early boot (kein Flackern). Quelle: ?theme=... >
       * localStorage "cortex_cyber_theme". Gleiches Schema wie die
       * cortex-sanexio.tech-Landing (cyber-theme.js). */
      (function () {
        var KEY = "cortex_cyber_theme";
        var theme = null;
        try {
          var m = window.location.search.match(/[?&]theme=(cyber-white|cyber-dark)(&|$)/);
          if (m) {
            theme = m[1];
            try { window.localStorage.setItem(KEY, theme); } catch (e) {}
          }
          if (!theme) theme = window.localStorage.getItem(KEY);
        } catch (e) {}
        if (theme === "cyber-white") {
          document.documentElement.setAttribute("data-theme", "cyber-white");
          var mc = document.querySelector('meta[name="color-scheme"]');
          if (mc) mc.setAttribute("content", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
