    <script>
      /* CyberWhite early boot (kein Flackern). Quelle: ?theme=... >
       * Cookie/localStorage "cortex_cyber_theme". Gleiches Schema wie die
       * cortex-sanexio.tech-Landing (cyber-theme.js). */
      (function () {
        var KEY = "cortex_cyber_theme";
        function normalize(theme) {
          if (theme === "cyber-white" || theme === "cyber-dark" || theme === "praxis2025") return theme;
          return null;
        }
        function readThemeCookie() {
          try {
            var prefix = KEY + "=";
            var parts = document.cookie ? document.cookie.split(";") : [];
            for (var i = 0; i < parts.length; i += 1) {
              var part = parts[i].replace(/^\s+/, "");
              if (part.indexOf(prefix) === 0) return decodeURIComponent(part.slice(prefix.length));
            }
          } catch (e) {}
          return null;
        }
        function writeThemeCookie(value) {
          try {
            var cookie = KEY + "=" + encodeURIComponent(value) + "; Path=/; Max-Age=31536000; SameSite=Lax";
            var host = window.location.hostname || "";
            var domain = "cortex-sanexio.tech";
            if (host.slice(-domain.length) === domain) cookie += "; Domain=.cortex-sanexio.tech";
            if (window.location.protocol === "https:") cookie += "; Secure";
            document.cookie = cookie;
          } catch (e) {}
        }
        function storageGet(key) {
          try {
            return window.localStorage.getItem(key);
          } catch (e) {
            return null;
          }
        }
        function storageSet(key, value) {
          try {
            window.localStorage.setItem(key, value);
          } catch (e) {}
        }
        var theme = null;
        try {
          var m = window.location.search.match(/[?&]theme=(cyber-white|cyber-dark|praxis2025)(&|$)/);
          if (m) {
            theme = normalize(m[1]);
            writeThemeCookie(theme);
            storageSet(KEY, theme);
          }
          if (!theme) theme = normalize(readThemeCookie());
          if (!theme) theme = normalize(storageGet(KEY));
        } catch (e) {}
        if (!theme) theme = "praxis2025";
        document.documentElement.setAttribute("data-theme", theme);
        if (theme === "cyber-dark") {
          var mc = document.querySelector('meta[name="color-scheme"]');
          if (mc) mc.setAttribute("content", "dark");
          var tc = document.querySelector('meta[name="theme-color"]');
          if (tc) tc.setAttribute("content", "#0a0a0f");
        } else if (theme === "cyber-white") {
          var mc2 = document.querySelector('meta[name="color-scheme"]');
          if (mc2) mc2.setAttribute("content", "light");
        }
      })();
    </script>
